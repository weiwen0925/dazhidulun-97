<style>
:root{

*{box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{margin:0;background:var(--bg);color:var(--text);

  line-height:1.8;-webkit-user-select:none;-moz-user-select:none;user-select:none;
  -webkit-touch-callout:none;}
/* 側欄 */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;background:var(--sbBg);
  color:var(--sbText);z-index:100;display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;font-family:"Noto Sans TC",sans-serif;
  font-size:11px;letter-spacing:2px;color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;text-decoration:none;cursor:pointer;
  transition:color .25s;display:block;border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:8px;width:100%;align-items:center;margin-top:6px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%;
  padding:6px 4px;text-decoration:none;color:var(--sbText);cursor:pointer;
  transition:background .2s;border-radius:6px;}
.sb-item:hover{background:rgba(184,134,11,.15);}
.sb-item.active{background:rgba(184,134,11,.28);box-shadow:0 0 12px rgba(184,134,11,.4);}
.sb-circle{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;
  font-family:"Noto Sans TC",sans-serif;color:var(--goldL);}
.sb-item.active .sb-circle{background:var(--gold);color:#fff;}
.sb-label{font-size:11.5px;text-align:center;letter-spacing:.5px;line-height:1.25;}
/* main */
.main{margin-left:var(--sbW);}
/* hero */
.site-hero{position:relative;background:var(--headGrad);color:#fff;text-align:center;
  padding:70px 24px 60px;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:300px;font-weight:900;color:#fff;opacity:.03;
  white-space:nowrap;pointer-events:none;}
.hero-title{font-size:56px;font-weight:900;color:var(--goldL);margin:0 0 14px;letter-spacing:6px;position:relative;}
.hero-subtitle{font-size:20px;color:#e8dcc4;margin:0 0 18px;letter-spacing:1px;position:relative;}
.hero-range{display:inline-block;font-size:17px;color:var(--gold);border:1px solid rgba(184,134,11,.5);
  border-radius:20px;padding:5px 20px;letter-spacing:2px;position:relative;
  font-family:"Noto Sans TC",sans-serif;}
.hero-en{display:block;margin-top:16px;font-size:13px;color:#9a8c70;letter-spacing:3px;
  font-family:"Noto Sans TC",sans-serif;position:relative;}
/* preface */
.preface{max-width:860px;margin:0 auto;padding:48px 28px 12px;}
.preface-title{text-align:center;font-size:30px;color:var(--accent);margin:0 0 24px;letter-spacing:3px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 18px;text-indent:2em;}
/* 總目錄 */
.toc-section{max-width:1100px;margin:30px auto 10px;padding:36px 28px;}
.toc-title{text-align:center;font-size:34px;color:var(--accent);margin:0 0 10px;letter-spacing:6px;}
.toc-desc{text-align:center;font-size:17px;color:var(--text-muted);margin:0 0 30px;
  font-family:"Noto Sans TC",sans-serif;letter-spacing:1px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.toc-card{display:flex;gap:16px;align-items:flex-start;background:var(--card);
  border:1px solid var(--border);border-radius:10px;padding:20px 22px;text-decoration:none;
  color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s;}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(91,58,41,.12);}
.toc-num{flex:0 0 auto;width:42px;height:42px;border-radius:50%;background:var(--gold);
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;
  font-weight:700;font-family:"Noto Sans TC",sans-serif;}
.toc-body{flex:1;}
.toc-name{font-size:19.5px;font-weight:700;line-height:1.7;color:var(--accent);margin:0 0 4px;}
.toc-sub{font-size:14.5px;color:var(--text-muted);line-height:1.6;font-family:"Noto Sans TC",sans-serif;}
/* chapter */
.chapter{margin:40px 0 0;scroll-margin-top:20px;}
.ch-head{background:var(--headGrad);color:#fff;text-align:center;padding:40px 24px 34px;}
.ch-num{font-size:18px;color:var(--gold);letter-spacing:3px;margin-bottom:12px;font-family:"Noto Sans TC",sans-serif;}
.ch-name{font-size:34px;font-weight:700;color:var(--goldL);margin:0 0 10px;letter-spacing:2px;}
.ch-sub{font-size:17px;color:#d8cbb0;letter-spacing:1px;}
.ch-head-line{width:60px;height:2px;background:var(--gold);margin:18px auto 0;}
.ch-body{max-width:980px;margin:0 auto;padding:30px 22px 10px;}
/* bridge */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);
  border-left:5px solid var(--gold);border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;}
/* iframe */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;border:1px solid var(--border);
  border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}
.next-link{display:inline-block;margin:6px 0 10px;font-size:17px;color:var(--accent);
  text-decoration:none;font-family:"Noto Sans TC",sans-serif;border:1px solid var(--border);
  border-radius:20px;padding:7px 22px;transition:background .2s,color .2s;}
.next-link:hover{background:var(--gold);color:#fff;border-color:var(--gold);}
/* 進度膠囊 */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;
  background:rgba(30,26,20,.92);color:var(--gold);padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;display:flex;
  align-items:center;gap:12px;pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}

#backTop{position:fixed;right:22px;bottom:22px;width:44px;height:44px;border-radius:50%;
  background:var(--gold);color:#fff;border:0;font-size:20px;cursor:pointer;display:none;
  z-index:120;box-shadow:0 3px 12px rgba(0,0,0,.25);}
#backTop.show{display:block;}
#sbToggle{display:none;}
.site-footer{background:var(--sbBg);color:var(--sbText);text-align:center;padding:30px 24px;
  margin-top:50px;font-size:15px;letter-spacing:1px;font-family:"Noto Sans TC",sans-serif;}
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  .main{margin-left:0;}
  #sbToggle{display:block;position:fixed;left:12px;top:12px;z-index:130;width:42px;height:42px;
    border-radius:8px;background:var(--sbBg);color:var(--gold);border:0;font-size:20px;cursor:pointer;}
  .hero-title{font-size:38px;} .ch-name{font-size:26px;}
}

  border:1.2px solid rgba(212,196,168,.55);

.sb-x:hover .sb-x-label{color:var(--goldL,#d4a84b);opacity:1;}
.sb-x-hub .sb-x-glyph{background:linear-gradient(135deg,

<script>
var rpFill=document.getElementById('rpFill'),rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';
  if(rpPct)rpPct.textContent=Math.round(pct)+'%';
}
window.addEventListener('scroll',updateProgress,{passive:true});updateProgress();
(function(){
  var cap=document.getElementById('readProgress');if(!cap)return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var t=[];var f2=document.querySelector('.site-footer');if(f2)t.push(f2);
  if(!t.length)return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(es){setHide(es.some(function(e){return e.isIntersecting;}));},
      {root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    t.forEach(function(x){io.observe(x);});
  }else{
    var c=function(){var dh=document.documentElement.scrollHeight;var sb=window.scrollY+window.innerHeight;setHide(dh-sb<240);};
    window.addEventListener('scroll',c,{passive:true});c();
  }
})();
/* iframe 自動高度 */
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;if(!d||!d.body)return;
    d.body.style.minHeight='0';d.body.style.height='auto';
    if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
    var h=d.body.scrollHeight;
    if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function')updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
  if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}
  else{f.addEventListener('load',tick);}
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});
document.addEventListener('click',function(e){
  var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;if(!a)return;
  var h=a.getAttribute('href');if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var id=h.substring(1);var el=document.getElementById(id);if(!el)return;
  e.preventDefault();resizeAllFrames();
  setTimeout(function(){resizeAllFrames();var rect=el.getBoundingClientRect();
    var y=window.scrollY+rect.top-20;window.scrollTo({top:y,behavior:'smooth'});},60);
},true);
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);

if(sbBrand)sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});
/* 側欄高亮 */
var sbItems=document.querySelectorAll('.sb-item');
var secs=document.querySelectorAll('section.chapter');
function highlight(){
  var idx=-1;
  secs.forEach(function(s,i){if(s.getBoundingClientRect().top<window.innerHeight*0.35)idx=i;});
  sbItems.forEach(function(it,i){it.classList.toggle('active',i===idx);});
}
window.addEventListener('scroll',highlight,{passive:true});highlight();

/* 防複製 */
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);});
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&'cCaAsSpPuUxX'.indexOf(k)>=0)blk(e);
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&'IJCK'.indexOf(k)>=0)blk(e);
  },true);
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-97-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
