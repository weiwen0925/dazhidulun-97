.ch-body p.indent{text-indent:2em;}
.ch-body p strong, .ch-body strong{color:var(--accent-red); font-weight:700;}
.ch-body p em{color:var(--accent); font-style:normal; font-weight:600;}

/* ========== 偈頌 / 經文 ========== */
.classical-text{background:#FFFDF5; border:1px solid #E8E0D0; border-radius:10px;
  padding:18px 24px; margin:16px 0; line-height:1.95; font-size:19.5px; color:var(--text);}
.text-label{display:inline-block; background:#3a2f20; color:#fff;
  padding:4px 14px; border-radius:14px; font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13.5px; letter-spacing:2px; margin-bottom:12px;}
.classical-text p{margin-bottom:10px; line-height:1.95;}
.classical-text p:last-child{margin-bottom:0;}

.verse{background:var(--verseBg); border-left:4px solid var(--verseBd);
  padding:14px 22px; margin:16px 0; line-height:2.2; text-align:center;
  font-size:22px; color:var(--text); white-space:normal;}

/* ========== 卡片 ========== */
.card{background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:18px 22px; margin:14px 0; box-shadow:0 1px 3px rgba(0,0,0,.06);}
.card .card-title{font-family:&quot;Noto Sans TC&quot;,sans-serif; font-size:21.5px;
  font-weight:600; color:var(--accent); margin-bottom:10px; letter-spacing:1px;}
.card .card-content{font-size:20px; line-height:1.9;}
.card.gold-l{border-left:5px solid var(--gold);}
.card.brown-l{border-left:5px solid var(--accent);}

.insight{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border); border-left:5px solid var(--gold);
  border-radius:10px; padding:18px 24px; margin:16px 0;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.insight-label{display:inline-block; background:var(--gold); color:#fff;
  padding:3px 12px; border-radius:12px; font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:12.5px; letter-spacing:2.2px; margin-bottom:10px;}
.insight p{margin:0; font-size:18.5px; line-height:2.1; color:var(--text2);}
.insight-title{font-family:&quot;Noto Sans TC&quot;,sans-serif; font-size:21.5px; color:var(--accent); font-weight:600; margin-bottom:8px;}

/* ========== Bridge ========== */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border); border-left:5px solid var(--gold);
  border-radius:10px; padding:18px 24px; margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8); margin-top:30px;}
.bridge-label{display:inline-block; font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:12.5px; background:var(--gold); color:#fff;
  padding:3px 12px; border-radius:12px; letter-spacing:2.2px; margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0 0 8px; color:var(--text2); line-height:2.1; font-size:18.5px;}
.bridge p:last-child{margin-bottom:0;}

/* ========== 問答 ========== */
.qa{margin:18px 0;}
.qa .q{padding:12px 18px; background:#eaf3fb; border-left:4px solid #3a6d9c;
  border-radius:6px; margin-bottom:8px; color:#1c3d5c; font-size:20px; line-height:1.9;}
.qa .a{padding:12px 18px; background:#fbf5ea; border-left:4px solid var(--accent);
  border-radius:6px; color:var(--text); font-size:20px; line-height:1.9;}
.qa .q strong, .qa .a strong{display:inline-block; min-width:48px;}

/* ========== 流程圖 ========== */
.flow{display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:center;
  background:var(--card); border:1px dashed var(--border); border-radius:10px;
  padding:18px; margin:18px 0;}
.flow.flow-v{flex-direction:column;}
.flow-box{background:#fffdf7; border:1px solid var(--border); border-radius:8px;
  padding:12px 18px; min-width:180px; max-width:680px; text-align:center;
  font-size:17.5px; line-height:1.55; color:var(--text);}
.flow-box small{display:block; color:var(--text-muted); font-size:13.5px; margin-top:4px;}
.flow-box strong{color:var(--accent-red);}
.flow-arrow{color:var(--gold); font-size:24px; font-weight:700;}
.flow-step{background:#fffdf7; border:1px solid var(--border); border-radius:8px;
  padding:12px 18px; min-width:200px; text-align:center; font-size:17.5px;}
.flow-step strong{display:block; color:var(--accent); margin-bottom:4px; font-size:18px;}

/* ========== 格線 ========== */
.two-col{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:14px 0;}
.three-col{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:14px 0;}
.four-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:14px 0;}
.col-card{background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:16px 20px; box-shadow:0 1px 3px rgba(0,0,0,.05);}
.col-card .col-title{font-family:&quot;Noto Sans TC&quot;,sans-serif; font-size:21.5px;
  font-weight:600; color:var(--accent); margin-bottom:8px;}
.col-card .col-content{font-size:19px; line-height:1.85;}

/* ========== Spectrum 光譜 ========== */
.spectrum{display:flex; align-items:stretch; gap:0; margin:22px 0;
  background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden;}
.sp-node{flex:1; padding:16px 14px; text-align:center; font-size:15.5px;}
.sp-node h5{font-size:17px; margin-bottom:6px; color:var(--accent);}
.sp-node small{display:block; color:var(--text-muted); font-size:13px; line-height:1.5; margin-top:4px;}
.sp-mid{background:linear-gradient(135deg,var(--gold),var(--goldL)); color:#fff;}
.sp-mid h5,.sp-mid *{color:#fff!important;}
.sp-mid h5{font-weight:700; text-shadow:0 1px 3px rgba(0,0,0,.35);}
.sp-mid small{color:rgba(255,255,255,.92)!important;}

/* ========== Triangle ========== */
.triangle-diagram{display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:14px; margin:18px 0; align-items:stretch;}
.tri-node{background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:18px 20px; text-align:center; font-size:17px; line-height:1.7;
  display:flex; flex-direction:column; gap:6px; justify-content:center;}
.tri-node h5{font-size:18.5px; color:var(--accent); margin-bottom:4px;}
.tri-node small{font-size:13.5px; color:var(--text-muted);}
.tri-conclusion{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border); border-radius:10px; padding:16px 22px;
  margin-top:14px; text-align:center; font-size:18px; color:var(--accent);
  font-weight:600; letter-spacing:1px;}

/* ========== Domino chain ========== */
.domino-chain{display:flex; flex-wrap:wrap; align-items:center; justify-content:center;
  gap:8px; margin:18px 0;}
.domino{background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:10px 16px; font-size:17px; min-width:120px; text-align:center;
  box-shadow:0 1px 3px rgba(0,0,0,.05);}
.chain-arrow{color:var(--gold); font-weight:700; font-size:20px;}

/* ========== 三昧逐條疏 ========== */
.samadhi-list{margin:16px 0;}
.sam-item{background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:14px 20px; margin-bottom:10px; display:grid;
  grid-template-columns:auto 1fr; gap:14px; align-items:flex-start;}
.sam-num{font-family:&quot;Noto Sans TC&quot;,sans-serif; font-size:14px;
  background:var(--gold); color:#fff; padding:3px 10px; border-radius:12px;
  font-weight:600; letter-spacing:1px; white-space:nowrap; align-self:start; margin-top:2px;}
.sam-body{font-size:18.5px; line-height:1.85;}
.sam-name{font-weight:700; color:var(--accent-red); margin-right:6px;}
.sam-gloss{color:var(--text);}

/* ========== Note 小註 ========== */
.note{background:#fffdf7; border-left:3px solid var(--accentL);
  padding:10px 16px; margin:12px 0; font-size:17.5px; color:var(--text2); border-radius:6px;}

/* ========== Back to top ========== */
#backTop{position:fixed; right:20px; bottom:24px; z-index:99;
  width:44px; height:44px; border-radius:50%; border:none;
  background:var(--accent); color:#fff; font-size:20px; cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.22); opacity:0; transition:opacity .25s;}
#backTop.show{opacity:.92;}

/* ========== Footer ========== */
.site-footer{background:#231d14; color:rgba(212,196,168,.6); text-align:center;
  padding:30px 20px; font-size:15px; letter-spacing:1.5px; line-height:1.7;}
.site-footer p{margin:4px 0; font-size:15px;}

/* ========== HR ========== */
hr{border:none; height:1px; background:linear-gradient(to right,transparent,var(--border),transparent); margin:24px 0;}

/* ========== Next link ========== */
.next-link{display:inline-block; margin-top:24px; padding:10px 22px;
  background:rgba(184,134,11,.12); border:1px solid var(--gold);
  border-radius:24px; color:var(--accent); font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:17px; letter-spacing:2px; text-decoration:none; transition:all .2s;}
.next-link:hover{background:var(--gold); color:#fff;}

/* ========== 響應式 ========== */
@media (max-width:900px){
  #sbToggle{display:flex; align-items:center; justify-content:center;}
  #sb{transform:translateX(-100%); transition:transform .25s;}
  #sb.open{transform:translateX(0);}
  .main{margin-left:0;}
  .hero-title{font-size:40px;}
  .ch-name{font-size:26px;}
  .ch-body{padding:28px 18px;}
  .two-col,.three-col,.four-grid,.triangle-diagram{grid-template-columns:1fr;}
  .toc-grid{grid-template-columns:1fr;}
}
@media (max-width:600px){
  body{font-size:17px;}
  .hero-title{font-size:32px; letter-spacing:3px;}
  .ch-body h2{font-size:24px;}
  .ch-body h3{font-size:20px;}
  .ch-body p{font-size:17.5px;}
}

&lt;div class=&quot;preface&quot;&gt;
&lt;h2 class=&quot;preface-title&quot;&gt;編 者 前 言&lt;/h2&gt;
&lt;div class=&quot;preface-line&quot;&gt;&lt;/div&gt;
&lt;p&gt;《大智度論》卷九十七，是「釋薩陀波崙品第八十八」的後段。經文一開場，是薩陀波崙菩薩在荒野中啼哭——這是整部《般若經》中最具感性張力的一幕：一位菩薩為了求聞般若波羅蜜，七日七夜不食不眠、無有異念，「猶如人喪一子」。但情節急轉，當他憶念曇無竭菩薩到極致時，五十二種三昧瞬間於前現起，他「即見十方無量阿僧祇諸佛為諸菩薩說般若波羅蜜」。從荒野的啼哭，到法界的金剛頂——這是一場感性求道在剎那間轉化為理性實相的質變。&lt;/p&gt;
&lt;p&gt;龍樹菩薩在論中為這場質變做了兩件事：第一，他用「破無明」一個論題串起整品的悖論——若菩薩已破一切法中無明，何故仍須見佛求法？答曰「破無明非齊頭式定義」，乃從須陀洹到佛之間的階梯式破除；如燈譬喻，燭、燈、明燈、烈日，光明度層層遞進。第二，他將經文中如散珠般的五十二三昧逐條釋名，每一則三昧背後都接通中觀的二諦結構：有些是觀「空性」（第一義諦）、有些是觀「假名」（世俗諦）、有些是觀「中道」（二諦圓融）。&lt;/p&gt;
&lt;p&gt;本品因此可被讀為一份「菩薩道高階操作手冊」——它不是抽象的理論演繹，而是把《般若經》的求道情節與《中論》的二諦哲學完美接軌，在散狀的名相背後架起一座結構化的中觀矩陣。本頁將龍樹的論文、經文原典與當代研究者所繪的「金剛多維矩陣」三者整合為七章，按「卷→品→章→節」的層級依序展開，讓讀者既能逐字讀龍樹釋名，也能在矩陣全景中找到每一個三昧的座標。&lt;/p&gt;
&lt;/div&gt;

&lt;section class=&quot;chapter&quot; id=&quot;chapter-1&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 第四品 · 第一章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;從啼哭到金剛頂&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;全品總攬 · 本品的定位、骨幹與三大研究模塊&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;div class=&quot;bridge&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;本章要旨&lt;/div&gt;
&lt;p&gt;本章先為讀者建立一張「閱讀地圖」：本品在《大智度論》九十七卷的位置、它要解決的核心命題、以及貫串論主問答與五十二三昧的三大研究模塊。讀者掌握了這張地圖，再進入第二章的經文與第三章以後的逐條疏解時，就不會在散珠般的名相中迷失方向。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第一節　本品在《大智度論》卷九十七的定位&lt;/h2&gt;
&lt;p&gt;《大智度論》卷九十七的題目是「&lt;strong&gt;釋薩陀波崙品第八十八之餘&lt;/strong&gt;」。「之餘」意味著本品緊接著前面已展開過的薩陀波崙品，繼續疏解後段經文。在《摩訶般若波羅蜜經》中，「常啼菩薩品」（薩陀波崙 Sadāprarudita）與「曇無竭品」（Dharmodgata）是整部般若經接近結尾的兩品，承擔著整部般若文獻的&lt;em&gt;實踐性收束&lt;/em&gt;——它把前面數十卷的義理，回落到一位具體菩薩的求法歷程上。&lt;/p&gt;
&lt;p&gt;就本品的內容範圍而言，可分為兩大段：&lt;/p&gt;
&lt;div class=&quot;two-col&quot;&gt;
&lt;div class=&quot;col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;經文段&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;薩陀波崙在荒野中啼哭，發七日七夜不眠之願；空中有佛指引他東行五百由旬至「眾香城」；在憶念曇無竭菩薩到極致之際，&lt;strong&gt;五十二種三昧瞬間現前&lt;/strong&gt;，並見十方無量阿僧祇諸佛為諸菩薩說般若。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;論主釋名段&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;龍樹先以「&lt;strong&gt;破無明&lt;/strong&gt;」一問開場，對「已得破諸法無明者何用見佛」這一悖論作答；接著對五十二三昧逐條釋名，把每一則名相背後的觀法、所斷、所證，扎扎實實地解開。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;h2&gt;第二節　文本骨幹與三大研究模塊&lt;/h2&gt;
&lt;p&gt;本品看似散開的內容，事實上由&lt;strong&gt;一個核心悖論&lt;/strong&gt;與&lt;strong&gt;三大模塊&lt;/strong&gt;構成。當代研究者將其整理為以下骨架：&lt;/p&gt;
&lt;div class=&quot;triangle-diagram&quot;&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;模塊一&lt;/h5&gt;
&lt;strong&gt;破無明的階次悖論&lt;/strong&gt;
&lt;small&gt;已破無明何用見佛？論主以階梯式破除回應，建立修行位階矩陣（須陀洹 vs 阿羅漢 vs 新發意菩薩 vs 大菩薩 vs 佛）。&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;模塊二&lt;/h5&gt;
&lt;strong&gt;菩薩心法之現象學&lt;/strong&gt;
&lt;small&gt;從「啼哭求法」到「無量三昧現前」的關鍵質變，特別解析「不住無為」「如幻威勢」等核心三昧背後的實踐心法。&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;模塊三&lt;/h5&gt;
&lt;strong&gt;構建中觀記憶儀表板&lt;/strong&gt;
&lt;small&gt;以《中論》二諦與八不為座標軸，將五十二三昧降維分類為觀空、觀假、觀中三大類，建立可記憶的研究地圖。&lt;/small&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-conclusion&quot;&gt;三模塊共同回答一個問題：菩薩如何從「感性的求法」躍升為「理性的法界連線」&lt;/div&gt;
&lt;h2&gt;第三節　核心命題：從「感性的啼哭」到「理性的三昧矩陣」&lt;/h2&gt;
&lt;p&gt;本品最具戲劇張力的設計，在於它把整段經文設定成&lt;strong&gt;一場質變的瞬間&lt;/strong&gt;。經文一開始，薩陀波崙的形象是「空中聲」消失後的失措、是七日七夜不眠的執著、是「猶如人喪一子」的感性極致。然而當他憶念曇無竭到「無有異心」、「但作是願」的最深處，五十二種三昧並非依序進入，而是&lt;em&gt;同時&lt;/em&gt;「現在前」。&lt;/p&gt;
&lt;div class=&quot;flow flow-v&quot;&gt;
&lt;div class=&quot;flow-box&quot;&gt;&lt;strong&gt;感性的極致&lt;/strong&gt;&lt;br/&gt;啼哭憂愁、七日七夜不念疲極&lt;small&gt;對法的極度渴求與執著&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-box&quot;&gt;&lt;strong&gt;關鍵質變&lt;/strong&gt;&lt;br/&gt;「念曇無竭菩薩，一切法中得無礙知見已」&lt;small&gt;突破執著盲區，瞬間解鎖&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-box&quot;&gt;&lt;strong&gt;理性的全景&lt;/strong&gt;&lt;br/&gt;無量三昧門現在前 · 即見十方諸佛說法&lt;small&gt;諸法實相的現證與運用&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;insight&quot;&gt;
&lt;div class=&quot;insight-label&quot;&gt;本品核心命題&lt;/div&gt;
&lt;p&gt;&lt;strong&gt;菩薩求法的圓滿不在於「找到答案」，而在於「打開接收答案的能力」。&lt;/strong&gt;啼哭是因為執著於「我何時能聽聞」；當這個「我」與「聞」的二分鬆動，整個法界其實一直在說法。五十二三昧並不是新獲得的功能，而是這份本來的接收能力一次性顯露出來的截面。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;chapter&quot; id=&quot;chapter-2&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 第四品 · 第二章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;大智度論卷九十七第四品 · 經文原典&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;薩陀波崙東行求法 · 念曇無竭即入無量三昧&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;div class=&quot;bridge&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;本章要旨&lt;/div&gt;
&lt;p&gt;本章呈現本品的經文段，按情節分四節：薩陀波崙的東行立志、空中佛的指引、念曇無竭的入定、以及五十二三昧名相的全錄。第四節的三昧清單將成為第六章逐條釋名的索引——讀者可在這一節先建立完整的名相地圖。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第一節　經文 · 薩陀波崙東行求法 · 七日七夜立志&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經 文&lt;/span&gt;
&lt;p&gt;「爾時，薩陀波崙菩薩受是空中教已，從是東行。不久，復作是念：『我云何不問空中聲：「我當何處去？去當遠近？當從誰聞般若波羅蜜？」』是時即住，啼哭憂愁，作是念：『我住是中，過一日一夜，若二、三、四、五、六、七日七夜，&lt;strong&gt;不念疲極，乃至不念飢渴、寒熱，不聞聽受般若波羅蜜因緣，終不起也！&lt;/strong&gt;』&lt;/p&gt;
&lt;p&gt;「須菩提！譬如人有一子卒死，憂愁苦毒，唯懷懊惱，不生餘念。如是，須菩提！薩陀波崙菩薩爾時無有異心，但念：『我何時當得聞般若波羅蜜？我云何不問空中聲：「我應何處去？去當遠近？當從誰聞般若波羅蜜？」』」&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;note&quot;&gt;這一段確立了本品的&lt;strong&gt;感性基調&lt;/strong&gt;：薩陀波崙是因為錯失「問詳細路線」的機會而陷入七日七夜的不眠之願。這份「執著於聞法」的力量本身，正是後文質變的伏筆。&lt;/div&gt;
&lt;h2&gt;第二節　經文 · 空中佛指引 · 眾香城與曇無竭菩薩&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經 文&lt;/span&gt;
&lt;p&gt;「須菩提！薩陀波崙菩薩如是愁念時，空中有佛，語薩陀波崙菩薩言：『善哉！善哉！善男子！過去諸佛行菩薩道時，求般若波羅蜜，亦如汝今日。善男子！汝以是勤精進愛樂法故，從是東行，&lt;strong&gt;去此五百由旬，有城名眾香&lt;/strong&gt;。其城七重，七寶莊嚴；臺觀、欄楯，皆以七寶校飾……其城四邊，流池清淨，冷暖調適……是諸眾生宿業所致，乘此寶船娛樂遊戲。』&lt;/p&gt;
&lt;p&gt;「『善男子！是眾香城中有大高臺，&lt;strong&gt;曇無竭菩薩摩訶薩宮舍在上&lt;/strong&gt;。其宮縱廣一由旬，皆以七寶校成……其宮舍中，有四種娛樂園：一名常喜，二名離憂，三名華飾，四名香飾。一一園中各有八池：一名賢，二名賢上，三名歡喜，四名喜上，五名安隱，六名多安隱，七名遠離，&lt;strong&gt;八名阿鞞跋致&lt;/strong&gt;。』&lt;/p&gt;
&lt;p&gt;「『曇無竭菩薩與六萬八千婇女，五欲具足，共相娛樂；及城中男女俱入常喜等園、賢等池中，五欲具足，共相娛樂。善男子！曇無竭菩薩與諸婇女遊戲娛樂已，&lt;strong&gt;日三時說般若波羅蜜&lt;/strong&gt;。眾香城內男女大小，於其城中多聚人處敷大法座……當是時中，眾生以是因緣故，皆不墮惡道，不退轉於阿耨多羅三藐三菩提。』&lt;/p&gt;
&lt;p&gt;「『汝善男子！往趣曇無竭菩薩，當聞般若波羅蜜。善男子！&lt;strong&gt;曇無竭菩薩世世是汝善知識&lt;/strong&gt;，能教汝阿耨多羅三藐三菩提，示、教、利、喜。是曇無竭菩薩本求般若波羅蜜時，亦如汝今。汝去莫計晝夜，莫生障礙心，汝不久當得聞般若波羅蜜！』」&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;note&quot;&gt;空中佛的開示中，「&lt;strong&gt;八池之第八名阿鞞跋致&lt;/strong&gt;」（不退轉）是個重要伏筆：這座城市本身就是不退轉地的象徵；而「日三時說般若波羅蜜」說明此處的般若不是稀有資源，而是日常運作的法界節奏。&lt;/div&gt;
&lt;h2&gt;第三節　經文 · 念曇無竭即入無量三昧門&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經 文&lt;/span&gt;
&lt;p&gt;「爾時，薩陀波崙菩薩摩訶薩歡喜心悅，作是念：『&lt;strong&gt;我當何時得見是善男子，得聞般若波羅蜜？&lt;/strong&gt;』須菩提！譬如有人為毒箭所中，更無餘念，唯念：『何時當得良醫，拔出毒箭，除我此苦？』如是，須菩提！薩陀波崙菩薩摩訶薩更無餘念，但作是願：『我何時當得見曇無竭菩薩，令我得聞般若波羅蜜？我聞是般若波羅蜜，&lt;strong&gt;斷諸有心&lt;/strong&gt;。』&lt;/p&gt;
&lt;p&gt;「是時，薩陀波崙菩薩於是處住念曇無竭菩薩，&lt;strong&gt;一切法中得無礙知見已，即得無量三昧門現在前&lt;/strong&gt;……薩陀波崙菩薩住是諸三昧中，&lt;strong&gt;即見十方無量阿僧祇諸佛為諸菩薩摩訶薩說般若波羅蜜&lt;/strong&gt;。」&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;insight&quot;&gt;
&lt;div class=&quot;insight-label&quot;&gt;經文關鍵&lt;/div&gt;
&lt;p&gt;「&lt;strong&gt;於是處住念&lt;/strong&gt;」「&lt;strong&gt;一切法中得無礙知見已&lt;/strong&gt;」「&lt;strong&gt;即得無量三昧門現在前&lt;/strong&gt;」三句話是整段質變的軸心。三昧不是漸次取得，而是「念到極致」的瞬間整體現前；不是「我去學會」，而是「無礙知見」的副產品。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第四節　經文 · 五十二三昧名相全錄&lt;/h2&gt;
&lt;p&gt;以下為薩陀波崙當下現前的諸三昧，按經文出現順序編號：&lt;/p&gt;
&lt;div class=&quot;samadhi-list&quot;&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;01&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法性觀三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;02&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法性不可得三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;03&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;破諸法無明三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;04&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法不異三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;05&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法不壞自在三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;06&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法能照明三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;07&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法離闇三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;08&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法無異相續三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;09&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法不可得三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;10&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;散華三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;11&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法無我三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;12&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;如幻威勢三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;13&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;得如鏡像三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;14&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;得一切眾生語言三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;15&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;一切眾生歡喜三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;16&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;入分別音聲三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;17&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;得種種語言字句莊嚴三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;18&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;無畏三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;19&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;性常默然三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;20&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;得無礙解脫三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;21&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;離塵垢三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;22&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;名字語句莊嚴三昧&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;

&lt;/section&gt;

&lt;section class=&quot;chapter&quot; id=&quot;chapter-3&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 第四品 · 第三章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;破無明的階次悖論&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;階梯式破除模型 · 燈譬喻 · 二乘大乘階層矩陣&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;div class=&quot;bridge&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;本章要旨&lt;/div&gt;
&lt;p&gt;論主開場即拋出本品最尖銳的悖論：薩陀波崙既已得「破諸法無明三昧」，何故仍須跋涉五百由旬去聽曇無竭講般若？龍樹的回應構成整個大乘修行論的精彩展示——「破無明」不是一次性的開關，而是一條從須陀洹到佛之間的漸層階梯。本章把論主的這段問答，配上「燈譬喻」與當代研究者繪製的階層矩陣，完整呈現。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第一節　論主設問：已破無明者何用見佛？&lt;/h2&gt;
&lt;div class=&quot;qa&quot;&gt;
&lt;div class=&quot;q&quot;&gt;&lt;strong&gt;問曰：&lt;/strong&gt;若是菩薩破一切法中無明，此人尚不須見佛，何用至曇無竭菩薩所？&lt;/div&gt;
&lt;/div&gt;
&lt;p&gt;這個問題並不是空泛的詰問，而是準確地指向一個閱讀經文時容易產生的&lt;em&gt;誤讀&lt;/em&gt;：經文剛說「即得無量三昧門現在前」「即見十方諸佛說法」，似乎薩陀波崙已經到達究竟；那為何前後文又安排他必須繼續東行至眾香城？&lt;/p&gt;
&lt;div class=&quot;card brown-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;悖論的真正所在&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;如果「破諸法無明三昧」等於「無明斷盡」，那薩陀波崙便已是佛——但經文明說他仍是菩薩、仍須求師。這意味著「破無明」這個詞，&lt;strong&gt;必有層次差別&lt;/strong&gt;，否則經文本身將自相矛盾。&lt;/div&gt;
&lt;/div&gt;
&lt;h2&gt;第二節　龍樹答辯：破無明非齊頭式定義&lt;/h2&gt;
&lt;div class=&quot;qa&quot;&gt;
&lt;div class=&quot;a&quot;&gt;&lt;strong&gt;答曰：&lt;/strong&gt;破無明不唯一種——&lt;strong&gt;有遮令不起亦名為破，有得諸法實相故破無明&lt;/strong&gt;。又無明種數甚多：有菩薩所破分，有佛所破分，有小菩薩所破分、大菩薩所破分；如先說燈譬喻。又須陀洹亦名破無明，乃至阿羅漢方是實破；大乘法中亦如是，新發意菩薩得諸法實相故亦名破無明，乃至佛無明盡破無餘。是故薩陀波崙於佛法中邪見、無明及我見皆盡故，得名破無明三昧，無咎。&lt;/div&gt;
&lt;/div&gt;
&lt;p&gt;龍樹在這段論文中拆出兩個關鍵區分：&lt;/p&gt;
&lt;div class=&quot;two-col&quot;&gt;
&lt;div class=&quot;col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;區分一　兩種「破」&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;&lt;strong&gt;遮令不起&lt;/strong&gt;——以對治力暫時壓伏無明使其不起現行，是淺；&lt;strong&gt;得諸法實相故破&lt;/strong&gt;——徹底見實相，從根剷除種子，是深。同名「破」而義有別。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;區分二　多種「位階」&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;同名「破無明」，須陀洹有須陀洹的破、阿羅漢有阿羅漢的破、新發意菩薩有新發意菩薩的破、大菩薩有大菩薩的破、佛有佛的破。&lt;strong&gt;無明種數甚多&lt;/strong&gt;，破除程度依修行位階而定。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;insight&quot;&gt;
&lt;div class=&quot;insight-label&quot;&gt;論主結論&lt;/div&gt;
&lt;p&gt;薩陀波崙作為新發意菩薩，「於佛法中邪見、無明及我見皆盡」，故得名「破無明三昧」——這是&lt;strong&gt;破除粗重煩惱障&lt;/strong&gt;的破，已經是三昧層級的成就；但它並非「無明盡破無餘」，故仍須見佛、求般若、進斷俱生微細無明，直到佛地。&lt;em&gt;「無咎」&lt;/em&gt;二字，正面回應了悖論：經文沒有矛盾，矛盾源於讀者把「破無明」想成單一定義。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　光明度類比 · 從燭燈到烈日大明&lt;/h2&gt;
&lt;p&gt;龍樹在論中說「&lt;strong&gt;如先說燈譬喻&lt;/strong&gt;」——燈喻是《大智度論》前文反覆使用的重要意象。當代研究者把這段燈喻整理為一條光明度遞進的階梯：&lt;/p&gt;
&lt;div class=&quot;spectrum&quot;&gt;
&lt;div class=&quot;sp-node&quot;&gt;
&lt;h5&gt;燭 光&lt;/h5&gt;
&lt;small&gt;須陀洹／小菩薩&lt;/small&gt;
&lt;small&gt;初破粗顯邪見&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;sp-node&quot;&gt;
&lt;h5&gt;明 燈&lt;/h5&gt;
&lt;small&gt;新發意菩薩&lt;br/&gt;（薩陀波崙）&lt;/small&gt;
&lt;small&gt;得「破無明三昧」&lt;br/&gt;邪見、我見盡&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;sp-node sp-mid&quot;&gt;
&lt;h5&gt;離 闇&lt;/h5&gt;
&lt;small&gt;大菩薩&lt;/small&gt;
&lt;small&gt;破厚無明&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;sp-node&quot;&gt;
&lt;h5&gt;烈 日 大 明&lt;/h5&gt;
&lt;small&gt;佛&lt;/small&gt;
&lt;small&gt;無明盡破無餘&lt;br/&gt;習氣亦盡&lt;/small&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;note&quot;&gt;「無明」依其厚薄、種類、習氣，本就是一條連續光譜。任何一個位階都可以名為「破無明」，但那是該位階能力範圍內的破。把「破無明」誤為一次性開關，是把連續變項看成布林值——這正是論主要矯正的閱讀盲區。&lt;/div&gt;
&lt;h2&gt;第四節　二乘與大乘的破無明階層矩陣&lt;/h2&gt;
&lt;p&gt;把論文進一步整理為二維矩陣，可以更清楚地看見「位階」與「斷惑性質」的對應：&lt;/p&gt;
&lt;div class=&quot;four-grid&quot;&gt;
&lt;div class=&quot;card gold-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;須陀洹&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;破見惑（粗顯邪見），預入聖流；猶有俱生我執。&lt;small style=&quot;display:block;color:var(--text-muted);font-size:14.5px;margin-top:4px&quot;&gt;名「破無明」 · 階層最淺&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card gold-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;阿羅漢&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;見思惑俱斷，於二乘位是「實破」。然習氣未盡，所知障未動。&lt;small style=&quot;display:block;color:var(--text-muted);font-size:14.5px;margin-top:4px&quot;&gt;二乘的終點 · 仍非究竟&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card brown-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;新發意菩薩&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;得諸法實相故名破無明（薩陀波崙之位）；邪見、我見盡，得「破無明三昧」。&lt;small style=&quot;display:block;color:var(--text-muted);font-size:14.5px;margin-top:4px&quot;&gt;大乘起點 · 與阿羅漢有質的不同&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card brown-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;大菩薩&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;破厚無明（離闇三昧）；分破俱生煩惱與所知二障。&lt;small style=&quot;display:block;color:var(--text-muted);font-size:14.5px;margin-top:4px&quot;&gt;已能起大用度生 · 仍有微細無明&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card&quot; style=&quot;border-left:5px solid var(--accent-red);margin-top:14px;&quot;&gt;
&lt;div class=&quot;card-title&quot; style=&quot;color:var(--accent-red);&quot;&gt;佛 地&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;&lt;strong&gt;無明盡破無餘&lt;/strong&gt;——煩惱、所知二障究竟斷盡，連習氣亦淨。「破」的層級至此圓滿。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;insight&quot;&gt;
&lt;div class=&quot;insight-label&quot;&gt;本章洞見&lt;/div&gt;
&lt;p&gt;薩陀波崙得「破無明三昧」之後仍須見曇無竭，並非情節安排上的多餘，而是龍樹刻意藉此&lt;strong&gt;反轉讀者對修行終點的想像&lt;/strong&gt;：&lt;em&gt;每一個「破」都同時是「下一階破」的入口&lt;/em&gt;。修行不是從黑到白的跳躍，而是從燭光向烈日大明的連續攀升——這正是大乘「不住涅槃」的內在動力來源。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;chapter&quot; id=&quot;chapter-4&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 第四品 · 第四章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;菩薩心法之現象學&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;從感性到理性的質變 · 不住無為 · 如幻威勢&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;div class=&quot;bridge&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;本章要旨&lt;/div&gt;
&lt;p&gt;第三章解釋了「破無明」的階梯邏輯，本章則進一步追問：薩陀波崙從「啼哭求法」到「無量三昧現前」之間究竟發生了什麼？論主對五十二三昧的逐條疏解，背後其實貫穿著一條清晰的菩薩心法主軸——&lt;strong&gt;不住無為（留惑潤生）&lt;/strong&gt;與&lt;strong&gt;如幻威勢（大用幻化）&lt;/strong&gt;。本章從這兩個核心三昧切入，呈現菩薩道的「現象學結構」。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第一節　關鍵質變：執著盲區的瞬間解鎖&lt;/h2&gt;
&lt;p&gt;經文中那段「&lt;em&gt;於是處住念曇無竭菩薩，一切法中得無礙知見已，即得無量三昧門現在前&lt;/em&gt;」是整品中最不可忽視的一句。這句經文的順序很關鍵：&lt;/p&gt;
&lt;div class=&quot;flow flow-v&quot;&gt;
&lt;div class=&quot;flow-box&quot;&gt;&lt;strong&gt;於是處住念&lt;/strong&gt;&lt;br/&gt;&lt;small&gt;外在不再奔走，內在專注一境&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-box&quot;&gt;&lt;strong&gt;一切法中得無礙知見&lt;/strong&gt;&lt;br/&gt;&lt;small&gt;分別執著鬆動，知見的「礙」消失&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-box&quot;&gt;&lt;strong&gt;即得無量三昧門現在前&lt;/strong&gt;&lt;br/&gt;&lt;small&gt;不是「我去獲得」，而是本來就在的接收能力一次性顯露&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;insight&quot;&gt;
&lt;div class=&quot;insight-label&quot;&gt;現象學洞見&lt;/div&gt;
&lt;p&gt;薩陀波崙的轉折點，不是學會新東西，而是&lt;strong&gt;放下「我要學」&lt;/strong&gt;。「念曇無竭」念到極致時，&lt;em&gt;能念的我&lt;/em&gt;與&lt;em&gt;所念的法&lt;/em&gt;之間的二分鬆動了——這份鬆動，就是「得無礙知見」。一切三昧不是新發的功能，而是這份本然的接收能力一次性顯露出來的截面。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第二節　不住無為 · 留惑潤生的自在三昧&lt;/h2&gt;
&lt;p&gt;在五十二三昧中，&lt;strong&gt;「諸法不壞自在三昧」&lt;/strong&gt;承載的心法極具大乘特色。論主對它的解釋特別點出一個關鍵動詞——「&lt;em&gt;不證&lt;/em&gt;」：&lt;/p&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;論 文&lt;/span&gt;
&lt;p&gt;「諸法不壞自在三昧」者，得是三昧，觀一切法如、法性、實際、無為相故名不壞。&lt;strong&gt;得是法已，得自在，了了知諸法；為佛道故，不證是法。&lt;/strong&gt;&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;card brown-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;「不證」的關鍵語意&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;菩薩明知「無為」是聖者的歸宿、是寂滅安樂的所在，但他&lt;strong&gt;刻意「知而不證」&lt;/strong&gt;——保留俱生煩惱（留惑），以維持在世俗諦中運作的能力（潤生）。這不是不能證，而是不取證，因為一旦取證便落入聲聞涅槃，無法繼續度生。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;two-col&quot;&gt;
&lt;div class=&quot;col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;聲聞道的選擇&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;見實相 → 即證 → 入無為 → 不再受身。終點是個人解脫。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;菩薩道的選擇&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;見實相 → 自在 → 不證無為 → 留惑潤生。&lt;strong&gt;用「不取證」的自由來完成「無量度生」的任務&lt;/strong&gt;。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　如幻大用 · 鏡像三昧 與 如幻威勢三昧&lt;/h2&gt;
&lt;p&gt;不住無為解決了「為何不入涅槃」，&lt;strong&gt;「得如鏡像三昧」&lt;/strong&gt;與&lt;strong&gt;「如幻威勢三昧」&lt;/strong&gt;則回答了「既然不入涅槃，要怎麼運作世界」。論主把這兩則三昧連起來疏解，形成一組「&lt;em&gt;本質認知 + 大用幻化&lt;/em&gt;」的對偶：&lt;/p&gt;
&lt;div class=&quot;four-grid&quot;&gt;
&lt;div class=&quot;card gold-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;得如鏡像三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;&lt;strong&gt;本質認知&lt;/strong&gt;：觀三界所有，如鏡中像，虛誑無實。（皆是空幻）&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card gold-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;如幻威勢三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;&lt;strong&gt;大用幻化&lt;/strong&gt;：能種種變化身。如大幻師，能引導眾生發希有心；以幻力故，能轉一國人心。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;insight&quot;&gt;
&lt;div class=&quot;insight-label&quot;&gt;本章心法&lt;/div&gt;
&lt;p&gt;菩薩的遊戲神通，建立在&lt;strong&gt;「鏡像 + 幻師」的雙環&lt;/strong&gt;之上：先以鏡像三昧確認世界的虛誑性質——既然是鏡中像，就無需逃避；接著以如幻威勢三昧，化身入鏡像之中，把假名與幻相&lt;em&gt;反向運用&lt;/em&gt;為度化眾生的演算工具。這就是大乘「即俗而真」的精神：不離鏡像來度化鏡像中的眾生，而自身始終不被鏡像所縛。&lt;/p&gt;
&lt;/div&gt;
&lt;hr/&gt;
&lt;p&gt;第四節之前還可以看到本章的整體節奏：第一節描寫質變的瞬間，第二節說明「為何不取證」，第三節說明「不證之後如何運作」。這三節合起來，正是大乘菩薩道「無住生心」「不取於相，如如不動」的完整現象學結構——這也為下一章的「中觀記憶儀表板」鋪好了哲學底座。&lt;/p&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;chapter&quot; id=&quot;chapter-5&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 第四品 · 第五章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;構建中觀記憶儀表板&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;五十二三昧的二諦定位 · 觀空 / 觀假 / 觀中 三類映射&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;div class=&quot;bridge&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;本章要旨&lt;/div&gt;
&lt;p&gt;面對經文中數十種令人眼花繚亂的三昧名相，必須導入龍樹菩薩《中論》的「二諦」與「八不」架構進行降維打擊。這不僅是名相的堆疊，而是一套嚴密的「&lt;strong&gt;空—假—中&lt;/strong&gt;」操作系統。本章建立一份可記憶的研究地圖：把五十二三昧分為觀空、觀假、觀中三大類，讓每一個三昧都能在中觀座標上找到精確位置。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第一節　降維打擊：以「二諦／八不」收攝五十二三昧&lt;/h2&gt;
&lt;p&gt;《大智度論》卷九十七的三昧群，表面是禪定名目的羅列，背後卻是龍樹整合《般若》與《中論》的精彩作業。座標軸只有三條：&lt;/p&gt;
&lt;div class=&quot;triangle-diagram&quot;&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;第一義諦&lt;/h5&gt;
&lt;strong&gt;空 / 破&lt;/strong&gt;
&lt;small&gt;對應《中論》無生無滅。本質在於徹底的「破執」。&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;世俗諦&lt;/h5&gt;
&lt;strong&gt;假名 / 立用&lt;/strong&gt;
&lt;small&gt;諸法無自性、緣起如幻；於畢竟空建立如幻大用。&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;中道&lt;/h5&gt;
&lt;strong&gt;二諦圓融 / 通達不二&lt;/strong&gt;
&lt;small&gt;離有無二邊，不著世俗，不住涅槃。&lt;/small&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-conclusion&quot;&gt;五十二三昧 = 空、假、中三類觀法的具體實踐截面&lt;/div&gt;
&lt;h2&gt;第二節　類別一 · 觀「空性」(第一義諦)&lt;/h2&gt;
&lt;div class=&quot;insight&quot;&gt;
&lt;div class=&quot;insight-label&quot;&gt;核心口訣&lt;/div&gt;
&lt;p style=&quot;font-size:21px;text-align:center;color:var(--accent);&quot;&gt;&lt;strong&gt;鏡像虛空，畢竟無我&lt;/strong&gt;&lt;/p&gt;
&lt;/div&gt;
&lt;p&gt;本類三昧對應《中論》「&lt;em&gt;諸法不自生，亦不從他生，不共不無因，是故知無生&lt;/em&gt;」的徹底破執精神。其哲學意涵在於：透過徹底的「無生」「無我」「無相」「無分別」的觀照，掃除一切對「實有」的取著，包括對佛法本身的取著。&lt;/p&gt;
&lt;h3&gt;代表三昧（Samadhi Mapped）&lt;/h3&gt;
&lt;div class=&quot;four-grid&quot;&gt;
&lt;div class=&quot;card gold-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;諸法不可得三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;即一切法空相應三昧。任何法在究竟層次上都無可取得。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card gold-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;諸法無我三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;觀一切法無我。從根本上拔除「我」的執取。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card gold-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;如虛空三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;身及外法皆如虛空，皆得自在。內外平等，無所立足。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card gold-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;離一切著三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;離一切相故，於一切法亦不著。無相→無著，是空性的徹底化。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card gold-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;諸法無分別見三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;若分別諸法，即生憎愛心；得是三昧者，見一切法不作分別。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card gold-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;離諸見三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;&lt;strong&gt;系統性的解構&lt;/strong&gt;。詳見下方焦點解析。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;h3&gt;焦點解析 · 「離諸見」與「無分別」的極致&lt;/h3&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;論 文&lt;/span&gt;
&lt;p&gt;「離諸見三昧」者，「見」者，六十二邪見，及色等法中取相，&lt;strong&gt;乃至佛見、法見、僧見、涅槃見，皆名為見。&lt;/strong&gt;所以者何？取相能生著心故。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;insight&quot;&gt;
&lt;div class=&quot;insight-label&quot;&gt;大乘般若的徹底掃蕩性&lt;/div&gt;
&lt;p&gt;這條疏解極具震撼力——&lt;strong&gt;不僅要清除世俗的錯誤執著（邪見），連系統升級的高階神聖概念（佛見、法見、僧見、涅槃見）也必須一併解構&lt;/strong&gt;。理由是「取相能生著心」——任何「相」一旦被緊握，就成為新的執著起點。這是般若波羅蜜對所有「立場」的最終透視。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　類別二 · 觀「假名」(世俗諦)&lt;/h2&gt;
&lt;div class=&quot;insight&quot;&gt;
&lt;div class=&quot;insight-label&quot;&gt;核心口訣&lt;/div&gt;
&lt;p style=&quot;font-size:21px;text-align:center;color:var(--accent);&quot;&gt;&lt;strong&gt;如幻變化，莊嚴語言&lt;/strong&gt;&lt;/p&gt;
&lt;/div&gt;
&lt;p&gt;本類三昧對應世俗諦的「&lt;em&gt;立用&lt;/em&gt;」面向。諸法雖無自性，但緣起如幻；菩薩於畢竟空中建立如幻大用，把假名工具最大化地運用於度生。&lt;/p&gt;
&lt;h3&gt;代表三昧（Samadhi Mapped）&lt;/h3&gt;
&lt;div class=&quot;four-grid&quot;&gt;
&lt;div class=&quot;card brown-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;得一切眾生語言三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;能解一切眾生語言。是溝通的最底層協議。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card brown-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;名字語句莊嚴三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;能種種莊嚴偈句語言說法。語言是被塑形的容器。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card brown-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;如幻威勢三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;能種種變化身，如大幻師，能轉一國人心。假相反過來成為大用。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card brown-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;散華三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;於十方佛前能以七寶華散佛。儀式性莊嚴亦是法的展現。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card brown-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;轉眼三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;魔及魔民欲見菩薩短者，轉之令作好見。逆境亦可被轉換。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card brown-l&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;花莊嚴三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;見十方佛坐七寶蓮花上，於虛空中雨寶蓮花於諸佛上。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;h3&gt;焦點解析 · 溝通與莊嚴的演算法&lt;/h3&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;論 文 · 得種種語言字句莊嚴三昧&lt;/span&gt;
&lt;p&gt;得是三昧者，&lt;strong&gt;義理雖淺，能莊嚴字句語言，令人歡喜，何況深義！&lt;/strong&gt;&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;論 文 · 一切眾生歡喜三昧&lt;/span&gt;
&lt;p&gt;入是三昧，能轉眾生瞋心令歡喜。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;insight&quot;&gt;
&lt;div class=&quot;insight-label&quot;&gt;世間運作的能力&lt;/div&gt;
&lt;p&gt;這一組三昧揭示了菩薩在世俗諦的&lt;strong&gt;核心技能&lt;/strong&gt;：將深奧真理轉譯、包裝、動態化解眾生的抗拒心理。深義之所以可被傳達，關鍵不在義理本身，而在&lt;em&gt;傳達的技藝&lt;/em&gt;——能莊嚴字句令人歡喜，便能無形中推開受眾的心防。這是「方便善巧」的具體操作層。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第四節　類別三 · 觀「中道」(二諦圓融)&lt;/h2&gt;
&lt;div class=&quot;insight&quot;&gt;
&lt;div class=&quot;insight-label&quot;&gt;核心口訣&lt;/div&gt;
&lt;p style=&quot;font-size:21px;text-align:center;color:var(--accent);&quot;&gt;&lt;strong&gt;不壞自在，畢入法性&lt;/strong&gt;&lt;/p&gt;
&lt;/div&gt;
&lt;p&gt;本類三昧對應二諦圓融、通達不二的中道。離有無二邊，不著世俗、不住涅槃；同時保有對空性的徹底理解與對假名的純熟運用。&lt;/p&gt;
&lt;h3&gt;代表三昧（Samadhi Mapped）&lt;/h3&gt;
&lt;div class=&quot;four-grid&quot;&gt;
&lt;div class=&quot;card&quot; style=&quot;border-left:5px solid var(--gold-light);&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;見諸法三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;以見世諦及第一義諦知諸法。雙重解碼，同時處理兩種真理的重疊運算。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card&quot; style=&quot;border-left:5px solid var(--gold-light);&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;諸法不壞自在三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;觀一切法如、法性、實際、無為相故名不壞；得是法已得自在，為佛道故不證是法。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card&quot; style=&quot;border-left:5px solid var(--gold-light);&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;能達諸法三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;乃至諸法如、法性、實際中通達不住，乃至諸法平等。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card&quot; style=&quot;border-left:5px solid var(--gold-light);&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;隨一切堅固三昧&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;諸法實相名堅固；得是三昧者隨諸法實相，不隨餘法。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;h3&gt;焦點解析 · 雙重解碼與絕對定錨&lt;/h3&gt;
&lt;div class=&quot;two-col&quot;&gt;
&lt;div class=&quot;col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;見諸法三昧 · 雙重解碼&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;「以見世諦及第一義諦知諸法。」——&lt;strong&gt;不偏廢任何一邊&lt;/strong&gt;，同時運作兩套真理系統。世諦讓他與眾生同行，第一義諦讓他不被眾生所縛。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;隨一切堅固三昧 · 絕對定錨&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;「諸法實相名堅固……隨諸法實相，不隨餘法。」——在千變萬化的幻象與絕對的空無之間，&lt;strong&gt;唯一追隨實相&lt;/strong&gt;，這是不退轉的核心動力。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;insight&quot;&gt;
&lt;div class=&quot;insight-label&quot;&gt;本章總攬&lt;/div&gt;
&lt;p&gt;觀空（破）+ 觀假（立）+ 觀中（圓融）這三條軸線，把五十二三昧降維為一張可閱讀的中觀儀表板。任何一則三昧，都能在這張儀表板上找到自己的座標——而&lt;em&gt;每一個三昧都不是孤立的禪定&lt;/em&gt;，而是中觀世界觀的一個操作截面。第六章的逐條釋名，將以這份儀表板作為閱讀框架。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;chapter&quot; id=&quot;chapter-6&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 第四品 · 第六章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;五十二三昧 · 龍樹釋名疏解全錄&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;逐條疏解 · 從破諸法無明到見諸佛三昧&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;div class=&quot;bridge&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;本章要旨&lt;/div&gt;
&lt;p&gt;本章把龍樹《大智度論》中對五十二三昧的逐條釋名完整收錄，按 04.docx 的順序編號分為十一節閱讀。每一條都標註了三昧名與釋義，並在每節結尾以一段「節要」提示該批三昧的共通義趣，讓讀者在閱讀時既能保留原典的疏解精度，又能掌握龍樹編排的心法走向。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第一節　破諸法無明 · 諸法不異 · 諸法不壞自在&lt;/h2&gt;
&lt;div class=&quot;samadhi-list&quot;&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;破無明&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;破諸法無明三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;破無明不唯一種：有遮令不起亦名為破，有得諸法實相故破無明。又無明種數甚多：有菩薩所破分，有佛所破分，有小菩薩所破分、大菩薩所破分，如先說燈譬喻。又須陀洹亦名破無明，乃至阿羅漢方是實破；大乘法中亦如是，新發意菩薩得諸法實相故亦名破無明，乃至佛無明盡破無餘。是故薩陀波崙於佛法中邪見、無明及我見皆盡故，得名破無明三昧，無咎。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;不異&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法不異三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧，觀一切法一相，所謂無相。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;不壞自在&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法不壞自在三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧，觀一切法如、法性、實際、無為相故名不壞。得是法已，得自在，了了知諸法；為佛道故，不證是法。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;note&quot;&gt;&lt;strong&gt;節要&lt;/strong&gt;：本節三條，是論主對開場「破無明」悖論的延續。「不異」「不壞自在」二三昧為「不證」立下哲學底座——即使見實相也不取證，正是大乘菩薩留惑潤生的根據。&lt;/div&gt;
&lt;h2&gt;第二節　諸法能照明 · 離闇 · 無異相續 · 不可得&lt;/h2&gt;
&lt;div class=&quot;samadhi-list&quot;&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;能照明&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法能照明三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;以總相、別相知一切法。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;離闇&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法離闇三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;無明有二種：一者厚，二者薄。薄者名無明，厚者名黑闇。&lt;strong&gt;破厚無明故名離闇，先破薄無明故名破諸法無明。&lt;/strong&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;無異相續&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法無異相續三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;五眾念念滅，相似相續生；死時，相續生而不相似。得是三昧，知諸法念念相續法不異。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;不可得&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法不可得三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;即是一切法空相應三昧。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;note&quot;&gt;&lt;strong&gt;節要&lt;/strong&gt;：本節最值得注意的是「離闇」與「破諸法無明」二者的厚薄分判——破薄為破無明、破厚為離闇——這正好對應第三章的階梯破除模型。&lt;/div&gt;
&lt;h2&gt;第三節　散華 · 諸法無我 · 如幻威勢 · 如鏡像&lt;/h2&gt;
&lt;div class=&quot;samadhi-list&quot;&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;散華&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;散華三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，於十方佛前，能以七寶華散佛。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;無我&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法無我三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;觀一切法無我。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;如幻威勢&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;如幻威勢三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，能種種變化身。如大幻師，能引導眾生發希有心；如大幻師，以幻力故，能轉一國人心。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;如鏡像&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;得如鏡像三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，觀三界所有，如鏡中像，虛誑無實。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;note&quot;&gt;&lt;strong&gt;節要&lt;/strong&gt;：本節構成第四章所說的「&lt;em&gt;本質認知 + 大用幻化&lt;/em&gt;」核心對偶——鏡像確認虛幻性質，如幻威勢轉幻為用。&lt;/div&gt;
&lt;h2&gt;第四節　眾生語言 · 歡喜 · 分別音聲 · 字句莊嚴&lt;/h2&gt;
&lt;div class=&quot;samadhi-list&quot;&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;眾生語言&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;得一切眾生語言三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧故，能解一切眾生語言。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;歡喜&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;一切眾生歡喜三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;入是三昧，能轉眾生瞋心令歡喜。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;分別音聲&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;入分別音聲三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;入是三昧中，皆能分別一切天、人音聲大小、麁細等。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;字句莊嚴&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;得種種語言字句莊嚴三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，&lt;strong&gt;義理雖淺，能莊嚴字句語言，令人歡喜，何況深義！&lt;/strong&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;note&quot;&gt;&lt;strong&gt;節要&lt;/strong&gt;：四條皆屬世俗諦類「假名／立用」的具體應用層——溝通技藝、情緒轉化、聲音辨識、語言美學，是菩薩面對眾生的工具集。&lt;/div&gt;
&lt;h2&gt;第五節　無畏 · 默然 · 無礙解脫 · 離塵垢&lt;/h2&gt;
&lt;div class=&quot;samadhi-list&quot;&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;無畏&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;無畏三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，不畏一切魔民、外道、論師及諸煩惱。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;默然&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;性常默然三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;入是三昧者，常默然攝心；為度眾生故，隨所應聞而出音聲，如天妓樂，應意而出。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;無礙解脫&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;得無礙解脫三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，於一切法中得無礙智慧。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;離塵垢&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;離塵垢三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，諸煩惱、結使塵垢皆滅，&lt;strong&gt;即是無生法忍三昧&lt;/strong&gt;。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;note&quot;&gt;&lt;strong&gt;節要&lt;/strong&gt;：「離塵垢即是無生法忍三昧」是極重要的等同——點明這一群三昧已觸及大乘根本忍位。&lt;/div&gt;
&lt;h2&gt;第六節　名字語句 · 見諸法 · 諸法無礙頂 · 如虛空&lt;/h2&gt;
&lt;div class=&quot;samadhi-list&quot;&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;名字語句&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;名字語句莊嚴三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，能種種莊嚴偈句語言說法。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;見諸法&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;見諸法三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;入是三昧者，&lt;strong&gt;以見世諦及第一義諦知諸法&lt;/strong&gt;。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;無礙頂&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法無礙頂三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;如人在山頂遍觀四方；菩薩住是三昧中，普見一切諸法無礙。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;如虛空&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;如虛空三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;入是三昧者，身及外法皆如虛空，皆得自在。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;note&quot;&gt;&lt;strong&gt;節要&lt;/strong&gt;：「無礙頂」「如虛空」二條，是「金剛頂」意象的內在對應——觀位置的最高、所觀範圍的最廣。&lt;/div&gt;
&lt;h2&gt;第七節　如金剛 · 不畏著色 · 得勝 · 轉眼 · 畢法性&lt;/h2&gt;
&lt;div class=&quot;samadhi-list&quot;&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;如金剛&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;如金剛三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;如金剛能破諸山；是三昧亦如是，能破障礙六波羅蜜法，直至佛道。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;不畏著色&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;不畏著色三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，乃至天色尚不著，何況餘色！&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;得勝&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;得勝三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;欲有所作，皆能得勝不負。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;轉眼&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;轉眼三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，魔及魔民欲見菩薩短者，轉之令作好見。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;畢法性&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;畢法性三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，見一切法畢入法性中。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;note&quot;&gt;&lt;strong&gt;節要&lt;/strong&gt;：「如金剛」是本品標題「金剛頂」的根據——金剛能破諸山，喻菩薩能破六度修行的一切障礙。&lt;/div&gt;
&lt;h2&gt;第八節　能與安隱 · 師子吼 · 勝一切眾生 · 花莊嚴&lt;/h2&gt;
&lt;div class=&quot;samadhi-list&quot;&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;能與安隱&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;能與安隱三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧，雖往來六道迴轉，&lt;strong&gt;自知必當作佛，安樂無憂&lt;/strong&gt;。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;師子吼&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;師子吼三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;入是三昧者，皆能降伏一切魔民、外道，無敢當者。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;勝一切&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;勝一切眾生三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧，於一切眾生最勝。一切有二種：一者名字一切，二者實一切。&lt;strong&gt;於三界著心凡夫及聲聞、辟支佛及初發意未得是三昧者中勝&lt;/strong&gt;，故言一切。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;花莊嚴&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;花莊嚴三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，見十方佛，坐七寶蓮花上，於虛空中，雨寶蓮花於諸佛上。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;note&quot;&gt;&lt;strong&gt;節要&lt;/strong&gt;：「能與安隱」這條尤其動人——往來六道而安樂無憂，正是「&lt;em&gt;不住涅槃而不取苦&lt;/em&gt;」的菩薩本色。&lt;/div&gt;
&lt;h2&gt;第九節　斷疑 · 隨堅固 · 出諸法神通 · 能達諸法&lt;/h2&gt;
&lt;div class=&quot;samadhi-list&quot;&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;斷疑&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;斷疑三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，雖未得佛，&lt;strong&gt;能斷一切眾生所疑&lt;/strong&gt;。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;隨堅固&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;隨一切堅固三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;諸法實相名堅固；得是三昧者，&lt;strong&gt;隨諸法實相，不隨餘法&lt;/strong&gt;。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;出諸法&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;出諸法得神通力無畏三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，過出一切凡夫法，得菩薩六神通、十力、四無所畏。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;能達&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;能達諸法三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，乃至諸法如、法性、實際中通達不住，乃至諸法平等。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;note&quot;&gt;&lt;strong&gt;節要&lt;/strong&gt;：「斷疑」一條尤具大乘氣概——未得佛而能斷眾生疑，因為他已親見實相，眾生的疑無一不在他的視域內。&lt;/div&gt;
&lt;h2&gt;第十節　諸法財印 · 無分別見 · 離諸見 · 離一切相&lt;/h2&gt;
&lt;div class=&quot;samadhi-list&quot;&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;財印&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法財印三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;財名善法，印者名相。如人得印綬，無敢陵易；菩薩得善法財印，亦無能為作留難者。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;無分別見&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;諸法無分別見三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;若分別諸法，即生憎、愛心；得是三昧者，見一切法，不作分別。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;離諸見&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;離諸見三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;「見」者，六十二邪見，及色等法中取相，&lt;strong&gt;乃至佛見、法見、僧見、涅槃見，皆名為見&lt;/strong&gt;。所以者何？取相能生著心故。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;離一切相&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;離一切相三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;即是無相解脫門相應三昧。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;note&quot;&gt;&lt;strong&gt;節要&lt;/strong&gt;：「離諸見」是本品最具掃蕩力的疏解——連「佛見、法見、僧見、涅槃見」都列入須離之見。這是大乘般若對所有「立場」的最終透視。&lt;/div&gt;
&lt;h2&gt;第十一節　離一切著 · 除懈怠 · 深法明 · 不可奪 · 破魔 · 不著三界 · 起光明 · 見諸佛&lt;/h2&gt;
&lt;div class=&quot;samadhi-list&quot;&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;離一切著&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;離一切著三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;離一切相故，於一切法亦不著。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;除懈怠&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;除一切懈怠三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，如此中說乃至七歲不坐不臥。&lt;strong&gt;菩薩得是三昧，常無懈怠心，乃至得佛，初不止息。&lt;/strong&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;深法明&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;得深法明三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;深法名諸佛法一切智慧等；菩薩得是三昧故，能遙見佛法，思惟籌量，知深妙無比。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;不可奪&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;不可奪三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，行菩薩法，無能奪其志者。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;破魔&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;破魔三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧力，魔雖是欲界主，&lt;strong&gt;菩薩以人身能破魔事&lt;/strong&gt;。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;不著三界&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;不著三界三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧，&lt;strong&gt;身雖在三界中，心常在涅槃故不著&lt;/strong&gt;。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;起光明&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;起光明三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧者，能放無量光明，照於十方。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;sam-item&quot;&gt;&lt;span class=&quot;sam-num&quot;&gt;見諸佛&lt;/span&gt;&lt;div class=&quot;sam-body&quot;&gt;&lt;span class=&quot;sam-name&quot;&gt;見諸佛三昧 ——&lt;/span&gt;&lt;span class=&quot;sam-gloss&quot;&gt;得是三昧，雖未得天眼、天耳，而能見十方諸佛，聞十方諸佛所說法，諮問所疑。&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;note&quot;&gt;&lt;strong&gt;節要&lt;/strong&gt;：本節是龍樹釋名的收尾組合。「不著三界」「見諸佛」二條最為畫龍點睛——身在三界、心在涅槃，正是不住兩端的中道實踐；見諸佛三昧則收束於整段經文的最終景觀：「&lt;em&gt;薩陀波崙住如是等三昧中，即見十方無量阿僧祇諸佛在大眾中為諸菩薩說般若波羅蜜。&lt;/em&gt;」&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;chapter&quot; id=&quot;chapter-7&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 第四品 · 第七章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;從「破」到「見」的終極圓滿&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;金剛多維矩陣 · 法山頂峰 · 學者反思&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;div class=&quot;bridge&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;本章要旨&lt;/div&gt;
&lt;p&gt;第六章把龍樹的釋名疏解逐條讀完，本章則回到全景視角：從「破無明三昧」到「見諸佛三昧」這條軸線究竟告訴我們什麼？本章以法山頂峰、三維度菩薩觀點、感性依賴轉法界連線三節綜合呈現整品的大格局；最後留一節給研究者：在當代的佛學研究中，我們如何重新接通這座「金剛多維矩陣」。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第一節　法山頂峰的終極視覺隱喻&lt;/h2&gt;
&lt;p&gt;整部卷九十七第四品，可以用一個視覺隱喻收束：&lt;strong&gt;菩薩立於「諸法無礙頂三昧」的山頂&lt;/strong&gt;。從這個位置往下看，五十二三昧不再是散在山腳的名相，而是分布在三個方向上的觀法系統。&lt;/p&gt;
&lt;div class=&quot;triangle-diagram&quot;&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;頂峰 · 無礙頂&lt;/h5&gt;
&lt;strong&gt;諸法無礙頂三昧&lt;/strong&gt;
&lt;small&gt;「如人在山頂遍觀四方」——位置最高、視野最廣，所有三昧在此都能找到座標。&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;切入 · 如金剛&lt;/h5&gt;
&lt;strong&gt;如金剛三昧&lt;/strong&gt;
&lt;small&gt;「能破諸山」——金剛是切入頂峰的工具，斷除六波羅蜜的一切障礙。&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;停駐 · 不住&lt;/h5&gt;
&lt;strong&gt;不壞自在三昧&lt;/strong&gt;
&lt;small&gt;頂峰不可久居——「為佛道故，不證是法」，停駐而不執著。&lt;/small&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-conclusion&quot;&gt;「金剛頂」的完整意象：用金剛切入、登上頂峰、卻不住於頂&lt;/div&gt;
&lt;h2&gt;第二節　三維度的菩薩觀點&lt;/h2&gt;
&lt;p&gt;本品的菩薩，是同時操作三個視角的人：&lt;/p&gt;
&lt;div class=&quot;three-col&quot;&gt;
&lt;div class=&quot;col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;觀空&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;&lt;strong&gt;看世界&lt;/strong&gt;——如看鏡像與虛空（得如鏡像三昧），深知一切無常、無我，故不執著。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;觀假&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;&lt;strong&gt;用世界&lt;/strong&gt;——如大幻師化身（如幻威勢三昧），以假名與幻相為工具，方便度眾。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;觀中&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;&lt;strong&gt;住世界&lt;/strong&gt;——以見諸法三昧雙重解碼，身在三界、心在涅槃，不被世界縛、亦不離世界走。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;insight&quot;&gt;
&lt;div class=&quot;insight-label&quot;&gt;三維觀點的並用&lt;/div&gt;
&lt;p&gt;菩薩之所以是菩薩，不在於他擁有任何單一的「觀」，而在於他能&lt;strong&gt;同時運轉三個觀點&lt;/strong&gt;而不互相抵消。觀空使他不為世界所縛，觀假使他不離世界走，觀中使他既不縛也不離。本品五十二三昧的整體佈局，正是這三維觀點的具體展開。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　從感性依賴到法界直接連線&lt;/h2&gt;
&lt;p&gt;整品的敘事弧線可以用一句話收束：&lt;strong&gt;從「啼哭求法」到「見十方佛」&lt;/strong&gt;。&lt;/p&gt;
&lt;div class=&quot;flow flow-v&quot;&gt;
&lt;div class=&quot;flow-box&quot;&gt;&lt;strong&gt;初期狀態&lt;/strong&gt;：感性依賴&lt;br/&gt;&lt;small&gt;啼哭求法，把求法寄託於「能否聽到外在說法」&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-box&quot;&gt;&lt;strong&gt;關鍵悖論&lt;/strong&gt;：破無明而仍須見佛&lt;br/&gt;&lt;small&gt;「破無明三昧」只是排除見道障礙的初步——燒了頭髮，但鏡中眼睛尚未啟用&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-box&quot;&gt;&lt;strong&gt;圓滿狀態&lt;/strong&gt;：法界直接連線&lt;br/&gt;&lt;small&gt;「見十方諸佛說法」——當執著盲區解鎖，般若不再需要外求，因為法界本身就在說法&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經 文 · 收束&lt;/span&gt;
&lt;p&gt;「薩陀波崙住如是等三昧中，&lt;strong&gt;即見十方無量阿僧祇諸佛在大眾中為諸菩薩說般若波羅蜜。&lt;/strong&gt;」&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;insight&quot;&gt;
&lt;div class=&quot;insight-label&quot;&gt;本品終極命題&lt;/div&gt;
&lt;p&gt;「破無明三昧」是燒了見道的障礙，是&lt;em&gt;否定的工作&lt;/em&gt;；「見十方諸佛說法」是接通了法界的本然，是&lt;em&gt;肯定的展開&lt;/em&gt;。&lt;strong&gt;否定與肯定的同時完成&lt;/strong&gt;，就是大乘菩薩道的金剛頂——既不是純粹的破，也不是純粹的立，而是「破立同時、空有圓融」的二諦中道。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第四節　給學者的結語：理事空有破立的高度統一&lt;/h2&gt;
&lt;p&gt;《大智度論》卷九十七第四品，並非一篇普通的禪定名目羅列，而是龍樹菩薩將《般若經》的感性實踐歷程，與《中論》的「空—假—中」哲學體系完美接軌的&lt;strong&gt;高階操作手冊&lt;/strong&gt;。它在文本上是經文加釋名，在哲學上是現象學加形上學，在實踐上是觀法加運用——三層交織為一座立體的矩陣。&lt;/p&gt;
&lt;div class=&quot;card brown-l&quot; style=&quot;margin-top:18px;&quot;&gt;
&lt;div class=&quot;card-title&quot;&gt;當代佛學研究者的反思&lt;/div&gt;
&lt;div class=&quot;card-content&quot;&gt;在當代的佛學研究中，我們如何透過重構這座「金剛多維矩陣」，&lt;strong&gt;重新找回那種「理與事、空與有、破與立」高度統一的學術生命力&lt;/strong&gt;？這不僅是文獻整理的工作，也是讓古典文本繼續為現代心靈說法的工作——薩陀波崙的啼哭，每一代讀者都有；而五十二三昧的瞬間現前，每一代讀者都應有機會親自體驗。&lt;/div&gt;
&lt;/div&gt;
&lt;hr/&gt;
&lt;div class=&quot;verse&quot;&gt;
        從啼哭到金剛頂　　破無明而見諸佛&lt;br/&gt;
        二諦圓融非二法　　五十二昧本一心
      &lt;/div&gt;
&lt;p style=&quot;text-align:center;color:var(--text-muted);font-size:16px;letter-spacing:2px;margin-top:24px;&quot;&gt;— 大智度論卷九十七第四品 · 全品終 —&lt;/p&gt;
&lt;/div&gt;
&lt;/section&gt;

<script>
// ============ 防複製 ============
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
  setInterval(function(){
    if(window.getSelection) try{window.getSelection().removeAllRanges();}catch(e){}
  },300);
})();

// ============ Brand 平滑捲動 ============
var sbBrand=document.getElementById('sbBrand');
if(sbBrand){
  sbBrand.addEventListener('click',function(e){
    e.preventDefault();
    window.scrollTo({top:0,behavior:'smooth'});
  });
}

// ============ 側欄 toggle（手機）============
var sb=document.getElementById('sb');
var sbT=document.getElementById('sbToggle');
if(sbT){sbT.addEventListener('click',function(){sb.classList.toggle('open');});}

// ============ 進度條 ============
var rpFill=document.getElementById('rpFill');
var rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';
  if(rpPct)rpPct.textContent=Math.round(pct)+'%';
}
window.addEventListener('scroll',updateProgress,{passive:true});
updateProgress();

// ============ 回頂按鈕 ============
var bt=document.getElementById('backTop');
window.addEventListener('scroll',function(){
  if(window.scrollY>600)bt.classList.add('show');
  else bt.classList.remove('show');
},{passive:true});
if(bt){bt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});}

// ============ 側欄高亮（active 切換）============
var sbItems=document.querySelectorAll('.sb-item');
function highlightCh(){
  var chs=document.querySelectorAll('.chapter');
  var cur=null,thr=window.innerHeight*0.35;
  chs.forEach(function(c){
    var r=c.getBoundingClientRect();
    if(r.top<thr)cur=c.id;
  });
  if(!cur)return;
  sbItems.forEach(function(it){
    var href=it.getAttribute('href')||'';
    if(href==='#'+cur)it.classList.add('active');
    else it.classList.remove('active');
  });
}
window.addEventListener('scroll',highlightCh,{passive:true});
highlightCh();

// ============ iframe 自動高度 ============
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body)return;
    d.body.style.minHeight='0';d.body.style.height='auto';
    if(d.documentElement){
      d.documentElement.style.minHeight='0';
      d.documentElement.style.height='auto';
    }
    var h=d.body.scrollHeight;
    if(h>100){
      f.style.height=h+'px';
      f.style.minHeight='0';
    }
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function')updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){
    tries++;
    resizeFrame(f);
    if(tries<30)setTimeout(tick,200);
  }
  if(f.contentDocument&&f.contentDocument.readyState==='complete')tick();
  else f.addEventListener('load',tick);
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);

var rzT;
window.addEventListener('resize',function(){
  clearTimeout(rzT);
  rzT=setTimeout(resizeAllFrames,200);
});

// ============ 錨點防錯跳 ============
document.addEventListener('click',function(e){
  var a=e.target;
  while(a&&a.tagName!=='A')a=a.parentElement;
  if(!a)return;
  var h=a.getAttribute('href');
  if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var id=h.substring(1);
  var el=document.getElementById(id);
  if(!el)return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect=el.getBoundingClientRect();
    var y=window.scrollY+rect.top-20;
    window.scrollTo({top:y,behavior:'smooth'});
  },60);
},true);

// ============ 持續輪詢 ============
var _rt=0,_riv=setInterval(function(){
  _rt++;resizeAllFrames();
  if(_rt>50)clearInterval(_riv);
},300);
</script>

<script id="wy-l5-decoder">
(function(){
  var KEY = 90;
  function _dec(s){
    try{
      var bin = atob(s);
      var bytes = new Uint8Array(bin.length);
      for(var i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i) ^ KEY;
      return new TextDecoder('utf-8').decode(bytes);
    }catch(e){ return ''; }
  }
  function _restore(){
    var nodes = document.querySelectorAll('[data-c]');
    for(var i=0;i<nodes.length;i++){
      var n = nodes[i];
      var enc = n.getAttribute('data-c');
      if(!enc) continue;
      try{
        n.innerHTML = _dec(enc);
        n.removeAttribute('data-c');
      }catch(e){}
    }
  }
  if(window.__wyReady && window.__wyReady.then){
    window.__wyReady.then(function(ok){ if(ok) _restore(); });
  } else {
    document.addEventListener('DOMContentLoaded', _restore);
  }
})();
</script>
