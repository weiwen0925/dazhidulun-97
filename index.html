<style>

*{box-sizing:border-box;margin:0;padding:0;}

#sb::-webkit-scrollbar{display:none;width:0;}
.sb-brand{position:sticky;top:0;width:100%;

  color:var(--gold);text-align:center;line-height:1.5;

.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;

.sb-nav{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;}
.sb-item{display:flex;flex-direction:column;align-items:center;

.sb-item:hover{background:rgba(184,134,11,.12);color:var(--gold);}
.sb-item.active{background:linear-gradient(135deg,rgba(184,134,11,.32),rgba(184,134,11,.18));

.sb-circle{width:34px;height:34px;border-radius:50%;display:flex;

  font-size:13px;font-weight:600;margin-bottom:3px;}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:10px;
  letter-spacing:1px;text-align:center;}

/* ============ 漢堡 / 回頂 ============ */
#sbToggle{display:none;position:fixed;top:12px;left:12px;z-index:120;
  width:42px;height:42px;border:none;border-radius:50%;

  box-shadow:0 2px 10px rgba(0,0,0,.2);}
#backTop{position:fixed;right:18px;bottom:78px;width:44px;height:44px;
  border-radius:50%;border:none;background:var(--sbBg);color:var(--gold);
  font-size:18px;cursor:pointer;display:none;z-index:110;
  box-shadow:0 2px 12px rgba(0,0,0,.25);}
#backTop.show{display:block;}

/* ============ 閱讀進度膠囊 ============ */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:8px 22px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);}
.read-progress .rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

.main{margin-left:var(--sbW);padding:0 0 80px;}

/* ============ Hero ============ */
.site-hero{

  color:#fff;padding:80px 32px 70px;text-align:center;position:relative;overflow:hidden;
}
.site-hero::before{

.site-hero > *{position:relative;z-index:1;}
.hero-title{font-size:48px;font-weight:900;color:var(--goldL);

/* ============ Preface ============ */
.preface{max-width:880px;margin:50px auto 32px;padding:0 24px;}
.preface h2,.preface-title{font-size:24px;color:var(--accent);text-align:center;

.preface p{font-size:16.5px;line-height:2;color:var(--text2);

/* ============ TOC ============ */
.toc-section{max-width:1100px;margin:48px auto 28px;padding:0 24px;}
.toc-title{font-size:30px;color:var(--accent);text-align:center;

.toc-desc{font-size:14.5px;color:var(--text-muted);text-align:center;

.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

.toc-card{background:var(--card);border:1px solid var(--border);

.toc-card:hover{transform:translateY(-2px);

.toc-num{display:inline-block;width:28px;height:28px;border-radius:50%;

.toc-name{font-size:17px;color:var(--text);font-weight:600;line-height:1.6;}

.ch-sub{font-size:14.5px;color:#c4956a;letter-spacing:2px;}
.ch-body{max-width:980px;margin:0 auto;padding:32px 16px 0;}

.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);

.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;

.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;text-indent:2em;}

/* ============ iframe ============ */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;

  box-shadow:0 4px 20px rgba(91,58,41,.1);

/* ============ Next link ============ */
.next-link{display:inline-block;margin:18px 0 6px;padding:10px 22px;
  background:var(--accent);color:#fff;border-radius:22px;

.next-link:hover{background:var(--primary);transform:translateY(-2px);}

/* ============ Footer ============ */

  color:var(--text-muted);font-size:13.5px;letter-spacing:2px;

.site-footer p{margin:6px 0;}

:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:76px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
  --primary:#2C1810;--primary-light:#5B3A29;--shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  scrollbar-width:none;-ms-overflow-style:none;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
*{ -webkit-user-drag:none; }
body{
  background:var(--bg);color:var(--text);
  font-family:&quot;Noto Serif TC&quot;,&quot;Source Han Serif TC&quot;,&quot;Songti TC&quot;,Georgia,serif;
  font-size:20px;line-height:1.8;
  font-weight:400;
}
img{-webkit-user-drag:none;pointer-events:none;}

/* === Sidebar === */
#sb{
  position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;
}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{
  position:sticky;top:0;width:100%;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);
}
.sb-brand:hover{color:var(--goldL);}
.sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;padding-top:6px;}
.sb-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:3px 4px;width:100%;text-decoration:none;color:var(--sbText);
  cursor:pointer;transition:.25s;
}
.sb-circle{
  width:34px;height:34px;border-radius:50%;
  background:rgba(184,134,11,.15);border:1px solid rgba(184,134,11,.4);
  display:flex;align-items:center;justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:15px;font-weight:600;
  color:var(--gold);transition:.25s;
}
.sb-label{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11.5px;
  color:var(--sbText);opacity:.85;text-align:center;line-height:1.25;
  letter-spacing:1px;
}
.sb-item:hover .sb-circle{background:rgba(184,134,11,.3);color:var(--goldL);}
.sb-item.active .sb-circle{
  background:var(--gold);color:#1e1a14;
  box-shadow:0 0 14px rgba(184,134,11,.65);
}
.sb-item.active .sb-label{color:var(--goldL);opacity:1;}

/* === Hamburger (mobile) === */
#sbToggle{
  display:none;position:fixed;top:14px;left:14px;z-index:200;
  background:var(--sbBg);color:var(--gold);border:1px solid var(--gold);
  border-radius:6px;padding:6px 10px;font-size:18px;cursor:pointer;
}

/* === Read progress bottom capsule === */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:40px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:12px;opacity:.75;letter-spacing:3px;}

/* === Main === */
.main{margin-left:var(--sbW);min-height:100vh;}

/* === Hero === */
.site-hero{
  position:relative;padding:80px 30px 70px;text-align:center;
  background:linear-gradient(135deg,#1e1a14 0%,#2c2418 50%,#1e1a14 100%);
  color:#f7e8c4;overflow:hidden;
}
.site-hero::before{
  content:&quot;般若&quot;;position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);font-size:340px;font-weight:900;
  color:#fff;opacity:.035;letter-spacing:30px;line-height:1;
  pointer-events:none;
}
.hero-meta{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:18px;letter-spacing:6px;color:var(--goldL);opacity:.85;margin-bottom:10px;position:relative;}
.hero-title{font-size:56px;font-weight:900;letter-spacing:6px;color:#fff;margin-bottom:14px;position:relative;}
.hero-subtitle{font-size:20px;color:#e8d4a8;letter-spacing:3px;position:relative;margin-bottom:18px;}
.hero-sub{font-size:18px;color:#d4b87c;letter-spacing:2px;position:relative;line-height:1.7;}
.hero-byline{
  margin-top:22px;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:15px;
  color:#c4a868;letter-spacing:3px;opacity:.85;line-height:1.7;position:relative;
}
.hero-range{font-size:17px;color:#b8954c;letter-spacing:4px;margin-top:14px;position:relative;}

/* === Preface === */
.preface{
  max-width:880px;margin:50px auto 0;padding:0 30px;
}
.preface-title{
  font-size:30px;font-weight:700;color:var(--accent);
  text-align:center;margin-bottom:24px;letter-spacing:4px;
}
.preface-title::after{
  content:&quot;&quot;;display:block;width:60px;height:3px;background:var(--gold);
  margin:14px auto 0;
}
.preface p{
  font-size:19px;color:var(--text2);line-height:2.1;margin-bottom:16px;
  text-indent:2em;
}

/* === TOC === */
.toc-section{
  max-width:1100px;margin:60px auto 0;padding:0 30px;
}
.toc-title{
  font-size:34px;font-weight:700;color:var(--accent);
  text-align:center;margin-bottom:14px;letter-spacing:8px;
}
.toc-title::after{
  content:&quot;&quot;;display:block;width:80px;height:3px;background:var(--gold);
  margin:16px auto 0;
}
.toc-desc{
  text-align:center;font-size:17px;color:var(--text-muted);
  letter-spacing:3px;margin-bottom:30px;
}
.toc-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
}
.toc-card{
  background:var(--card);border:1px solid var(--border);
  border-left:4px solid var(--gold);border-radius:var(--r);
  padding:18px 20px;display:flex;align-items:center;gap:14px;
  text-decoration:none;color:var(--text);transition:.25s;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.toc-card:hover{
  transform:translateX(4px);
  box-shadow:0 4px 14px rgba(184,134,11,.18);
  border-left-color:var(--accent);
}
.toc-num{
  width:42px;height:42px;border-radius:50%;
  background:var(--gold);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:18px;font-weight:700;
  flex-shrink:0;
}
.toc-name{
  flex:1;font-size:19.5px;line-height:1.7;color:var(--text);font-weight:500;
}

/* === Chapter === */
.chapter{margin:50px 0 0;scroll-margin-top:20px;}
.ch-head{
  background:var(--headGrad);color:#fff;padding:46px 30px 38px;
  text-align:center;border-top:1px solid var(--border);
  position:relative;overflow:hidden;
}
.ch-head::after{
  content:&quot;&quot;;position:absolute;left:50%;bottom:18px;
  transform:translateX(-50%);width:60px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.ch-num{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:18px;
  letter-spacing:6px;color:var(--goldL);margin-bottom:10px;opacity:.9;
}
.ch-name{
  font-size:34px;font-weight:700;letter-spacing:4px;color:#fff;line-height:1.5;
}
.ch-sub{
  margin-top:14px;font-size:17px;color:#d4b87c;letter-spacing:2px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;line-height:1.7;
}
.ch-body{
  max-width:860px;margin:0 auto;padding:38px 30px 30px;background:var(--card);
}
.ch-body h2{
  font-size:30px;font-weight:700;color:var(--accent);
  margin:32px 0 18px;padding:10px 0 10px 20px;
  border-left:4px solid var(--gold);
  background:linear-gradient(90deg,rgba(184,134,11,.07),transparent 60%);
  letter-spacing:2px;
}
.ch-body h2:first-child{margin-top:0;}
.ch-body h3{
  font-size:23.5px;font-weight:600;color:var(--text);
  margin:24px 0 10px;padding-bottom:6px;
  border-bottom:1px solid var(--border-light);
  letter-spacing:1.5px;
}
.ch-body h4{
  font-size:20px;font-weight:600;color:var(--accent);margin:18px 0 8px;
}
.ch-body h5{
  font-size:18.5px;font-weight:600;color:var(--gold);margin:14px 0 6px;
}
.ch-body p{
  font-size:20px;line-height:1.9;color:var(--text);margin:0 0 12px;
  text-align:justify;
}
.ch-body p strong{color:var(--accent-red);font-weight:700;}
.ch-body p b{color:var(--accent-red);font-weight:700;}

/* === Verse / Classical text === */
.verse,.gatha,blockquote{
  background:var(--verseBg);
  border-left:4px solid var(--verseBd);
  padding:14px 22px;margin:16px 0;
  line-height:2.2;font-size:22px;
  white-space:normal;text-align:center;color:var(--text);
}
.classical-text{
  background:#FFFDF5;border:1px solid #E8E0D0;border-radius:10px;
  padding:18px 24px;margin:16px 0;line-height:1.95;font-size:20px;
  color:var(--text);
}
.classical-text p{font-size:20px;line-height:1.95;margin:0 0 10px;text-indent:2em;}
.classical-text p:first-child{text-indent:0;}
.classical-text p:last-child{margin-bottom:0;}
.text-label{
  display:inline-block;background:#3d3225;color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13.5px;
  padding:3px 14px;border-radius:14px;letter-spacing:2.5px;
  margin-bottom:10px;
}

/* === Cards / Insights === */
.card,.insight,.commentary,.practice,.metaphor,.note{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px 22px;margin:14px 0;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.card-title,.insight-title{
  font-size:21.5px;font-weight:700;color:var(--accent);
  margin-bottom:10px;letter-spacing:1.5px;
}
.card-content,.insight-content{
  font-size:20px;line-height:1.9;color:var(--text);
}
.commentary{border-left:4px solid var(--accentL);}
.commentary p{font-size:20px;line-height:1.9;}

/* === Q&amp;A === */
.qa{margin:18px 0;}
.qa .q{
  padding:10px 18px;background:#e8f0f5;border-left:4px solid #4a7a9c;
  margin-bottom:8px;border-radius:6px;color:#244c66;font-size:20px;line-height:1.9;
}
.qa .a{
  padding:10px 18px;background:#fdf6ee;border-left:4px solid var(--accent);
  border-radius:6px;color:var(--text);font-size:20px;line-height:1.9;
}
.qa-3{padding-left:3em;}
.qa-2{padding-left:2em;}

/* === Grids === */
.four-grid,.two-col{
  display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:16px 0;
}
.three-col{
  display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:16px 0;
}
.col,.col-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 18px;
}
.col-title{
  font-size:19px;font-weight:700;color:var(--accent);margin-bottom:8px;
  letter-spacing:1px;
}
.col-content{font-size:19px;line-height:1.85;color:var(--text);}
.col small{display:block;color:var(--text-muted);font-size:14.5px;margin-top:4px;}

/* === Flow === */
.flow{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:12px;background:var(--card);border:1px solid var(--border);
  padding:16px 18px;margin:14px 0;border-radius:var(--r);
}
.flow.flow-v{flex-direction:column;}
.flow-box,.flow-step{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-radius:8px;padding:12px 18px;
  font-size:17.5px;text-align:center;min-width:140px;color:var(--text);
}
.flow-box small,.flow-step small{display:block;font-size:13.5px;color:var(--text-muted);margin-top:4px;}
.flow-arrow{font-size:24px;color:var(--gold);font-weight:700;}

/* === Domino chain === */
.domino-chain{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:10px;margin:14px 0;
}
.domino{
  background:var(--accent);color:#fff;padding:10px 16px;border-radius:6px;
  font-size:17px;font-weight:600;letter-spacing:1px;
}
.chain-arrow{color:var(--gold);font-size:22px;}

/* === Spectrum === */
.spectrum{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;background:linear-gradient(90deg,#7d2a1a,#fffdf5,#1a4d7d);
  border-radius:10px;margin:18px 0;color:#fff;
}
.sp-end{font-size:16px;font-weight:600;letter-spacing:1.5px;text-shadow:0 1px 2px rgba(0,0,0,.4);}
.sp-mid{
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff!important;padding:10px 22px;border-radius:6px;text-align:center;
  text-shadow:0 1px 3px rgba(0,0,0,.35);
}
.sp-mid h5{color:#fff!important;font-size:17px;margin:0;}
.sp-mid small{color:rgba(255,255,255,.92)!important;font-size:13.5px;}

/* === Triangle diagram === */
.triangle-diagram{
  display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0;
  background:linear-gradient(135deg,#fdf8e8,#f5ecd8);
  border:1px solid var(--border);border-radius:10px;padding:18px 22px;
}
.tri-node{
  background:#fff;border:1px solid var(--border);border-radius:8px;
  padding:14px 16px;text-align:center;
}
.tri-node h5{font-size:18px;color:var(--accent);margin-bottom:6px;}
.tri-node p{font-size:17px;color:var(--text2);margin:0;line-height:1.8;}

/* === Venn === */
.venn-wrap{
  display:flex;justify-content:center;align-items:center;
  min-height:240px;gap:0;margin:22px 0;
}
.venn-circle{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:220px;height:220px;border-radius:50%;
  border:2px solid var(--accentL);background:rgba(196,149,106,.18);
  font-size:16px;line-height:1.55;padding:0 22px;box-sizing:border-box;
  text-align:center;color:var(--text);font-weight:600;
  gap:6px;
}
.venn-circle small{
  font-size:12.5px;display:block;width:100%;text-align:center;
  line-height:1.4;margin:0;color:var(--text-muted);font-weight:400;
}
.venn-a{margin-right:-50px;background:rgba(184,134,11,.18);}
.venn-b{margin-left:-50px;background:rgba(196,149,106,.22);}

/* === Comparison table === */
.compare-table{
  width:100%;border-collapse:collapse;margin:18px 0;background:var(--card);
  border:1px solid var(--border);border-radius:8px;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.06);font-size:18px;
}
.compare-table th,.compare-table td{
  padding:12px 14px;border:1px solid var(--border-light);text-align:left;line-height:1.7;
}
.compare-table thead th{
  background:var(--headGrad);color:#fff;font-weight:600;letter-spacing:1.5px;
  text-align:center;
}
.compare-table tbody th{
  background:rgba(184,134,11,.12);color:var(--accent);font-weight:600;
  text-align:center;width:130px;
}
.compare-table tbody td{color:var(--text);}

/* === Quadrant (4-grid for the 矩陣) === */
.quadrant{
  display:grid;grid-template-columns:repeat(2,1fr);gap:0;margin:18px 0;
  border:1px solid var(--border);border-radius:8px;overflow:hidden;
}
.quad-cell{
  padding:18px 20px;border:1px solid var(--border-light);
  background:var(--card);
}
.quad-cell.q1{background:rgba(184,134,11,.08);}
.quad-cell.q2{background:rgba(125,42,26,.08);}
.quad-cell.q3{background:rgba(26,77,125,.06);}
.quad-cell.q4{background:rgba(91,58,41,.06);}
.quad-label{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13px;
  color:var(--text-muted);letter-spacing:2px;margin-bottom:6px;
}
.quad-title{font-size:19.5px;font-weight:700;color:var(--accent);margin-bottom:8px;}
.quad-desc{font-size:18px;line-height:1.85;color:var(--text);}

/* === Phase badge === */
.phase-badge{
  display:inline-block;background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff!important;padding:5px 14px;border-radius:14px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;letter-spacing:2px;
  margin-right:8px;text-shadow:0 1px 2px rgba(0,0,0,.3);
}

/* === Highlight box === */
.highlight{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:18px 0;
  box-shadow:0 2px 10px rgba(91,58,41,.06);
}
.highlight-label{
  display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;
  letter-spacing:2.2px;margin-bottom:10px;
}
.highlight p{font-size:18.5px;line-height:2.1;color:var(--text2);margin:0 0 8px;}
.highlight p:last-child{margin-bottom:0;}

/* === Question mark callout === */
.qmark-callout{
  background:linear-gradient(135deg,#fdf6ee,#f5e6c8);
  border:1px dashed var(--accentL);border-radius:8px;
  padding:14px 20px;margin:14px 0;
  font-style:italic;color:var(--text2);font-size:19px;line-height:1.85;
}
.qmark-callout::before{
  content:&quot;？&quot;;font-size:30px;color:var(--gold);font-weight:900;float:left;
  line-height:1;margin-right:10px;
}

/* === Footer === */
.site-footer{
  margin:60px 0 0;padding:36px 30px 30px;text-align:center;
  background:linear-gradient(180deg,transparent,#ede4d0);
  color:var(--text-muted);font-size:15px;line-height:1.9;
  border-top:1px solid var(--border);
}
.site-footer p{margin:0 0 6px;font-size:15px;}
.site-footer .footer-quote{
  font-family:&quot;Noto Serif TC&quot;,serif;font-size:17px;color:var(--accent);
  font-style:italic;margin-bottom:14px;letter-spacing:2px;
}

/* === Back to top === */
#backTop{
  position:fixed;right:24px;bottom:80px;width:44px;height:44px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;font-size:22px;cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,.2);display:none;z-index:110;
  transition:.25s;
}
#backTop:hover{background:var(--gold);}

/* === Responsive === */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .25s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .ch-body{padding:30px 18px;}
  .four-grid,.three-col,.two-col,.triangle-diagram,.quadrant{grid-template-columns:1fr;}
  .hero-title{font-size:36px;letter-spacing:3px;}
  .ch-name{font-size:26px;letter-spacing:2px;}
  .toc-grid{grid-template-columns:1fr;}
  .venn-wrap{flex-direction:column;}
  .venn-a{margin-right:0;margin-bottom:-50px;}
  .venn-b{margin-left:0;}
}
@media(max-width:600px){
  body{font-size:18px;}
  .hero-title{font-size:30px;}
  .ch-name{font-size:22px;}
  .ch-body h2{font-size:24px;}
  .ch-body h3{font-size:20px;}
}

&lt;div class=&quot;preface&quot;&gt;
&lt;h2 class=&quot;preface-title&quot;&gt;編者前言&lt;/h2&gt;
&lt;p&gt;本品（卷九十七首品）是《大智度論》「釋薩陀波崙品第八十八」的延續，承前卷對求般若主角薩陀波崙（Sadāprarudita，意譯「常啼菩薩」）的事蹟描述，再進入論主龍樹菩薩的四問四答。經文敘事看似敘述一位菩薩在曠野中啼泣七日終獲佛現身指點的神話橋段，論文則以四個犀利的問題層層拆解，將神話事件還原為一套精準的修證心理學與中觀辯證學。&lt;/p&gt;
&lt;p&gt;編者依《中觀動力學：薩陀波崙菩薩求法邏輯與心法解構》一文之三維度解碼框架（事理邏輯 Logic／修證心法 Mindset／中觀視角 Madhyamaka），將四問四答分別對應為「四個臨界轉折」（Node 1～Node 4），每一轉折皆從事理因果、心法操作、中觀義理三方面交叉透視，最後以「中觀實證結果」（入無量三昧）與「全局整合」收束，揭示龍樹菩薩在《大智度論》此處所暗藏的論述策略——以世俗最重之情（喪愛子）類比出世間最高之智（般若），以神話表象包裹「緣起、破執、中道、二諦」四重法義的實踐次第。&lt;/p&gt;
&lt;p&gt;七章共三十餘節，按「卷 → 品 → 章 → 節」四級層級嚴格編號。經論原典（第二章）保留鳩摩羅什譯本完整文字，未作刪節；後續五章則依論主四問順序逐一展開，並融入學術洞見與研究應用以供深入研讀。&lt;/p&gt;
&lt;/div&gt;

&lt;section class=&quot;chapter&quot; id=&quot;chapter-1&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第一章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;中觀動力學 · 解碼框架&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;研究痛點 · 三維度解析框架 · 四個臨界轉折總覽&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;h2&gt;第一節　研究痛點：解碼神話敘事背後的哲學密碼&lt;/h2&gt;
&lt;p&gt;傳統閱讀《大智度論》卷九十七「釋薩陀波崙品」，常將這段——一位菩薩在曠野中啼泣七日終獲佛現身——視為神話敘事或極端苦行的個案，而錯失其真正的哲學密碼。本品的真實內容，是龍樹菩薩以四個犀利的反問，將整段敘事還原為一部精密實踐的「中觀心理學紀錄」。&lt;/p&gt;
&lt;div class=&quot;four-grid&quot;&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;破除神話迷思&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;將「神蹟」還原為心智運作的必然結果——空中聲、佛身現皆非外在恩賜，而是「極度渴望（因）＋ 功德成熟（緣）＝ 顯現（果）」的因緣方程式。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;解構情緒極端&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;將「大喜」與「大愁」視為突破世俗認知邊界的實證變數，而非情緒過激的個案。情緒成為打破慣性的工程槓桿。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;重置實修語碼&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;證得這段經文是一部精密的「中觀實踐心理學紀錄」——用「忘、住、待、喻」四動作標示出修證次第。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;填補學術盲點&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;將敘事美學與哲學體系交叉，揭示龍樹如何把抽象的「緣起／破執／中道／二諦」嵌入故事化載體，使般若教學具備可操作性。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;h2&gt;第二節　三維度解析框架：事理 · 心法 · 中觀&lt;/h2&gt;
&lt;p&gt;本品所循的解碼框架，由三大維度構成，三者圍繞「般若實相」之核心，從不同切入點同步檢視薩陀波崙求法歷程的每一個臨界節點。三者缺一不可：缺「事理」則流於玄學，缺「心法」則止於思辨，缺「中觀」則陷於現象。&lt;/p&gt;
&lt;div class=&quot;triangle-diagram&quot;&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;事理邏輯（Logic）&lt;/h5&gt;
&lt;p&gt;因果行為與認知機制的流轉路徑——意識覆蓋、因緣逆向、臨界資糧、總相因緣。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;修證心法（Mindset）&lt;/h5&gt;
&lt;p&gt;檢視薩陀波崙意識狀態的異變過程——更無餘念、能量轉化、純粹焦點、亦愛亦空。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;中觀視角（Madhyamaka）&lt;/h5&gt;
&lt;p&gt;緣起、中道、二諦在敘事中的哲學投射——心隨境轉、假名如幻、離二邊、皆是假名。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;highlight&quot;&gt;
&lt;span class=&quot;highlight-label&quot;&gt;框架核心&lt;/span&gt;
&lt;p&gt;&lt;strong&gt;三維交叉直指般若實相&lt;/strong&gt;。本品解碼的核心命題：薩陀波崙的每一個「異常行為」（忘、住、啼、喻），同時是事理上的因果必然、心法上的能量轉化、與中觀義理上的辯證實踐——三者同一事，三者同一相，三者同一空。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　覺悟的四個臨界轉折：敘事總覽&lt;/h2&gt;
&lt;p&gt;龍樹菩薩在本品論文中所提的四個問題，不是隨機提問，而是精密劃出薩陀波崙求法歷程中的四個「臨界轉折點」（Critical Inflection Points）。每一個轉折都對應一個中觀法門的實證——從「緣起觀」起手，經「破執觀」破其名相，依「中道觀」測準時節，最後以「二諦觀」總攝世俗與第一義。&lt;/p&gt;
&lt;div class=&quot;flow flow-v&quot;&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;Node 1 · 大喜致忘&lt;/strong&gt;&lt;small&gt;（何以忘問空中聲？）　中觀對應：緣起觀&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;Node 2 · 住地不尋&lt;/strong&gt;&lt;small&gt;（何以啼泣不更求問處？）　中觀對應：破執觀&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;Node 3 · 七日極限&lt;/strong&gt;&lt;small&gt;（何以乃至七日佛身乃現？）　中觀對應：中道觀&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;Node 4 · 如喪愛子&lt;/strong&gt;&lt;small&gt;（何以愁憂如喪愛子？）　中觀對應：二諦觀&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;p&gt;四個轉折不是並列的四個事件，而是一個完整的「世俗認知 → 中觀實相」突破路徑。從第一節「忘」破除「我在求」的主體執，到第二節「住」破除「處所實有」的場所執，到第三節「七日」破除「快慢有別」的時間執，最後第四節以「如喪愛子」之喻收攝世間最重之情而轉為出世最高之智——這正是龍樹菩薩埋伏在敘事下的「中觀工程藍圖」。&lt;/p&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;chapter&quot; id=&quot;chapter-2&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第二章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;經論原典 · 第八十八品之餘&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;經文 · 七日啼泣與東行求法 ／ 論主 · 四問四答&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;h2&gt;第一節　經文 · 七日啼泣與東行求法&lt;/h2&gt;
&lt;p&gt;本卷接續前卷對薩陀波崙菩薩在「空中之聲」教導下發心求法的描述，敘述其受教後東行不久，因忘問處所而住地啼泣七日。經文不僅描述其情境，更詳述空中之佛現身指示眾香城及曇無竭菩薩之德相、再記其入無量三昧之果證。&lt;/p&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經 · 一&lt;/span&gt;
&lt;p&gt;「爾時，薩陀波崙菩薩受是空中教已，從是東行。不久，復作是念：『我云何不問空中聲：「我當何處去？去當遠近？當從誰聞般若波羅蜜？」』是時即住，啼哭憂愁，作是念：『我住是中，過一日一夜，若二、三、四、五、六、七日七夜，不念疲極，乃至不念飢渴、寒熱，不聞聽受般若波羅蜜因緣，終不起也！』」&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經 · 二&lt;/span&gt;
&lt;p&gt;「須菩提！譬如人有一子卒死，憂愁苦毒，唯懷懊惱，不生餘念。如是，須菩提！薩陀波崙菩薩爾時無有異心，但念：『我何時當得聞般若波羅蜜？我云何不問空中聲：「我應何處去？去當遠近？當從誰聞般若波羅蜜？」』」&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經 · 三　空中佛告&lt;/span&gt;
&lt;p&gt;「須菩提！薩陀波崙菩薩如是愁念時，空中有佛，語薩陀波崙菩薩言：『善哉！善哉！善男子！過去諸佛行菩薩道時，求般若波羅蜜，亦如汝今日。善男子！汝以是勤精進愛樂法故，從是東行，去此五百由旬，有城名眾香。其城七重，七寶莊嚴；臺觀、欄楯，皆以七寶校飾；七寶之塹，七寶行樹，周匝七重。其城縱廣十二由旬，豐樂安靜，人民熾盛；五百市里，街巷相當，端嚴如畫，橋津如地，寬博清淨。七重城上，皆有七寶樓櫓，寶樹行列，以黃金、白銀、車𤦲、馬瑙、珊瑚、琉璃、頗梨、紅色真珠以為枝葉。寶繩連綿，金為鈴網，以覆城上。風吹鈴聲，其音和雅，娛樂眾生；譬如巧作五樂，甚可悅喜。其城四邊，流池清淨，冷暖調適；中有諸船，七寶嚴飾；是諸眾生宿業所致，乘此寶船娛樂遊戲。諸池水中種種蓮華：青、黃、赤、白，眾雜好華遍覆水上，是三千大千世界所有眾華皆在其中。其城四邊有五百園觀，七寶莊嚴，甚可愛樂。一一園中，各有五百池，池各縱廣十里，皆以七寶校成，雜色莊嚴。諸池水中亦有青、黃、赤、白蓮華彌覆水上；其諸蓮華大如車輪，青色青光、黃色黃光、赤色赤光、白色白光。諸池水中鳧鴈、鴛鴦，異類眾鳥，音聲相和。是諸園觀適無所屬，是諸眾生宿業所致，長夜信樂深法，行般若波羅蜜因緣故，受是果報。善男子！是眾香城中有大高臺，曇無竭菩薩摩訶薩宮舍在上。其宮縱廣一由旬，皆以七寶校成，雜色莊嚴，甚可喜樂。垣牆七重，皆亦七寶；七重欄楯，七寶樓閣；寶塹七重，皆亦七寶；周圍深塹，七寶累成；七重行樹，七寶枝葉，七重圍繞。其宮舍中，有四種娛樂園：一名常喜，二名離憂，三名華飾，四名香飾。一一園中各有八池：一名賢，二名賢上，三名歡喜，四名喜上，五名安隱，六名多安隱，七名遠離，八名阿鞞跋致。諸池四邊，面各一寶，黃金、白銀、琉璃、頗梨；玟㻁為池底，其上布金沙。一一池側有八梯陛，種種妙寶以為嚴飾；諸梯陛間，有閻浮檀金芭蕉行樹。一切池中種種蓮華——青、黃、赤、白，彌覆水上；諸池四邊，生好華樹；風吹諸華，墮池水中。其池成就八種功德，香若栴檀，色、味具足。』&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經 · 四　曇無竭菩薩說法&lt;/span&gt;
&lt;p&gt;「『曇無竭菩薩與六萬八千婇女，五欲具足，共相娛樂；及城中男女俱入常喜等園、賢等池中，五欲具足，共相娛樂。善男子！曇無竭菩薩與諸婇女遊戲娛樂已，日三時說般若波羅蜜。眾香城內男女大小，於其城中多聚人處敷大法座。其座四足，或以黃金、或以白銀、或以琉璃、或以頗梨，敷以綩綖，雜色茵褥，垂諸幃帶；以妙白㲲而覆其上，散以種種雜妙花香；座高五里，張白珠帳。其池四邊，散五色花，燒眾名香，澤香塗地，供養、恭敬般若波羅蜜故。曇無竭菩薩於此座上說般若波羅蜜；彼諸人眾如是恭敬供養曇無竭，為聞般若波羅蜜故。於是大會百千萬眾，諸天、世人一處和集，中有聽者，中有受者，中有持者，中有誦者，中有書者，中有正觀者，中有如說行者。當是時中，眾生以是因緣故，皆不墮惡道，不退轉於阿耨多羅三藐三菩提。』&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經 · 五　佛勸往趣&lt;/span&gt;
&lt;p&gt;「『汝善男子！往趣曇無竭菩薩，當聞般若波羅蜜。善男子！曇無竭菩薩世世是汝善知識，能教汝阿耨多羅三藐三菩提，示、教、利、喜。是曇無竭菩薩本求般若波羅蜜時，亦如汝今。汝去莫計晝夜，莫生障礙心，汝不久當得聞般若波羅蜜！』」&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經 · 六　毒箭之喻&lt;/span&gt;
&lt;p&gt;「爾時，薩陀波崙菩薩摩訶薩歡喜心悅，作是念：『我當何時得見是善男子，得聞般若波羅蜜？』須菩提！譬如有人為毒箭所中，更無餘念，唯念：『何時當得良醫，拔出毒箭，除我此苦？』如是，須菩提！薩陀波崙菩薩摩訶薩更無餘念，但作是願：『我何時當得見曇無竭菩薩，令我得聞般若波羅蜜？我聞是般若波羅蜜，斷諸有心。』」&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經 · 七　入無量三昧&lt;/span&gt;
&lt;p&gt;「是時，薩陀波崙菩薩於是處住念曇無竭菩薩，一切法中得無礙知見已，即得無量三昧門現在前，所謂諸法性觀三昧，諸法性不可得三昧，破諸法無明三昧，諸法不異三昧，諸法不壞自在三昧，諸法能照明三昧，諸法離闇三昧，諸法無異相續三昧，諸法不可得三昧，散華三昧，諸法無我三昧，如幻威勢三昧，得如鏡像三昧，得一切眾生語言三昧，一切眾生歡喜三昧，入分別音聲三昧，得種種語言字句莊嚴三昧，無畏三昧，性常默然三昧，得無礙解脫三昧，離塵垢三昧，名字語句莊嚴三昧，見諸法三昧，諸法無礙頂三昧，如虛空三昧，如金剛三昧，不畏著色三昧，得勝三昧，轉眼三昧，畢法性三昧，能與安隱三昧，師子吼三昧，勝一切眾生三昧，華莊嚴三昧，斷疑三昧，隨一切堅固三昧，出諸法得神通力無畏三昧，能達諸法三昧，諸法財印三昧，諸法無分別見三昧，離諸見三昧，離一切闇三昧，離一切相三昧，解脫一切著三昧，除一切懈怠三昧，得深法明三昧，不可奪三昧，破魔三昧，不著三界三昧，起光明三昧，見諸佛三昧。薩陀波崙菩薩住是諸三昧中，即見十方無量阿僧祇諸佛為諸菩薩摩訶薩說般若波羅蜜。」&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第二節　論主問答 · 四問四答總綱&lt;/h2&gt;
&lt;p&gt;論主龍樹菩薩在本品中提出四個關鍵反問，每一問皆針對經文敘事中看似不合常理或情緒過甚之處——這正是龍樹拆解神話表象、暴露中觀義理的標準辯證法。四問四答構成本品論義之骨幹，後續第三章至第六章即依此四問逐一展開。&lt;/p&gt;
&lt;div class=&quot;qa&quot;&gt;
&lt;div class=&quot;q&quot;&gt;&lt;strong&gt;第一問　【論】問曰：&lt;/strong&gt;薩陀波崙何以忘，不問空中聲？&lt;/div&gt;
&lt;div class=&quot;a&quot;&gt;&lt;strong&gt;答曰：&lt;/strong&gt;薩陀波崙大歡喜覆心故忘；如人大憂愁、大歡喜，以此二事故忘。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;qa&quot;&gt;
&lt;div class=&quot;q&quot;&gt;&lt;strong&gt;第二問　問曰：&lt;/strong&gt;空中聲已滅，何以住此七日，不更求問處？&lt;/div&gt;
&lt;div class=&quot;a&quot;&gt;&lt;strong&gt;答曰：&lt;/strong&gt;如本於空閑處一心求般若故，空中有聲；今亦欲一心如本，冀更聞聲，斷其所疑。&lt;br/&gt;復次，薩陀波崙於世樂已捨，深入佛道，愛樂情至；空中聲告，少為開示，竟未斷疑，其聲便滅。如小兒得少美味，著是味故，更復啼泣，而欲得之；薩陀波崙亦如是，得般若波羅蜜因緣味，不能通達，不知那去，是故住而啼泣。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;qa&quot;&gt;
&lt;div class=&quot;q&quot;&gt;&lt;strong&gt;第三問　問曰：&lt;/strong&gt;何以乃至七日，佛身乃現？&lt;/div&gt;
&lt;div class=&quot;a&quot;&gt;&lt;strong&gt;答曰：&lt;/strong&gt;譬如人大渴故，乃知水美。若二日、三日，精進欲未深；若過七日，恐其憂愁妨心，不任求道。是故七日憂愁。如譬喻，經中說。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;qa&quot;&gt;
&lt;div class=&quot;q&quot;&gt;&lt;strong&gt;第四問　問曰：&lt;/strong&gt;薩陀波崙何以愁憂乃爾，如喪愛子？&lt;/div&gt;
&lt;div class=&quot;a&quot;&gt;&lt;strong&gt;答曰：&lt;/strong&gt;般若波羅蜜於諸法中第一實，是十方諸佛真實法寶；薩陀波崙得少氣味，未具足故憂愁。如喪愛子，念其長大，多所成辦，冀得其力；菩薩亦如是，念增益般若波羅蜜力，得阿鞞跋致已，成就佛事。&lt;br/&gt;如子於父，孝行終身，無有異心；般若波羅蜜於菩薩亦如是，若能得入，乃至成佛，終不遠離。如父見子，心即歡悅；菩薩雖得種種諸法，不如見般若波羅蜜之歡喜。如子假為其名；般若波羅蜜亦如是，空無定實，但有假名。如是等，是總相因緣。&lt;br/&gt;父雖愛子，不能以頭目與之；菩薩為般若波羅蜜故，無量世中，以頭目髓腦施與眾生。子之於父，或不能報恩，若能報恩，正可現世小利，衣食歡樂等；菩薩於般若波羅蜜中，無所不得，乃至一切智慧，何況菩薩力勢、世間富樂！子之報父，恩極一世；般若之益，至無量世，乃至成佛。子之於父，或好、或惡；般若波羅蜜無諸不可。子但是假名，虛誑不實之法；般若波羅蜜真實聖法，無有虛誑。子之報恩，雖得現世小樂，而有憂愁苦惱無量之苦；般若波羅蜜但得歡喜實樂，乃至佛樂。子但能以供養利益於父，不能免其生、老、病、死；般若波羅蜜令菩薩畢竟清淨，無復老、病、死、患。子但能令父得世樂自在；般若波羅蜜能令菩薩於一切世間為天人主。如是等，種種因緣譬喻差別相。&lt;br/&gt;世人皆知喪子憂愁故，以此為喻。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;chapter&quot; id=&quot;chapter-3&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第三章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;第一轉折 · 大歡喜覆心&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;何以忘問空中聲？　Node 1 · 中觀對應：緣起觀&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;h2&gt;第一節　經論文本與要義&lt;/h2&gt;
&lt;p&gt;第一轉折所對應的經文是薩陀波崙菩薩「受是空中教已，從是東行；不久復作是念：『我云何不問空中聲』」——亦即「忘問」這個不合常理的舉動。論主直接點破其機制：&lt;/p&gt;
&lt;div class=&quot;verse&quot;&gt;「薩陀波崙大歡喜覆心故忘；如人大憂愁、大歡喜，以此二事故忘。」&lt;/div&gt;
&lt;p&gt;關鍵字眼是「&lt;strong&gt;覆&lt;/strong&gt;」——不是漫不經心，而是極端專注下的必然排他現象。論主以「大憂愁、大歡喜」並舉，揭示一條重要的意識規律：兩種極端情緒同樣具備「覆蓋一切其他念頭」之力。&lt;/p&gt;
&lt;h2&gt;第二節　事理邏輯：意識的覆蓋效應（Cognitive Override）&lt;/h2&gt;
&lt;p&gt;從事理因果觀之，「忘」並非失念，而是極端專注下的必排他現象。極端情緒（大喜或大憂）會生成一種「壓倒性流量」（overriding wave），瞬間把次要的、規範化的世俗理性循環路徑（asking the way）排擠出意識帶寬。&lt;/p&gt;
&lt;div class=&quot;flow flow-v&quot;&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;Input · 求法心切&lt;/strong&gt;&lt;small&gt;緣起觸發：空閑處一心求法的強烈動心&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;Trigger · 空中聞聲&lt;/strong&gt;&lt;small&gt;外境條件聚合，與空中聲同生同滅&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;Surge · 大歡喜&lt;/strong&gt;&lt;small&gt;情緒巨量如巨浪，瞬間溢出常規認知系統的處理閾值&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;Override · 世俗理性短路&lt;/strong&gt;&lt;small&gt;「去哪？多遠？」的細問邏輯在強大濤潮中被暫時隔斷&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;highlight&quot;&gt;
&lt;span class=&quot;highlight-label&quot;&gt;關鍵理解&lt;/span&gt;
&lt;p&gt;「忘」並非「失念」之過，而是&lt;strong&gt;極端專注的必然產物&lt;/strong&gt;。論主用「大憂愁」與「大歡喜」並舉，是為了揭示一條共通機制：兩個情緒方向相反，但其「覆蓋一切的力道」卻完全相同——這正是修證者進入「一心」狀態的雙刃槓桿。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　修證心法：「更無餘念」的絕對專注&lt;/h2&gt;
&lt;p&gt;論主解「忘」為「覆心」，揭示薩陀波崙意識中已無「外境細節」與「自我規範」之雙重雜念。此即「一心」之修證內涵——不是「想得很多」，而是「除了求法之外什麼都裝不下」。經文「毒箭之喻」正是這一心法的最佳註腳：&lt;/p&gt;
&lt;div class=&quot;verse&quot;&gt;「譬如有人為毒箭所中，更無餘念，唯念：『何時當得良醫，拔出毒箭，除我此苦？』」&lt;/div&gt;
&lt;div class=&quot;four-grid&quot;&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;毒箭喻的啟示&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;如人中劑毒之箭，心中唯有「何時得良醫拔除毒箭」一念。「忘」是因為「念」太強。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;餘念的剝落&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;在生死交關（求法解脫）的壓力下，大腦會自動剝除所有非必需的雜念——包括「應該問問處」這類常規邏輯。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;法喜的排他性&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;忘記問路，正是因為心已 100% 被「般若波羅蜜」佔滿，容不下第二個念頭。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;一心的反證&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;論主以「大憂愁」與「大歡喜」二事並舉，反證「一心」可從正、反兩極情緒進入，揭示心法的中性結構。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;h2&gt;第四節　中觀視角：心隨境轉，法不自生（Dependent Origination）&lt;/h2&gt;
&lt;p&gt;從中觀緣起觀之，心識狀態非實有，而是隨條件（緣）劇烈波動的產物。「忘」並非太腦的本質缺陷，而是「大歡喜」（強緣）壓倒「理性思維」（弱勢）的物理學結果。&lt;/p&gt;
&lt;div class=&quot;highlight&quot;&gt;
&lt;span class=&quot;highlight-label&quot;&gt;緣起觀核心&lt;/span&gt;
&lt;p&gt;&lt;strong&gt;心識非實有，唯緣所生&lt;/strong&gt;。「忘」這個現象本身，正是「諸法因緣生」的最直接示現。當「求法心」這個強緣生起，「問處所」這個次緣即刻消滅。沒有一個獨立、恆常的「主體」在「忘」，只有條件聚合與消散的剎那剎那。&lt;/p&gt;
&lt;/div&gt;
&lt;p&gt;因緣所生法的本質就是：「諸法不自生，亦不從他生，不共不無因，是故知無生」（《中論·觀因緣品》）。薩陀波崙的「忘」，正是「知所之境」與「能知之識」皆是緣起、皆無自性的當下示現。&lt;/p&gt;
&lt;h2&gt;第五節　綜合提煉：打破世俗慣性的哲學意義&lt;/h2&gt;
&lt;p&gt;在求證空性的過程中，「忘我」是跳脫世俗框架的必經臨界點。世俗思維永遠在計較「遠近、大小、得失」（有相思維）；唯有透過極端情境引發的「覆心忘念」，行者才能跳出中斷世俗的二元對立模式，契入「無相實相」創造真空狀態。&lt;/p&gt;
&lt;div class=&quot;two-col&quot;&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;有相的侷限&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;世俗思維永遠在計較「遠近、大小、得失」（有相追求）。一旦進入這個迴路，「我在求法」與「法在那裡」就被分裂為主客二元，與真實般若無相之體不應。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;無相的契入&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;唯有透過極端情境引發的「覆心忘念」，行者才能跳脫世俗的二元對立模式，契入「無相實相」的第一義諦——這正是薩陀波崙「忘問」之舉所內含的中觀哲學意義。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;chapter&quot; id=&quot;chapter-4&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第四章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;第二轉折 · 小兒失味的憂愁&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;何以住七日不更求問處？　Node 2 · 中觀對應：破執觀&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;h2&gt;第一節　經論文本與要義&lt;/h2&gt;
&lt;p&gt;第二轉折處理的是另一個不合常理的情境：既然空中之聲已滅，何以薩陀波崙不換地方再尋？反而住地七日啼哭？論主給出兩層答覆：一層談「冀更聞聲斷其所疑」之事理，另一層引「小兒失味」之喻：&lt;/p&gt;
&lt;div class=&quot;verse&quot;&gt;「如小兒得少美味，著是味故，更復啼泣，而欲得之；薩陀波崙亦如是，得般若波羅蜜因緣味，不能通達，不知那去，是故住而啼泣。」&lt;/div&gt;
&lt;p&gt;這裡有兩個關鍵詞：「&lt;strong&gt;因緣味&lt;/strong&gt;」（已得少分般若之氣味）與「&lt;strong&gt;住而啼泣&lt;/strong&gt;」（無餘他法可施，唯有原地呼喚）——後者正是修證學中「破執與不破執之間」的辯證臨界。&lt;/p&gt;
&lt;h2&gt;第二節　事理邏輯：因緣的逆向工程（Reverse Engineering）&lt;/h2&gt;
&lt;p&gt;薩陀波崙的「不盲目尋找」，是基於嚴密的因果律推導：聲既由「空閑處一心」之因生起，今欲復現，唯有重建同一因緣條件。換地方、再求問皆是「擾動環境」，會破壞原有的因緣物理結構。&lt;/p&gt;
&lt;div class=&quot;four-grid&quot;&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;複製成功變數&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;最初能感召空中聲的「因」，是行者在原地保持的「一心」狀態——「空閑處 · 一心 · 求般若故」。換言之，空中聞聲不是隨機事件，而是這三緣聚合的必然果。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;拒絕無效變數&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;亂跑（變動環境）會破壞原有的因緣物理結構。換地方就是在更換變數，已驗證的因即被解構，無法再現原有之果。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;系統重啟&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;啼泣不是悲傷，是為了重新建立並穩定當前感應交匯之「心境參數」，冀望再次聞發感應以斷除疑惑——這是修證學的「系統重啟」操作。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;逆向求因&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;論主把「住而啼」逆向解讀為「重建因緣聚合」的精準工程操作，而非情緒崩潰——這正是事理邏輯派最深入的解構。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　修證心法：大欲與能量轉化&lt;/h2&gt;
&lt;p&gt;啼泣非軟弱，而是將情軌轉化為菩提原動力的煉金術。薩陀波崙已捨閒樂、深入佛道，「愛樂情至」已 100% 投注於佛道。空中聲告少為開示，竟未斷疑而便滅，這份「未竟之願」反成最強推力——大渴望、大壓力、大失味，這三者疊加成「無餘念」的精神燃燒。&lt;/p&gt;
&lt;div class=&quot;flow flow-v&quot;&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;情境轉移&lt;/strong&gt;&lt;small&gt;薩陀波崙已捨閒樂，其「愛樂情至」完全投注於佛道&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;未竟之顧的張力&lt;/strong&gt;&lt;small&gt;得少法味卻未通達的「懸念」，心心理層面產生了千鈞之重的張力&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;化悲憤為精進&lt;/strong&gt;&lt;small&gt;這種近乎絕望的渴求，將分散的意識量轉壓縮，化為推動身心突破極限的絕對燃料&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;大精進力 · 一心&lt;/strong&gt;&lt;small&gt;不念飢渴寒熱、不退轉於阿耨多羅三藐三菩提&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;h2&gt;第四節　中觀視角：假名如幻與破執的階梯&lt;/h2&gt;
&lt;p&gt;從「著味」到「無得」，執著是渡河的必經筏皮。論主以「小兒失味」之喻揭示一個破執的精微辯證：未得時無從破，已得少分時方能起破執之念，至「實相無得」方為第一義。&lt;/p&gt;
&lt;div class=&quot;flow flow-v&quot;&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;有相的染著&lt;/strong&gt;&lt;small&gt;初期菩薩對「聲音」與「方向」的執著——如同小兒失美味，屬於從俗諦出發的「善法欲」&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;否定的階梯&lt;/strong&gt;&lt;small&gt;聲音的消失，是逼在強制行者著手「破執」——斷斷對外境（聲音）的依賴&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;假名如幻&lt;/strong&gt;&lt;small&gt;遇心境：唯在無有無的絕境中向內收攝，才能跨越「有求」的階梯，契入「實相無得」的第一義諦&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;實相無得（第一義）&lt;/strong&gt;&lt;small&gt;緣起求聲（善法欲）→ 假名如幻（破執）→ 實相無得&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;highlight&quot;&gt;
&lt;span class=&quot;highlight-label&quot;&gt;中觀關鍵&lt;/span&gt;
&lt;p&gt;&lt;strong&gt;從「著味」到「無得」，執著是渡河的必經筏皮&lt;/strong&gt;。沒有「小兒著少美味」這個「有相染著」階段，行者就無從生「破執」之觀；反之，若停留在「著少美味」而不入「實相無得」，則永遠是世俗追逐者，未入第一義。論主用「小兒失味」的譬喻精準地標出這個轉換臨界點。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第五節　綜合提煉：否定之否定的辯證歷程&lt;/h2&gt;
&lt;p&gt;薩陀波崙的啼泣停駐，展現了中觀破邪顯正的實踐過程——一個典型的「否定之否定」三部曲：&lt;/p&gt;
&lt;div class=&quot;three-col&quot;&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;第一重否定&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;&lt;strong&gt;捨世樂&lt;/strong&gt;——破世間執著（「於世樂已捨」）。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;第二重否定&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;&lt;strong&gt;聲已滅&lt;/strong&gt;——破外境依賴（空中聲告，少為開示，竟未斷疑，其聲便滅）。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;辯證昇華&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;&lt;strong&gt;七日一心&lt;/strong&gt;——突破感官執取，內在實相證入無量三昧。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;p&gt;這套「捨 → 滅 → 證」的辯證式，正是龍樹《中論》八不中道的微縮模型——透過層層否定外緣依賴，最終在「無一可得」的絕境中證見「諸法實相不離當下」。&lt;/p&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;chapter&quot; id=&quot;chapter-5&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第五章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;第三轉折 · 大渴方知水美&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;何以乃至七日佛身乃現？　Node 3 · 中觀對應：中道觀&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;h2&gt;第一節　經論文本與要義&lt;/h2&gt;
&lt;p&gt;第三問所問正是：「何以乃至七日佛身乃現？」何以非三日，亦非十日，必須是「七日」？論主答以譬喻：&lt;/p&gt;
&lt;div class=&quot;verse&quot;&gt;「譬如人大渴故，乃知水美。若二日、三日，精進欲未深；若過七日，恐其憂愁妨心，不任求道。是故七日憂愁。」&lt;/div&gt;
&lt;p&gt;關鍵字是「&lt;strong&gt;大渴方知水美&lt;/strong&gt;」——這不是描述苦行的累積期，而是揭示一條精密的時間變數：求法欲的實效（efficacy）並非線性增長，而是在「不及」（&amp;lt;3日）與「太過」（&amp;gt;7日）之間有一個黃金臨界點，恰好落在第七日。&lt;/p&gt;
&lt;h2&gt;第二節　事理邏輯：心理負荷與資糧的臨界點（Critical Mass）&lt;/h2&gt;
&lt;p&gt;佛現非隨機，而是精確的時間變數（t）控制。論主以「人大渴方知水美」為譬，揭示行者心理狀態與功德資糧的精密計量：&lt;/p&gt;
&lt;table class=&quot;compare-table&quot;&gt;
&lt;thead&gt;&lt;tr&gt;&lt;th&gt;時間&lt;/th&gt;&lt;th&gt;狀態&lt;/th&gt;&lt;th&gt;結果&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;&lt;th&gt;&amp;lt; 3日（不及）&lt;/th&gt;&lt;td&gt;福德／精進未具，求法欲望尚淺&lt;/td&gt;&lt;td&gt;渴而未入「乃知水美」之境，因緣未足&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;= 7日（黃金臨界）&lt;/th&gt;&lt;td&gt;大欲極度與定力平衡，促成感應交&lt;/td&gt;&lt;td&gt;&lt;strong&gt;佛身現前 · 感應道交&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&amp;gt; 7日（太過）&lt;/th&gt;&lt;td&gt;憂愁妨心，崩潰，不任求道&lt;/td&gt;&lt;td&gt;過剩之渴反成廢障，反失感應&lt;/td&gt;&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;div class=&quot;highlight&quot;&gt;
&lt;span class=&quot;highlight-label&quot;&gt;事理核心&lt;/span&gt;
&lt;p&gt;&lt;strong&gt;「七日」是中道測準的具體刻度&lt;/strong&gt;。論主把這個看似神秘的時間設定還原為一條精密的「心理負荷／功德資糧」鐘形曲線——求法欲望（Efficacy）在第七日達到峰值，提前則因緣未熟，過後則心力崩潰。佛身現前的時節，是這條曲線的最高點，也是中道之離二邊的具體刻度。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　修證心法：純粹焦點的極致（Pure Focus）&lt;/h2&gt;
&lt;p&gt;剝除生物本能，達到意識的絕對真空。經文「不念疲極，乃至不念飢渴寒熱」描繪的，正是純粹焦點臻於極致時的內在實相：&lt;/p&gt;
&lt;div class=&quot;four-grid&quot;&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;超越肉體限制&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;在七日之中，「不念疲極，乃至不念飢渴、寒熱」——當求法的意志力超越了基礎的生存本能，大腦主動關閉了對外界環境與生理痛楚的感知。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;生理感官的關閉&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;飢餓（Hunger）、乾渴（Thirst）、寒熱（Temperature）——這四個身體警報系統全部被「般若波羅蜜（Prajna）」這個唯一焦點蓋過。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;純粹意識的誕生&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;心中不存一念，唯留對般若的終極渴求。這種「無餘念」狀態，即是進入深層三昧的前置條件。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;焦點的辯證&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;「無餘念」並非心識消滅，而是心識被一個極強之焦點完全攝持——這才是真實的禪定，而非木石無情的死寂。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;h2&gt;第四節　中觀視角：離二邊的中道測準（The Middle Way）&lt;/h2&gt;
&lt;p&gt;七日之期，正是《中論》「離兩邊」的動態實證。情緒從「不及」之悵惘到「太過」之妨心崩潰，中間恰有一道「中道」——七日相應之點。這並非靜態的折中，而是動態平衡：&lt;/p&gt;
&lt;div class=&quot;spectrum&quot;&gt;
&lt;div class=&quot;sp-end&quot;&gt;不及（二三日）&lt;br/&gt;&lt;small style=&quot;color:#ffd9c2;&quot;&gt;悵惘、福德未具&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;sp-mid&quot;&gt;&lt;h5&gt;中道：七日相應&lt;/h5&gt;&lt;small&gt;真正的般若智慧，發生在極度渴望卻又不被情緒瓦解的「動態平衡」點&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;sp-end&quot;&gt;太過（過七日）&lt;br/&gt;&lt;small style=&quot;color:#c2dcff;&quot;&gt;掉舉、憂愁妨心&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;p&gt;七日，正是慧與智力交匯之「中間」——不偏靜（過七日的崩潰），不偏動（二三日的散亂），恰是&lt;strong&gt;《中論》「離兩邊」的動態實證&lt;/strong&gt;。&lt;/p&gt;
&lt;h2&gt;第五節　中觀視角：佛身非實有，唯心所現（Dependent Origination）&lt;/h2&gt;
&lt;p&gt;佛身的顯現，並非從實體之佛從某處飛來解救，而是行者清淨心與精進力達到臨界點時，所投射出的「因緣所生法」。論主在此暗暗破除「實體佛」的執著，揭示「感應道交」的因緣本質：&lt;/p&gt;
&lt;div class=&quot;four-grid&quot;&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;因緣聚合&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;《中論》云：「未曾有一法，不從因緣生。」佛身顯現亦非例外——它是「極度渴望（因）＋ 功德成熟（緣）＝ 佛身顯現（果）」的因緣方程式。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;條件方程式&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;「極度渴望（因）+ 功德成熟（緣）= 佛身顯現（果）」——這正是龍樹《中論·觀因緣品》「諸法不自生」之具體應用。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;影像如幻&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;佛身並非一直待在某處實體存在，而是行者清淨心與精進力達臨界點時，所投射出的「因緣所生法」。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;破除實體佛執&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;論主以「乃至七日佛身乃現」之說法，巧妙地破除「外有實體佛來」之執——佛身之現完全與行者之心相應，非從外來。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;highlight&quot;&gt;
&lt;span class=&quot;highlight-label&quot;&gt;中觀深義&lt;/span&gt;
&lt;p&gt;佛身的「現」與薩陀波崙的「至」是同一件事的兩面——這正是「感應道交」的真實意義：不是「彼方之佛飛來救度此方之行者」，而是「行者心極→佛身現」之因緣同時聚合。論主以此暗暗摧破信仰式的「他力佛」之執，回到緣起觀的第一義諦。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;chapter&quot; id=&quot;chapter-6&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第六章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;第四轉折 · 如喪愛子&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;何以愁憂如喪愛子？　Node 4 · 中觀對應：二諦觀&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;h2&gt;第一節　經論文本與要義&lt;/h2&gt;
&lt;p&gt;第四問是論主四問中最深的一層：「薩陀波崙何以愁憂乃爾，如喪愛子？」喻之取材世俗最深之痛——失去獨子之絕望——是否過於沉重？論主回答分為三段論證：先以「總相因緣」說明二者類似，再以「差別相」對照二者不類，最後以「世人皆知喪子憂愁故，以此為喻」收束譬喻邏輯。&lt;/p&gt;
&lt;div class=&quot;verse&quot;&gt;「般若波羅蜜於諸法中第一實，是十方諸佛真實法寶；薩陀波崙得少氣味，未具足故憂愁。如喪愛子，念其長大，多所成辦，冀得其力；菩薩亦如是，念增益般若波羅蜜力，得阿鞞跋致已，成就佛事。」&lt;/div&gt;
&lt;p&gt;論主明確點出：以世人最重之情，類比出世間最高之智——這正是「以情動人，以理破執」的雙軌教學法。&lt;/p&gt;
&lt;h2&gt;第二節　事理邏輯：總相因緣（Similarity）&lt;/h2&gt;
&lt;p&gt;以世人最重之情，類比出世間最高之智。世俗愛子與般若波羅蜜在功能上有高度重疊，論主分別以三點說明二者「總相因緣」的相似：&lt;/p&gt;
&lt;div class=&quot;venn-wrap&quot;&gt;
&lt;div class=&quot;venn-circle venn-a&quot;&gt;世俗愛子&lt;small&gt;世間最重之情&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;venn-circle venn-b&quot;&gt;般若波羅蜜&lt;small&gt;出世最高之智&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;three-col&quot;&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;寄託希望&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;&lt;strong&gt;養兒防老 / 成就佛事&lt;/strong&gt;——父念子之長大成辦，菩薩念般若之增益至阿鞞跋致；皆是寄託無量希望於此。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;親密不離&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;&lt;strong&gt;孝行終身 / 乃至成佛&lt;/strong&gt;——子於父孝行終身、無有異心；般若於菩薩若能得入，乃至成佛、終不遠離。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;歡喜源泉&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;&lt;strong&gt;父見子悅 / 見法歡喜&lt;/strong&gt;——父見子歡悅；菩薩雖得種種諸法，不如見般若波羅蜜之歡喜。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;p&gt;這三點構成譬喻成立的「總相」：兩者都是&lt;strong&gt;主體所寄之最重&lt;/strong&gt;，故以前者比後者，足以動人之心、引人之解。&lt;/p&gt;
&lt;h2&gt;第三節　中觀視角：二諦交鋒——皆是假名（The Shared Emptiness）&lt;/h2&gt;
&lt;p&gt;論主在揭示「總相因緣」之後，進一步暴露兩者更深的共通點：「如子假為其名；般若波羅蜜亦如是，空無定實，但有假名。」——世俗愛子與般若波羅蜜在第一義諦上，同樣是「假名」（Prajñapti）、同樣是「空無定實」。&lt;/p&gt;
&lt;div class=&quot;quadrant&quot;&gt;
&lt;div class=&quot;quad-cell q1&quot;&gt;
&lt;div class=&quot;quad-label&quot;&gt;世俗諦&lt;/div&gt;
&lt;div class=&quot;quad-title&quot;&gt;「子」假名&lt;/div&gt;
&lt;div class=&quot;quad-desc&quot;&gt;如子假為其名——「子」並非有獨立的、永恆的實體存在，而是緣聚則生、緣散則滅的「假名」（虛誑）。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;quad-cell q2&quot;&gt;
&lt;div class=&quot;quad-label&quot;&gt;第一義諦&lt;/div&gt;
&lt;div class=&quot;quad-title&quot;&gt;般若假名&lt;/div&gt;
&lt;div class=&quot;quad-desc&quot;&gt;般若波羅蜜亦如是——「空無定實，但有假名」。即使是最高的「般若」，在最高真實裡亦不外是「空無定實」，亦是「假名」。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;quad-cell q3&quot;&gt;
&lt;div class=&quot;quad-label&quot;&gt;世俗的空&lt;/div&gt;
&lt;div class=&quot;quad-desc&quot;&gt;世俗的「子」之空，乃是退轉現實效用、沒有真實意涵的「空虛」（無自性）。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;quad-cell q4&quot;&gt;
&lt;div class=&quot;quad-label&quot;&gt;勝義的假名&lt;/div&gt;
&lt;div class=&quot;quad-desc&quot;&gt;勝義的假名，即便是最大人成佛的「般若」，在最高真實中亦不外是「空無定實」。它為了度化眾生而施設「施設假名」。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;highlight&quot;&gt;
&lt;span class=&quot;highlight-label&quot;&gt;二諦核心&lt;/span&gt;
&lt;p&gt;&lt;strong&gt;「皆是假名」是二諦交鋒的最深匯通點&lt;/strong&gt;。論主以此一刀切下：世俗最重之「子」、出世最高之「般若」，在第一義諦上同等於「空無定實」。這不是否定其作用——世俗中子有養老之效、般若有成佛之力——而是暴露兩者皆是「緣起所成、無自性可執」的同一空性。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第四節　高階合成：差別相——終極對照矩陣（The Ultimate Matrix）&lt;/h2&gt;
&lt;p&gt;論主在「總相」與「皆是假名」之後，再以六項差別對照，徹底拉開「世俗愛子（假名虛誑）」與「般若波羅蜜（假名真實）」的層次。同樣是「假名」，前者是虛妄之名，後者卻是法界實證之名——這正是般若超越世俗的關鍵秘密：&lt;/p&gt;
&lt;table class=&quot;compare-table&quot;&gt;
&lt;thead&gt;&lt;tr&gt;&lt;th&gt;差別維度&lt;/th&gt;&lt;th&gt;世間愛子（假名虛誑）&lt;/th&gt;&lt;th&gt;般若波羅蜜（假名真實）&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;&lt;th&gt;代價（Sacrifice）&lt;/th&gt;&lt;td&gt;父不能以頭目與子&lt;/td&gt;&lt;td&gt;菩薩為法捨頭目髓腦&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;回報（Return）&lt;/th&gt;&lt;td&gt;現世小利、衣食歡樂&lt;/td&gt;&lt;td&gt;具足一切智慧、世間富樂&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;時間（Duration）&lt;/th&gt;&lt;td&gt;恩極一世&lt;/td&gt;&lt;td&gt;益至無量世，乃至成佛&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;本質（Nature）&lt;/th&gt;&lt;td&gt;或好或惡、虛誑不實&lt;/td&gt;&lt;td&gt;無諸不可、真實聖法無虛誑&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;結果（Outcome）&lt;/th&gt;&lt;td&gt;伴隨憂愁苦惱、不能免生老病死&lt;/td&gt;&lt;td&gt;畢竟清淨無患、為天人主&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;樂受（Felicity）&lt;/th&gt;&lt;td&gt;得現世小樂而有無量之苦&lt;/td&gt;&lt;td&gt;但得歡喜實樂，乃至佛樂&lt;/td&gt;&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h2&gt;第五節　中觀視角：世俗的「有」 vs. 第一義的「空」&lt;/h2&gt;
&lt;p&gt;為何同為假名，卻有天壤之別？論主以「無相之物的虛誑 vs. 有相之物的真實」二元矩陣解開謎團：&lt;/p&gt;
&lt;div class=&quot;quadrant&quot;&gt;
&lt;div class=&quot;quad-cell q1&quot;&gt;
&lt;div class=&quot;quad-label&quot;&gt;解脫 × 真實（般若象限）&lt;/div&gt;
&lt;div class=&quot;quad-title&quot;&gt;第一義的空&lt;/div&gt;
&lt;div class=&quot;quad-desc&quot;&gt;起若離合無中為「空」，但其功能是順應實相、破除無明。它是唯一能引向寂滅解脫的「真實聖法」——空而能用、用而非實。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;quad-cell q2&quot;&gt;
&lt;div class=&quot;quad-label&quot;&gt;束縛 × 虛妄（愛子象限）&lt;/div&gt;
&lt;div class=&quot;quad-title&quot;&gt;世俗的有&lt;/div&gt;
&lt;div class=&quot;quad-desc&quot;&gt;無明執物的虛誑：子雖在世俗中呈現為「有」，卻是建構在無明與業力之上的「虛妄不實」，終將導入老苦病死的生老病死。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;quad-cell q3&quot;&gt;
&lt;div class=&quot;quad-label&quot;&gt;束縛 × 真實&lt;/div&gt;
&lt;div class=&quot;quad-desc&quot;&gt;這個象限即是世俗以為的「有」與「真實」並存——但在中觀義理下，這是不可能的：凡是束縛者必是虛妄，凡是真實者必離束縛。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;quad-cell q4&quot;&gt;
&lt;div class=&quot;quad-label&quot;&gt;解脫 × 虛妄&lt;/div&gt;
&lt;div class=&quot;quad-desc&quot;&gt;這個象限亦不可能：凡是真正的解脫，必是「真實聖法」；任何虛妄之解脫，皆非真解脫。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;highlight&quot;&gt;
&lt;span class=&quot;highlight-label&quot;&gt;中觀深義&lt;/span&gt;
&lt;p&gt;世俗愛子與般若波羅蜜雖然在「假名」這一層相同，但在「有相之物的虛誑 vs. 無相之物的真實」這個更深的二元矩陣中，被徹底分判——前者落在「束縛 × 虛妄」象限，後者高居「解脫 × 真實」象限。論主用此矩陣精確地揭示「假名」二字並非無差別的同一：&lt;strong&gt;同樣假名，世間之假名是無明執取之名，般若之假名是法界實證之名&lt;/strong&gt;。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第六節　修證心法：亦愛亦空的辯證觀修&lt;/h2&gt;
&lt;p&gt;將世間最深的痛，轉化為出世間最猛的力。普法欲的極致，必須像失去那「虛妄假名（愛子）」一樣痛苦，去追求那個「真實假名（般若）」。&lt;/p&gt;
&lt;div class=&quot;four-grid&quot;&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;情感的位移&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;菩薩深知世間恩愛的虛幻與副作用，因此將這份廣大的情感執著，100% 轉移至對究竟解脫的渴望——這是在「無所得」中必須具備的「大欲」。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;捨棄虛妄&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;必須像失去那「虛妄假名（愛子）」一樣痛苦，去追求那個「真實假名（般若）」——亦愛亦空，是辯證觀修的核心姿態。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;承接真實&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;將世間的情緒能量轉接到出世的求法精進力——這正是「煩惱即菩提」的具體操作：不是消滅煩惱，而是轉用煩惱之能量為菩提之動力。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;辯證修觀&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;「亦愛亦空」——既具足世間最深之情，又洞見此情之空性；既不墮愛欲，亦不墮空寂——這正是中道觀的修證體現。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;chapter&quot; id=&quot;chapter-7&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第七章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;中觀實證與全局整合&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;入無量三昧 · 覺悟模型 · 學術洞見 · 研究應用&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;h2&gt;第一節　中觀實證結果：入無量三昧&lt;/h2&gt;
&lt;p&gt;經歷情緒與認知的終極淬鍊，見諸法實相，感官徹底解脫。經文於本卷終末直接陳列薩陀波崙菩薩在「七日一心」之後所現「無量三昧門」——共五十餘三昧，皆以「諸法」起首，標明這些定境並非主觀感官之虛幻體驗，而是直接洞見諸法實相之客觀證量：&lt;/p&gt;
&lt;div class=&quot;three-col&quot;&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;諸法性觀三昧&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;直觀諸法之自性——而其結論是「諸法性不可得」。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;諸法不可得三昧&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;於一切法中無有可執之自性可得；此即般若空慧之直接證量。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;如幻威勢三昧&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;證知一切法如幻而具威勢——不墮空寂，亦不執實有。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;如鏡像三昧&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;諸法如鏡中像——非有非無，能照能現。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;如虛空三昧&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;如虛空無礙、無染、含容萬法。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;離一切相三昧&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;超越一切相對的取相、捨相之執——契入無相實相。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;highlight&quot;&gt;
&lt;span class=&quot;highlight-label&quot;&gt;實證結果&lt;/span&gt;
&lt;p&gt;薩陀波崙菩薩於極致的專注與絕望中見佛，瞬間證入無量三昧門，徹底打通中觀實相——「於是處住念曇無竭菩薩，一切法中得無礙知見已，即得無量三昧門現在前」。「&lt;strong&gt;無礙知見&lt;/strong&gt;」四字是整個求法歷程的果證——亦是第一品（卷九十七首品）終結的關鍵成就。&lt;/p&gt;
&lt;/div&gt;
&lt;p&gt;這五十餘三昧名雖各異，皆以「諸法」起首，意指所證者皆是法界實相之直觀，並非主觀心境之裝飾。論主在此暗暗呼應前述四問四答之結論：每一個轉折所破除的執著，最終皆轉化為一個三昧之門。&lt;/p&gt;
&lt;h2&gt;第二節　全局整合：薩陀波崙覺悟模型（The Complete Architecture）&lt;/h2&gt;
&lt;p&gt;將四個看似極端的轉折，收為一套精密縝密的「修行循次系統」。論主四問四答非並列、非孤立，而是構成一個前後相續、層層遞進的完整工程：&lt;/p&gt;
&lt;div class=&quot;flow flow-v&quot;&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;1 · 緣起覆心（Wave overriding logic）&lt;/strong&gt;&lt;small&gt;大歡喜瞬間覆蓋世俗理性——破我執&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;2 · 逆向重建（Feedback loop of staying）&lt;/strong&gt;&lt;small&gt;住地七日重建一心因緣——破場所執&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;3 · 中道測準（Fulcrum at 7 days）&lt;/strong&gt;&lt;small&gt;七日為臨界點，不及則因緣未熟，太過則妨心崩潰&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;4 · 二諦圓融（Resolving Love &amp;amp; Emptiness）&lt;/strong&gt;&lt;small&gt;世俗最深之痛轉為出世最高之智，亦愛亦空&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;strong&gt;諸法實相 · 入無量三昧&lt;/strong&gt;&lt;small&gt;無礙知見現前，五十餘三昧門同時開顯&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;p&gt;從「因緣」的聚合與消融，經「破執」的痛感，精準掌握「中道」的臨界點，最終在「二諦」的辯證中，完成世俗情感的般若實相的終極隱喻。每一步都不是神蹟，而是施工工程的演算法。&lt;/p&gt;
&lt;h2&gt;第三節　學術洞見：《大智度論》的論述策略&lt;/h2&gt;
&lt;p&gt;龍樹菩薩如何將冷硬的空性哲理、無縫鑲嵌於極端敘事之中？本品所示的論述方法可歸納為三大策略：&lt;/p&gt;
&lt;div class=&quot;three-col&quot;&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;以情動人，以理破執&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;利用世俗最極端的情感體驗（喪子之痛、中斷之愛），建立讀者的同理心；繼以「皆是假名、真實無虛誑」的理性反思破除這份同理之執。&lt;small&gt;對應：第六章 第四轉折&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;變數控制的哲學化&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;將時間（七日）、空間（住地）、條件（聲滅）轉化為《中論》「緣起性空」的實驗參數，使空性教學具備可重複驗證的「中觀實踐工程學」面貌。&lt;small&gt;對應：第三、四、五章&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;敘事的除魅&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;證明大乘經典中的「感應」並非外靈降臨，而是行者內心「善法欲」與「無明破除」的物理學反應；佛身現是因緣而非他力。&lt;small&gt;對應：第五章 第五節&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;p&gt;三大策略交織成龍樹獨特的「&lt;strong&gt;敘事學 × 心理學 × 中觀學&lt;/strong&gt;」三圓交集論述美學——在《大智度論》全書中，本卷正是此論述方法最精純的展示範本之一。&lt;/p&gt;
&lt;h2&gt;第四節　研究應用：供專家延伸之核心議題&lt;/h2&gt;
&lt;p&gt;基於本品的動力學框架，可進一步開展之學術探討議題如下：&lt;/p&gt;
&lt;div class=&quot;two-col&quot;&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;議題一　善法欲與阿賴耶識的轉化&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;探討「如喪愛子」的極端執著，如何在唯識論學派的框架中，解釋染污識向清淨智的轉依（Āśraya-parāvṛtti）機制——並與唯識學「轉識成智」之說互相對照。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;議題二　初期大乘的「感應道交」辯證&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;比較《般若經》與《法華經》等不同經典中，佛陀示現的「時間參數」與「緣起說」之間的神學與哲學差異。研究本品「七日佛現」與其他經中「無量劫示現」之異同。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;議題三　譬喻論的中觀化路徑&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;論主以「小兒失味」「毒箭中身」「父子之情」三譬喻為例，研究龍樹如何利用世俗譬喻為「破執」服務——譬喻成為從世俗諦過渡到第一義諦的辯證梯子。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;col col-card&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;議題四　無量三昧之分類學研究&lt;/div&gt;
&lt;div class=&quot;col-content&quot;&gt;經文末段陳列五十餘三昧名，可作為「般若系定學分類」之獨立研究對象——比對《大智度論》它處列舉之三昧（如卷四十七的「百八三昧」）以見龍樹三昧學之全景。&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;highlight&quot; style=&quot;margin-top:30px;&quot;&gt;
&lt;span class=&quot;highlight-label&quot;&gt;本品結語&lt;/span&gt;
&lt;p&gt;從「忘」到「住」，從「七日」到「如喪愛子」，從「啼哭」到「入無量三昧」——薩陀波崙菩薩在曠野中所走過的，不是神話之路，而是一條精密設計的中觀實踐之道。本品（卷九十七首品）以四問四答揭示此道之機制，以無量三昧證明此道之果證；龍樹菩薩於此暗暗指示後學：&lt;strong&gt;「般若波羅蜜真實聖法，無有虛誑」&lt;/strong&gt;——此語不是信仰宣稱，而是經由本品所述之動力學工程實證可達之結論。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:40px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:12px;opacity:.75;letter-spacing:3px;}

/* ===== Layout ===== */
.main{margin-left:var(--sbW);min-height:100vh;}
.site-hero{position:relative;background:var(--headGrad);color:#f5e9c8;
  padding:80px 40px 70px;text-align:center;overflow:hidden;}
.site-hero::before{content:&quot;般若波羅蜜&quot;;position:absolute;font-size:240px;
  font-weight:900;color:#fff;opacity:.035;top:50%;left:50%;
  transform:translate(-50%,-50%);white-space:nowrap;letter-spacing:.4em;
  font-family:&quot;Noto Serif TC&quot;,serif;}
.hero-title{font-size:56px;font-weight:900;letter-spacing:.05em;
  color:var(--goldL);text-shadow:0 2px 8px rgba(0,0,0,.4);position:relative;}
.hero-subtitle{font-size:20px;letter-spacing:.5em;margin-top:14px;
  color:#e0d4b0;position:relative;}
.hero-sub{font-size:18px;color:#d4c4a8;letter-spacing:.18em;
  margin-top:10px;position:relative;}
.hero-meta{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;
  letter-spacing:.32em;color:#a89878;margin-top:24px;position:relative;}
.hero-range{font-size:17px;color:var(--goldL);margin-top:8px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;letter-spacing:.18em;position:relative;}

/* ===== Preface ===== */
.preface{max-width:880px;margin:50px auto;padding:30px 40px;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  box-shadow:0 2px 16px rgba(91,58,41,.06);}
.preface h2{font-size:30px;color:var(--accent);text-align:center;
  margin-bottom:18px;letter-spacing:.18em;font-weight:700;
  border-bottom:none;padding:0;}
.preface h2::before{content:&quot;❖&quot;;color:var(--gold);margin-right:12px;}
.preface h2::after{content:&quot;❖&quot;;color:var(--gold);margin-left:12px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text);
  margin-bottom:14px;text-align:justify;text-indent:2em;}
.preface .preface-tag{display:inline-block;background:var(--gold);color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12px;letter-spacing:2.2px;
  padding:3px 12px;border-radius:12px;margin-bottom:12px;}

/* ===== TOC ===== */
.toc-section{max-width:1100px;margin:50px auto;padding:0 30px;}
.toc-title{font-size:34px;color:var(--accent);text-align:center;
  letter-spacing:.18em;font-weight:700;margin-bottom:8px;}
.toc-desc{text-align:center;color:var(--text2);font-size:17px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;letter-spacing:.2em;margin-bottom:32px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
.toc-card{background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:18px 22px;transition:all .25s;cursor:pointer;
  text-decoration:none;color:inherit;display:block;
  box-shadow:0 1px 4px rgba(91,58,41,.06);}
.toc-card:hover{border-color:var(--gold);transform:translateY(-2px);
  box-shadow:0 4px 14px rgba(91,58,41,.12);}
.toc-num{display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:18px;font-weight:700;color:var(--gold);margin-bottom:6px;
  letter-spacing:.1em;}
.toc-name{font-size:19.5px;line-height:1.7;color:var(--text);font-weight:600;}
.toc-sub{font-size:14px;color:var(--text-muted);margin-top:6px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;letter-spacing:.05em;}

/* ===== Chapter ===== */
.chapter{max-width:980px;margin:54px auto;padding:0 30px;}
.ch-head{background:var(--headGrad);color:#fff;
  padding:46px 30px 38px;text-align:center;border-radius:14px 14px 0 0;
  position:relative;overflow:hidden;}
.ch-head::after{content:&quot;&quot;;position:absolute;left:50%;bottom:14px;
  transform:translateX(-50%);width:80px;height:2px;
  background:linear-gradient(90deg,transparent,var(--goldL),transparent);}
.ch-num{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:18px;
  letter-spacing:.32em;color:var(--goldL);margin-bottom:12px;font-weight:500;}
.ch-name{font-size:34px;font-weight:700;letter-spacing:.08em;color:#fff;
  margin-bottom:10px;}
.ch-sub{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:17px;
  letter-spacing:.18em;color:#d4c4a8;}
.ch-body{background:var(--card);border:1px solid var(--border);border-top:0;
  border-radius:0 0 14px 14px;padding:42px 50px 46px;
  box-shadow:0 4px 22px rgba(91,58,41,.08);}

/* ===== Section headings ===== */
h2{font-size:30px;font-weight:700;color:var(--accent);
  margin:32px 0 14px;padding:10px 0 10px 20px;
  border-left:4px solid var(--gold);
  background:linear-gradient(90deg,rgba(184,134,11,.08),transparent);
  letter-spacing:.05em;}
h2:first-of-type{margin-top:0;}
h3{font-size:23.5px;font-weight:600;color:var(--text);
  margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border-light);
  letter-spacing:.04em;}
h4{font-size:20px;font-weight:600;color:var(--text2);margin:18px 0 8px;}
h5{font-size:18.5px;font-weight:600;color:var(--accent);margin:12px 0 6px;}
p{margin:0 0 12px;line-height:1.95;font-size:20px;text-align:justify;}
p strong,p b{color:var(--accent-red);font-weight:700;}

/* ===== Bridge ===== */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin:30px 0 14px;}
.bridge-label{display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:12.5px;background:var(--gold);color:#fff;
  padding:3px 12px;border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.05;font-size:18.5px;text-indent:0;}
.bridge p + p{margin-top:8px;}

/* ===== Verse / Classical text / QA ===== */
.verse,.gatha,blockquote{background:var(--verseBg);
  border-left:4px solid var(--verseBd);padding:14px 22px;margin:16px 0;
  line-height:2;text-align:center;font-size:22px;white-space:normal;}
.classical-text{background:#FFFDF5;border:1px solid #E8E0D0;
  border-radius:10px;padding:18px 24px;margin:16px 0;line-height:2;font-size:21px;}
.text-label{display:inline-block;background:#3d3225;color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13.5px;
  padding:3px 12px;border-radius:4px;letter-spacing:.18em;margin-bottom:8px;}

.qa{margin:14px 0;}
.qa .q{background:#eef2f8;border-left:4px solid #4a6da8;
  padding:12px 20px;margin-bottom:8px;color:#1f3a64;font-size:20px;}
.qa .a{background:#fff8ed;border-left:4px solid var(--accent);
  padding:12px 20px;color:var(--text);font-size:20px;}
.qa .label{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-weight:700;font-size:13.5px;
  letter-spacing:.18em;display:inline-block;margin-right:8px;
  padding:1px 8px;border-radius:4px;color:#fff;}
.qa .q .label{background:#4a6da8;}
.qa .a .label{background:var(--accent);}

/* ===== Cards ===== */
.card,.insight,.commentary,.note{background:var(--card);
  border:1px solid var(--border);border-radius:8px;padding:16px 22px;
  margin:14px 0;box-shadow:0 1px 3px rgba(0,0,0,.06);font-size:20px;line-height:1.95;}
.card-title,.insight-title{font-size:21.5px;color:var(--accent);
  font-weight:700;margin-bottom:8px;letter-spacing:.04em;}

.callout{background:linear-gradient(135deg,#fffdf5,#fbf3df);
  border:1px solid var(--gold);border-radius:10px;padding:18px 24px;
  margin:20px 0;box-shadow:0 2px 8px rgba(184,134,11,.1);}
.callout-label{display:inline-block;background:var(--gold);color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12.5px;letter-spacing:.2em;
  padding:3px 12px;border-radius:12px;margin-bottom:10px;}

/* ===== Grid layouts ===== */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:18px 0;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0;}
.col{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:18px 22px;font-size:19px;line-height:1.85;}
.col-title{font-size:21.5px;color:var(--accent);font-weight:700;
  margin-bottom:10px;text-align:center;letter-spacing:.04em;}
.col-sub{text-align:center;font-size:14px;color:var(--text-muted);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;letter-spacing:.1em;margin-bottom:8px;}

/* ===== Flow ===== */
.flow{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:10px;margin:18px 0;padding:14px 18px;background:var(--card);
  border:1px solid var(--border);border-radius:8px;}
.flow.flow-v{flex-direction:column;}
.flow-box,.flow-step{background:#fff8ed;border:1px solid var(--accentL);
  border-radius:8px;padding:12px 18px;min-width:140px;text-align:center;
  font-size:17.5px;line-height:1.5;}
.flow-step small{display:block;font-size:13px;color:var(--text-muted);
  margin-top:4px;font-family:&quot;Noto Sans TC&quot;,sans-serif;}
.flow-arrow{font-size:24px;color:var(--gold);font-weight:700;}

/* ===== Spectrum ===== */
.spectrum{display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(90deg,#e8d8b8,#fffdf7,#e8d8b8);
  border:1px solid var(--border);border-radius:30px;
  padding:14px 28px;margin:20px 0;font-size:15.5px;}
.sp-node{flex:1;text-align:center;font-weight:600;color:var(--text2);}
.sp-mid{flex:1.2;text-align:center;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff!important;border-radius:24px;padding:10px 16px;
  margin:0 8px;box-shadow:0 2px 8px rgba(184,134,11,.3);
  text-shadow:0 1px 3px rgba(0,0,0,.35);}
.sp-mid h5{color:#fff!important;font-weight:700;margin:0;font-size:18.5px;
  text-shadow:0 1px 3px rgba(0,0,0,.35);}
.sp-mid small{color:rgba(255,255,255,.92)!important;font-size:13px;
  display:block;margin-top:2px;}

/* ===== Compare table ===== */
.compare-table{width:100%;border-collapse:collapse;margin:18px 0;
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  overflow:hidden;}
.compare-table th,.compare-table td{padding:12px 18px;border:1px solid var(--border-light);
  text-align:left;font-size:18px;line-height:1.7;}
.compare-table th{background:#3d3225;color:#fff;font-weight:600;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;letter-spacing:.05em;text-align:center;}
.compare-table tr:nth-child(even) td{background:#fdf8eb;}
.compare-table td:first-child{font-weight:600;color:var(--accent);
  background:#fff8ed!important;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  text-align:center;font-size:16px;letter-spacing:.05em;}

/* ===== Triangle / Diagram ===== */
.triangle-diagram{display:grid;grid-template-columns:repeat(3,1fr);
  gap:14px;margin:20px 0;}
.tri-node{background:var(--card);border:1px solid var(--gold);
  border-radius:10px;padding:16px 18px;text-align:center;font-size:17px;
  box-shadow:0 2px 8px rgba(184,134,11,.1);}
.tri-node h5{color:var(--gold);font-size:16px;margin-bottom:6px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;letter-spacing:.1em;}

/* ===== Phase badge ===== */
.phase-badge{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--accent));
  color:#fff;padding:6px 16px;border-radius:20px;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:14px;letter-spacing:.18em;margin:0 6px 6px 0;}

/* ===== Highlight box ===== */
.hi-box{background:linear-gradient(135deg,#fdf8e8,#f5ebd0);
  border:1px solid var(--accentL);border-radius:10px;
  padding:20px 26px;margin:20px 0;box-shadow:0 2px 10px rgba(91,58,41,.08);}
.hi-box .lbl{display:inline-block;background:var(--accent);color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12.5px;letter-spacing:.2em;
  padding:3px 12px;border-radius:12px;margin-bottom:10px;}

/* ===== Back to top ===== */
#backTop{position:fixed;right:24px;bottom:80px;width:44px;height:44px;
  border-radius:50%;background:var(--gold);color:#fff;border:0;
  font-size:20px;cursor:pointer;opacity:0;visibility:hidden;
  transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:90;}
#backTop.show{opacity:1;visibility:visible;}

/* ===== Footer ===== */
.site-footer{background:var(--headGrad);color:#a89878;
  padding:40px 30px;text-align:center;margin-top:60px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:15px;letter-spacing:.18em;}
.site-footer p{margin:6px 0;font-size:15px;text-indent:0;text-align:center;color:#a89878;}
.site-footer .gatha-line{color:var(--goldL);font-size:17px;letter-spacing:.32em;
  font-family:&quot;Noto Serif TC&quot;,serif;margin:14px 0;}

hr{border:0;height:1px;background:var(--border);margin:24px 0;}

/* ===== Responsive ===== */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.show{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .site-hero{padding:60px 20px 50px;}
  .hero-title{font-size:38px;}
  .hero-subtitle{font-size:16px;letter-spacing:.32em;}
  .ch-body{padding:30px 22px;}
  .ch-head{padding:34px 16px 28px;}
  .ch-name{font-size:26px;}
  .preface{margin:30px 16px;padding:22px 18px;}
  .toc-grid{grid-template-columns:1fr;}
  .two-col,.three-col,.triangle-diagram{grid-template-columns:1fr;}
}
@media(max-width:600px){
  body{font-size:17px;}
  p{font-size:18px;}
  .hero-title{font-size:30px;}
}

&lt;section class=&quot;preface&quot;&gt;
&lt;h2&gt;編 者 前 言&lt;/h2&gt;
&lt;p&gt;&lt;span class=&quot;preface-tag&quot;&gt;本品定位&lt;/span&gt;卷九十七承上品經文之後，進入論主龍樹菩薩自設的問答破疑。經文敘述薩陀波崙菩薩東行求法、空中佛現、五百由旬外有眾香城、曇無竭菩薩於彼說般若。第二品聚焦於「論主」如何拆解三個讀者必然會起的疑問——空中現的是何等佛？眾香城在何處？曇無竭因緣如何？——以此為入口，揭示般若道上「感應」、「空間」、「導師」三大主題的中觀視角。&lt;/p&gt;
&lt;p&gt;本卷釋義以隨附之《論文 · 三層釋義框架》為骨幹，將每組問答拆解為「教理邏輯（業感、緣起、感應道交）」、「操作心法（止觀、調柔、安忍）」與「中觀勝義（如幻、二諦、緣起性空）」三層。讀者先讀第二章「原典」，再順第三至第七章逐章深入，便能在故事敘事的表層之下，看見龍樹菩薩用一個尋路者的旅程，鋪展整部般若波羅蜜的修行地圖。&lt;/p&gt;
&lt;p&gt;第一章先把第二品放回卷九十七的位置，並交代「三層釋義框架」的由來；第二章為原典；第三章解第一辯——空中佛現的因緣論；第四章補入「觀身如幻、觀世如夢」的中觀視角；第五章解第二辯——眾香城的業感地理學；第六章解第三辯——曇無竭因緣與導師形象；第七章收束於緣起如幻、對治惡取空的龍樹本懷。&lt;/p&gt;
&lt;/section&gt;
