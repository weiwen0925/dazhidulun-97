&lt;section class=&quot;chapter&quot; id=&quot;chapter-1&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 第二品 · 第一章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;序分 · 第二品定位與三層釋義框架&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;本卷的入口 · 一張閱讀地圖&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;div class=&quot;bridge bridge-intro&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;本章要旨&lt;/div&gt;
&lt;p&gt;第二品在卷九十七中是一個「論主插入」的橋段——薩陀波崙的故事原本可以一直敘下去，龍樹菩薩偏要在「空中佛現」與「東行五百由旬」之間，停下來辯三個問題。本章先把這個結構講清楚，然後引入隨附論文所建立的「三層釋義框架」（教理 · 操作 · 中觀），作為後續第三至第七章的閱讀地圖。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第一節　第二品在卷九十七中的位置&lt;/h2&gt;
&lt;p&gt;卷九十七題為「&lt;b&gt;釋薩陀波崙品第八十八之餘&lt;/b&gt;」。「之餘」二字說明：本卷不是釋此品的全部，而是承接前卷未盡之處繼續解釋。卷首先列經文（卷九十七 · 第一品 · 經文），敘薩陀波崙受空中教誨、東行五百由旬、聞眾香城、聞曇無竭菩薩說般若、自己於念佛中得無量三昧現前。緊接著進入「&lt;b&gt;第二品 · 論主問答&lt;/b&gt;」——也就是本品。&lt;/p&gt;
&lt;div class=&quot;callout&quot;&gt;
&lt;div class=&quot;callout-label&quot;&gt;結構觀察&lt;/div&gt;
&lt;p&gt;論主在此處停筆三問，不是隨意，而是因為敘事到了一個關鍵轉折——「五百由旬外有城名眾香」。這一句若不破「方所實有」之執、不破「佛身決定有相」之執、不破「導師是另一個更高的『我』」之執，後文整段眾香城七寶莊嚴、曇無竭與婇女遊戲、日三時說般若的描寫，極容易被讀者讀成神話小說，反失般若本懷。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第二節　三層釋義框架（教理 / 操作 / 中觀）&lt;/h2&gt;
&lt;p&gt;隨附論文《尋路者：薩陀波崙東行求法的中觀邏輯》，將《大智度論》本品的釋義拆為三層分析爐陣，本卷釋義即依此三層展開：&lt;/p&gt;
&lt;div class=&quot;triangle-diagram&quot;&gt;
&lt;div class=&quot;tri-node&quot;&gt;&lt;h5&gt;教理邏輯&lt;/h5&gt;&lt;p&gt;探討「業感緣起」的物理與空間法則——因果、頻率、感應的運作機制。對應第三、五章的前半。&lt;/p&gt;&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;&lt;h5&gt;操作心法&lt;/h5&gt;&lt;p&gt;拆解修行者的止觀操作與意識狀態——破障、安忍、調柔、信樂。對應第三章後半、第六章。&lt;/p&gt;&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;&lt;h5&gt;中觀勝義&lt;/h5&gt;&lt;p&gt;呈現緣起如幻與二諦圓融的勝義收束——以幻修幻、對治惡取空、中道實相。對應第四、七章。&lt;/p&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;hi-box&quot;&gt;
&lt;span class=&quot;lbl&quot;&gt;分析爐陣的核心命題&lt;/span&gt;
&lt;p&gt;論文以「&lt;b&gt;三層分析爐陣&lt;/b&gt;」為方法，認為《大智度論》的故事敘事不能只當神話讀，要層層萃取：第一層去神話化，把空中佛現還原為感應的物理機制；第二層還原操作，把七日七夜還原為止觀技術；第三層鎖定龍樹辯證，看出整個敘事如何展現「緣起性空」與「二諦圓融」。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　旅程的本質 · 以幻修幻的二諦圓融&lt;/h2&gt;
&lt;p&gt;論文在通論部分以一句總攝整品的核心命題：&lt;b&gt;整個東行求法，並非物理空間的移動，而是「緣起性空」的極致展演&lt;/b&gt;。行者正忍受著極度真實的苦（世俗諦），去追尋一個本無實體的目標（勝義諦），而這正是唯一能證悟空性的路徑。&lt;/p&gt;
&lt;div class=&quot;verse&quot;&gt;
      旅程的本質：以幻修幻的二諦圓融&lt;br/&gt;
      ——求一個不可得的「處所」，用一個不真實的「身心」，&lt;br/&gt;
      在一場必須當真去走的「路」裡，照見諸法本空。
    &lt;/div&gt;
&lt;p&gt;有了這句總綱，後文第三至第七章逐項展開的問題——「空中佛是誰」、「眾香城在哪」、「曇無竭何德」——都可以還原為這句話的不同切片。下面正式進入原典與三辯。&lt;/p&gt;
&lt;div class=&quot;bridge bridge-outro&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;承先啟後&lt;/div&gt;
&lt;p&gt;有了這份地圖，下一章便可放心進入第二品的原典——三組問答如同三道門，各對應三層中的一個切口。讀第二章時不必急著消化，記住每一辯都會在第三、五、六章被拆得更細；那裡才是論主真正下功夫的地方。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;



&lt;section class=&quot;chapter&quot; id=&quot;chapter-2&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 第二品 · 第二章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;大智度論卷九十七 · 第二品原典&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;論主三辯 · 字字皆論&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;div class=&quot;bridge bridge-intro&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;本章要旨&lt;/div&gt;
&lt;p&gt;本章為原典本身——龍樹菩薩在卷九十七釋第二品中所立的三組「問曰／答曰」。三辯逐一處理：①空中現的是何等佛？為何先有聲後有身？為何不直度？②眾香城在何處？③曇無竭其人因緣如何？三辯按文承接，從「人物（佛）」到「處所（城）」到「導師（曇無竭）」，正好構成空間—時間—人法三角。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第一節　第一辯 · 空中佛現的因緣&lt;/h2&gt;
&lt;div class=&quot;qa&quot;&gt;
&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;label&quot;&gt;問曰&lt;/span&gt;空中佛現，是何等佛？先何以但有音聲而今現身？佛既現身，何以不即度，方遣至曇無竭所？&lt;/div&gt;
&lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;label&quot;&gt;答曰&lt;/span&gt;有人言：非真佛，但是像現耳——或諸佛遣化，或大菩薩現作。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;論主廣答&lt;/span&gt;
&lt;p&gt;以先善根福德未成就故，但聞聲；今七日七夜一心念佛，功德成就故，得見佛身。&lt;/p&gt;
&lt;p&gt;佛所以不即度者，以其與曇無竭世世因緣，應當從彼度故。有人應從舍利弗度，假使諸佛現身，不能令悟。佛讚言善哉者，以薩陀波崙至意求知去處、聞般若因緣故，佛現身而讚善哉。&lt;/p&gt;
&lt;p&gt;過去諸佛行菩薩道時，求此般若，亦如是種種勤苦；以初發心，先罪厚重，福德未集故。佛安慰其心：「汝求般若波羅蜜，雖勤苦，莫懈怠，莫生退沒心！一切眾生行異，因時皆苦，受果時樂。當思惟諸佛無量功德果報，以自勸勉。」&lt;/p&gt;
&lt;p&gt;如是安慰已，作是言：「汝從是東行，去此五百由旬，有城名眾香，乃至不久當聞般若波羅蜜。」&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第二節　第二辯 · 眾香城的方位&lt;/h2&gt;
&lt;div class=&quot;qa&quot;&gt;
&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;label&quot;&gt;問曰&lt;/span&gt;眾香城在何處？&lt;/div&gt;
&lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;label&quot;&gt;答曰&lt;/span&gt;過去佛滅度後，但有遺法，是法不周遍閻浮提，眾生有聞法因緣處則到。爾時，眾香國土豐樂，多出七寶故，以七寶作城。時薩陀波崙雖同在閻浮提，而在無佛法、無七寶處生，但傳聞佛名、般若波羅蜜是佛道。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;論主廣答&lt;/span&gt;
&lt;p&gt;是人先世廣集福德，煩惱輕微故，聞即信樂，厭惡世樂，捨其親屬，到空林中住，欲至有佛法國土。音聲示語者，恐其異去，不得到曇無竭菩薩所，是故語之；次後佛為現身，示其去處。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　第三辯 · 曇無竭因緣&lt;/h2&gt;
&lt;div class=&quot;qa&quot;&gt;
&lt;div class=&quot;q&quot;&gt;&lt;span class=&quot;label&quot;&gt;問曰&lt;/span&gt;薩陀波崙因緣已具聞於上，今曇無竭因緣為云何？&lt;/div&gt;
&lt;div class=&quot;a&quot;&gt;&lt;span class=&quot;label&quot;&gt;答曰&lt;/span&gt;「欝伽陀」，秦言「盛」；「達磨」，秦言「法」。此菩薩在眾香城中，為眾生隨意說法，令眾生廣種善根，故號「法盛」。&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;論主廣答&lt;/span&gt;
&lt;p&gt;其國無王，此中人民皆無吾我，如欝單越人，唯以曇無竭菩薩為王。其國難到，薩陀波崙不惜身命，又得諸佛菩薩接助能到。大菩薩為度眾生故，生如是國中；眾生無所乏短，其心調柔，易可得度故。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;bridge bridge-outro&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;承先啟後&lt;/div&gt;
&lt;p&gt;原典讀過一遍，三辯的提問層級已立。下一章從第一辯切入，把「空中佛現—先聲後身—不即度而遣度」三個問號逐一拆開——這三句其實涵蓋了「感應的物理」、「止觀的轉化」、「因緣的緣起無主」三個完全不同層次的命題。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;



&lt;section class=&quot;chapter&quot; id=&quot;chapter-3&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 第二品 · 第三章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;第一辯解析 · 空中佛現的物理學&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;感應頻率 · 業力轉化 · 因緣無主&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;div class=&quot;bridge bridge-intro&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;本章要旨&lt;/div&gt;
&lt;p&gt;第一辯三個子問——「是何等佛？」「為何先聲後身？」「為何現身不直度？」——表面是三個故事疑問，實質是三個結構命題：&lt;b&gt;佛非實體（教理）&lt;/b&gt;、&lt;b&gt;頻率可躍升（操作）&lt;/b&gt;、&lt;b&gt;緣起無主宰（中觀）&lt;/b&gt;。本章五節依論文五個模塊展開，每節之間互為連環。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第一節　敘事場景 · 曠野中七日七夜極度專注&lt;/h2&gt;
&lt;p&gt;故事的物理場景是一片「空林」。薩陀波崙因不知何處求法而愁哭、聞空中聲後，於原地不動，進入長達七日七夜「&lt;b&gt;不念飢渴寒熱、不念疲極、不聞般若終不起也&lt;/b&gt;」的極度專注狀態，最終感得佛現身指導。論主在此處的設問正是針對這個結構：為什麼前期只能「&lt;b&gt;聞空中聲&lt;/b&gt;」，七天後卻能「&lt;b&gt;得見佛身&lt;/b&gt;」？&lt;/p&gt;
&lt;div class=&quot;callout&quot;&gt;
&lt;div class=&quot;callout-label&quot;&gt;論文洞見&lt;/div&gt;
&lt;p&gt;整個七日七夜不是憑虔誠等待，而是一場「&lt;b&gt;能量級別重整&lt;/b&gt;」。論主用「先善根福德未成就 → 但聞聲；今七日七夜一心念佛，功德成就 → 得見佛身」一句，把整個感應過程拆為一個可量化的能量轉化模型。下節即依此模型展開。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第二節　聲與色的物理演進 · 感應頻率三階段&lt;/h2&gt;
&lt;p&gt;論文將這個能量轉化模型拆為三個階段，本卷依其結構重新整理為下表：&lt;/p&gt;
&lt;div class=&quot;flow flow-v&quot;&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;b&gt;階段一 · 低頻&lt;/b&gt;&lt;small&gt;唯有聞聲 · 善根福德未成就 · 訊號微弱&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;b&gt;階段二 · 轉化&lt;/b&gt;&lt;small&gt;七日七夜一心念佛 · 雜訊清除 · 業力重整&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-step&quot;&gt;&lt;b&gt;階段三 · 高頻&lt;/b&gt;&lt;small&gt;得見佛身 · 突破感官障礙 · 功德成就&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;hi-box&quot;&gt;
&lt;span class=&quot;lbl&quot;&gt;教理邏輯&lt;/span&gt;
&lt;p&gt;「&lt;b&gt;聲&lt;/b&gt;」與「&lt;b&gt;色&lt;/b&gt;」並非兩個不同的佛，而是同一感應在不同頻率下的呈現。低頻時受者只能接收到指引方向的「聲訊號」；高頻時整體訊號才能凝聚為可見的「色身」。這個物理隱喻正面回答了「先何以但有音聲而今現身」——不是佛改變了，是受者改變了。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　感應緣起對照表 · 前期 vs 後期&lt;/h2&gt;
&lt;table class=&quot;compare-table&quot;&gt;
&lt;thead&gt;&lt;tr&gt;&lt;th style=&quot;width:12%&quot;&gt;階段&lt;/th&gt;&lt;th&gt;業力條件&lt;/th&gt;&lt;th&gt;專注層級&lt;/th&gt;&lt;th&gt;顯化結果&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;&lt;td&gt;前期&lt;/td&gt;&lt;td&gt;先罪厚重 · 福德未集&lt;/td&gt;&lt;td&gt;憂愁苦志 · 尋找方向&lt;/td&gt;&lt;td&gt;唯聞空中聲 · 如谷中迴音 · 間接訊號&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;後期&lt;/td&gt;&lt;td&gt;功德成就 · 善根具足&lt;/td&gt;&lt;td&gt;一心念佛 · 無有異心&lt;/td&gt;&lt;td&gt;得見佛身 · 如鏡中影像 · 直接顯化&lt;/td&gt;&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;p&gt;對照表的價值在於把「業力」與「專注」分為兩條獨立的軸：縱使業力同樣厚重，若專注力不到位，仍只能停在前期；反過來，業力轉化是「以高強度專注瞬間調用」的過程，不是慢慢累積的線性增長。下節即拆此一機制。&lt;/p&gt;
&lt;h2&gt;第四節　破障與安忍 · 高強度專注的轉化機制&lt;/h2&gt;
&lt;div class=&quot;two-col&quot;&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;破障 · Penetration&lt;/div&gt;
&lt;div class=&quot;col-sub&quot;&gt;瞬間轉化&lt;/div&gt;
&lt;p&gt;在絕境中，唯一的解法是高強度的專注。「&lt;b&gt;定力作為一種能量，能瞬間轉化厚重的歷史業力&lt;/b&gt;」——七日七夜不是「等」，是「燒」。專注的密度才是業力轉化的真正槓桿。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;安忍 · Endurance&lt;/div&gt;
&lt;div class=&quot;col-sub&quot;&gt;心法定錨&lt;/div&gt;
&lt;p&gt;佛現身先讚「善哉」、再說「過去諸佛行菩薩道時，亦如是勤苦」，是把眾生的修行苦放回更大的時空座標。「&lt;b&gt;因時皆苦，受果時樂&lt;/b&gt;」是安忍的口訣，「莫生退沒心」是定錨指令。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;callout&quot;&gt;
&lt;div class=&quot;callout-label&quot;&gt;操作心法&lt;/div&gt;
&lt;p&gt;破障與安忍是一對：破障是「&lt;b&gt;動&lt;/b&gt;」的能量打通，安忍是「&lt;b&gt;靜&lt;/b&gt;」的心法守護。沒有安忍，破障的能量會反噬為焦慮；沒有破障，安忍只是消極等待。論主在「七日七夜」與「諸佛安慰」兩段文字之間，正是把這對機制縫合在一起。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第五節　因緣無主 · 為何諸佛現身仍需遣度&lt;/h2&gt;
&lt;p&gt;第一辯最深一問是：「&lt;b&gt;佛既現身，何以不即度，方遣至曇無竭所？&lt;/b&gt;」一般讀者直覺是「佛不夠慈悲嗎？」論主的答案出人意料——「&lt;b&gt;以其與曇無竭世世因緣，應當從彼度故。有人應從舍利弗度，假使諸佛現身，不能令悟&lt;/b&gt;」。&lt;/p&gt;
&lt;div class=&quot;hi-box&quot;&gt;
&lt;span class=&quot;lbl&quot;&gt;中觀視角&lt;/span&gt;
&lt;p&gt;這一句把「悟」與「度」拆為一個必須有&lt;b&gt;線路圖&lt;/b&gt;的事件，不是一個能量大就能擊穿的被動接收。論文以電路為喻：諸佛現身是「&lt;b&gt;供電端&lt;/b&gt;」（能量極強），世世因緣是「&lt;b&gt;傳導線&lt;/b&gt;」（連接受者與真正能傳遞此法的人），薩陀波崙是「&lt;b&gt;接收端&lt;/b&gt;」。若傳導線不對，即使供電端能量再強，電流也無法擊穿——這正是「&lt;b&gt;法不孤起，仗境方生&lt;/b&gt;」的中觀視角：覺悟缺乏獨立的主宰，純粹依賴因緣絡網的精確對接。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;flow&quot;&gt;
&lt;div class=&quot;flow-box&quot;&gt;&lt;b&gt;諸佛現身&lt;/b&gt;&lt;br/&gt;&lt;small&gt;供電端 · 能量&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;→&lt;/div&gt;
&lt;div class=&quot;flow-box&quot;&gt;&lt;b&gt;世世因緣&lt;/b&gt;&lt;br/&gt;&lt;small&gt;傳導線 · 對接&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;→&lt;/div&gt;
&lt;div class=&quot;flow-box&quot;&gt;&lt;b&gt;曇無竭&lt;/b&gt;&lt;br/&gt;&lt;small&gt;真正度者&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;→&lt;/div&gt;
&lt;div class=&quot;flow-box&quot;&gt;&lt;b&gt;薩陀波崙&lt;/b&gt;&lt;br/&gt;&lt;small&gt;接收端 · 悟&lt;/small&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;p&gt;論主的這一句把「諸佛現身」的權威性也納入緣起的網絡——連諸佛都不能違反因緣的方向性。這是龍樹中觀「&lt;b&gt;無自性、無主宰&lt;/b&gt;」的最深論證：度化也是緣起的，沒有任何一個節點能以單方面的意志決定全局。&lt;/p&gt;
&lt;div class=&quot;bridge bridge-outro&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;承先啟後&lt;/div&gt;
&lt;p&gt;第三章把第一辯三問拆完，得到「感應—專注—緣起」三層命題。但這三層仍未進入「能所雙泯」的中觀勝義——薩陀波崙看到的「佛身」是真的嗎？他厭離世樂、追求功德果報是真的嗎？下一章把這兩個追問補入，從「觀身如幻」與「觀世如夢」兩面照見第一辯的更深一層。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;



&lt;section class=&quot;chapter&quot; id=&quot;chapter-4&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 第二品 · 第四章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;中觀視角 · 觀身如幻 觀世如夢&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;幻身 · 夢樂 · 信樂的調頻&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;div class=&quot;bridge bridge-intro&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;本章要旨&lt;/div&gt;
&lt;p&gt;第三章把第一辯解到「因緣無主」為止——這已經是中觀的入口，但論主在前兩個子問（先聲後身、像現非真）背後還埋了第二層觀法：「&lt;b&gt;佛身&lt;/b&gt;」如何看？「&lt;b&gt;世間樂&lt;/b&gt;」又如何看？論文用「觀身如幻」和「觀世如夢」兩個鏡片，把感應的物理進一步推向勝義空性。本章三節分別處理：佛身的幻、世樂的夢、與其產生的信樂調頻。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第一節　觀佛身如幻 · 像現非真，唯心所現&lt;/h2&gt;
&lt;p&gt;論主答中第一句話是「&lt;b&gt;有人言：非真佛，但是像現耳——或諸佛遣化，或大菩薩現作&lt;/b&gt;」。論文指出，這一句不是退而求其次的解釋，而是&lt;b&gt;主軸定調&lt;/b&gt;——論主一開頭就把「佛身決定有實」這條路堵死。&lt;/p&gt;
&lt;div class=&quot;hi-box&quot;&gt;
&lt;span class=&quot;lbl&quot;&gt;中觀透鏡&lt;/span&gt;
&lt;p&gt;佛身是「&lt;b&gt;緣起&lt;/b&gt;」的。薩陀波崙的心如同一面鏡子，七天的極致專注（一心念佛）擦亮了鏡面，影像自然顯現。這打破了「有一個實體佛從外面飛來」的世俗想像，也預先回應了第七章「&lt;b&gt;緣起如幻城&lt;/b&gt;」的整體收束——佛的化現本身就是般若教學的一部分。&lt;/p&gt;
&lt;/div&gt;
&lt;p&gt;「&lt;b&gt;像現非真&lt;/b&gt;」並不否定感應的真實性——佛現身對薩陀波崙的鼓舞、所說「莫懈怠、莫生退沒心」的指引、所示「東行五百由旬」的方向，都實實在在地起了作用。中觀的拆法不是把世俗的真實性砍掉，而是把它從「實體」的地基上移到「緣起」的地基上：&lt;b&gt;真實是緣起的真實，不是有自性的真實&lt;/b&gt;。&lt;/p&gt;
&lt;h2&gt;第二節　觀世樂如夢 · 世俗交易與勝義空性&lt;/h2&gt;
&lt;p&gt;佛在現身之後，給薩陀波崙的第一個心法是「&lt;b&gt;因時皆苦，受果時樂&lt;/b&gt;」。表面看，這像是一個世俗交易：忍下現在的苦，換未來的樂。但若停在這個層次，般若就被讀成了功利主義。&lt;/p&gt;
&lt;div class=&quot;two-col&quot;&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;世俗諦面相&lt;/div&gt;
&lt;div class=&quot;col-sub&quot;&gt;因時苦 · 動天&lt;/div&gt;
&lt;p&gt;修行確實有真實的苦——飢渴寒熱、捨親屬、入空林。論主沒有粉飾這個苦，反而用「動天」二字承認其分量。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;勝義諦面相&lt;/div&gt;
&lt;div class=&quot;col-sub&quot;&gt;受果時樂 · 如幻&lt;/div&gt;
&lt;p&gt;果上的「無量功德」也是「如幻」的。它不是另一個更精緻的執著對象，而是勝義空性自身在心念上的安隱顯現。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;callout&quot;&gt;
&lt;div class=&quot;callout-label&quot;&gt;中觀辯證&lt;/div&gt;
&lt;p&gt;「&lt;b&gt;因時皆苦 · 受果時樂&lt;/b&gt;」之間夾的不是一條單向的時間箭頭，而是一個二諦圓融的迴圈——現在的苦是緣起的苦，未來的樂是緣起的樂。承認苦的真實，正是為了拆穿苦的自性；承認樂的可期，正是為了不讓樂變成新的執著。論主以一句話完成兩層工作。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　厭離與信樂 · 重估世俗價值的調頻心法&lt;/h2&gt;
&lt;p&gt;第二辯的論主廣答中，有一句被讀者常常滑過：「&lt;b&gt;是人先世廣集福德，煩惱輕微故，聞即信樂，厭惡世樂，捨其親屬，到空林中住&lt;/b&gt;」。論文指出，「厭離」與「信樂」是&lt;b&gt;同一齒輪的兩面&lt;/b&gt;——只有先厭離，信樂才能完成；信樂之後，厭離才不會變成憎恨世間。&lt;/p&gt;
&lt;div class=&quot;two-col&quot;&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;厭怒世樂 · 捨其親屬&lt;/div&gt;
&lt;div class=&quot;col-sub&quot;&gt;離苦得樂的高線標&lt;/div&gt;
&lt;p&gt;離苦得樂的高線標準是：「&lt;b&gt;世俗繁華&lt;/b&gt;」與「&lt;b&gt;聞般若因緣&lt;/b&gt;」並列時，前者已黯淡無光。慾望既已調頻為對深法的追尋，世樂便不再具有引力。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;聞即信樂 · 長夜信樂深法&lt;/div&gt;
&lt;div class=&quot;col-sub&quot;&gt;煩惱輕微的接收條件&lt;/div&gt;
&lt;p&gt;煩惱輕微作為心念清淨——煩惱聲音越小，保持對深法的開放性，不被世俗噪音干擾，這才是「&lt;b&gt;信樂&lt;/b&gt;」能夠生根的真正前提。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;hi-box&quot;&gt;
&lt;span class=&quot;lbl&quot;&gt;操作心法&lt;/span&gt;
&lt;p&gt;厭離不是反向的執著（執著於「不執著」），而是&lt;b&gt;重估世俗價值的調頻動作&lt;/b&gt;。當「世俗繁華」這個原本佔據心靈頻寬最大的訊號被調低，「聞般若因緣」這個微弱訊號才有可能浮上水面被聽見。論主把這個調頻過程寫得極其精準：先信樂、再厭離、再捨親屬、再入空林——四步一氣呵成，缺一不可。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;bridge bridge-outro&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;承先啟後&lt;/div&gt;
&lt;p&gt;第四章把「身」與「樂」兩個內在對象解到「如幻、如夢」為止。下一章轉向&lt;b&gt;外境&lt;/b&gt;——眾香城這個處所、五百由旬這個距離、有佛法處與無佛法處的差別，到底是物理事件還是業力事件？這是第二辯的舞台，也是論主對「&lt;b&gt;方所實有&lt;/b&gt;」之執最徹底的拆解。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;



&lt;section class=&quot;chapter&quot; id=&quot;chapter-5&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 第二品 · 第五章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;第二辯解析 · 眾香城的業感地理學&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;五百由旬 · 業感分布 · 凡聖不二&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;div class=&quot;bridge bridge-intro&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;本章要旨&lt;/div&gt;
&lt;p&gt;第二辯一句「眾香城在何處？」表面是地理疑問，實質是論主對「&lt;b&gt;空間實有&lt;/b&gt;」之執的徹底拆除。論文將此辯拆為六個切片：方位錨點、業感地理、重疊宇宙、世界觀對陣、方所無定、同處不同界。本章六節依此展開，最後收於「凡聖不二、唯心所現」。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第一節　敘事錨點 · 五百由旬外的眾香城&lt;/h2&gt;
&lt;p&gt;佛示方位的原話：「&lt;b&gt;從是東行，去此五百由旬，有城名眾香 …… 其城七重，七寶莊嚴 …… 豐樂安靜，人民熾盛&lt;/b&gt;」。一個沒有匱乏、充滿七寶與法音的烏托邦——這是世俗讀者最容易陷入的點：把眾香城當作另一個更好的物理城市。&lt;/p&gt;
&lt;div class=&quot;callout&quot;&gt;
&lt;div class=&quot;callout-label&quot;&gt;論文洞見&lt;/div&gt;
&lt;p&gt;「&lt;b&gt;五百由旬&lt;/b&gt;」這個數字看似精確，其實正是論主埋下的鈎子——若它真是物理距離，那麼眾香城應該有經緯度，論主就不必設第二問。論主刻意在「&lt;b&gt;有名眾香&lt;/b&gt;」之後立刻設疑，就是要逼讀者重新理解這個城。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第二節　業感地理學 · 有聞法因緣處則到&lt;/h2&gt;
&lt;p&gt;論主答得乾脆：「&lt;b&gt;過去佛滅度後，但有遺法，是法不周遍閻浮提，眾生有聞法因緣處則到&lt;/b&gt;」。論文將此命名為「&lt;b&gt;業感地理學&lt;/b&gt;」——空間的存在性不是均勻的，而是按業力顯化的：&lt;/p&gt;
&lt;div class=&quot;three-col&quot;&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;法的非均勻分布&lt;/div&gt;
&lt;p&gt;佛滅度後，法各「不周遍閻浮提」並不平均分布。哪裡有「&lt;b&gt;聞法因緣&lt;/b&gt;」，哪裡就有法的顯化。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;空間即業力顯化&lt;/div&gt;
&lt;p&gt;「眾香城」並非絕對的經緯度坐標，而是&lt;b&gt;福德因緣的聚合顯化&lt;/b&gt;。城是業感的果，不是地理的因。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;同地不同境&lt;/div&gt;
&lt;p&gt;薩陀波崙雖與之「&lt;b&gt;同在閻浮提&lt;/b&gt;」，卻因生於「&lt;b&gt;無佛法處&lt;/b&gt;」，必須透過廣集福德才能感應並抵達。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　重疊宇宙圖 · 物理座標的業力切片&lt;/h2&gt;
&lt;p&gt;論文以「&lt;b&gt;重疊宇宙圖&lt;/b&gt;」描繪這個業感地理：同一個物理閻浮提上，依福德深淺而有多重切片並存。&lt;/p&gt;
&lt;div class=&quot;two-col&quot;&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;頂層板塊 · 高福德&lt;/div&gt;
&lt;div class=&quot;col-sub&quot;&gt;眾香城 · 豐樂&lt;/div&gt;
&lt;p&gt;七寶莊嚴、法音不斷、曇無竭菩薩於此說般若。生此處者煩惱輕微、心調柔，受法因緣具足。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;底層板塊 · 低福德&lt;/div&gt;
&lt;div class=&quot;col-sub&quot;&gt;空林 · 貧瘠 · 薩陀波崙的起點&lt;/div&gt;
&lt;p&gt;無佛法、無七寶、傳聞佛名而已。生此處者必須以極大的努力與福德積累才能跨越板塊邊界。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;hi-box&quot;&gt;
&lt;span class=&quot;lbl&quot;&gt;空間的業力維度&lt;/span&gt;
&lt;p&gt;同一物理閻浮提內，依業力不同切出多重「&lt;b&gt;板塊&lt;/b&gt;」。「東行五百由旬」這條軌跡不是橫向位移，而是&lt;b&gt;從低福德板塊向高福德板塊的縱向穿透&lt;/b&gt;。這也解釋了為何旅途如此艱難——每一寸距離都是一寸業力轉化。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第四節　世界觀診斷 · 空間座標 vs 業力座標&lt;/h2&gt;
&lt;table class=&quot;compare-table&quot;&gt;
&lt;thead&gt;&lt;tr&gt;&lt;th style=&quot;width:24%&quot;&gt;面向&lt;/th&gt;&lt;th&gt;世俗空間觀（Geometric）&lt;/th&gt;&lt;th&gt;業力空間觀（Karmic）&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;&lt;td&gt;距離本質&lt;/td&gt;&lt;td&gt;三維歐式距離 · 可量度&lt;/td&gt;&lt;td&gt;福德落差 · 須以業力跨越&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;到達條件&lt;/td&gt;&lt;td&gt;體力 · 交通工具&lt;/td&gt;&lt;td&gt;善根福德 · 因緣對接&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;同地是否同境&lt;/td&gt;&lt;td&gt;是（客觀現實）&lt;/td&gt;&lt;td&gt;否（凡聖不二而現各別）&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;方位的實在性&lt;/td&gt;&lt;td&gt;有絕對東方&lt;/td&gt;&lt;td&gt;東方是緣起施設 · 方所無定&lt;/td&gt;&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;p&gt;論文指出，論主的這一段答覆同時完成了兩件事：一方面建立業感空間觀；另一方面把世俗空間觀&lt;b&gt;不否定地擱置&lt;/b&gt;——因為佛仍然說了「東行」、「五百由旬」、「有城名眾香」這些世俗座標的語言。世俗諦在勝義中被消解，但在世俗中仍是必要的指路工具。&lt;/p&gt;
&lt;h2&gt;第五節　方所無定 · 空間的緣起與指引的如幻&lt;/h2&gt;
&lt;div class=&quot;callout&quot;&gt;
&lt;div class=&quot;callout-label&quot;&gt;中觀辯證&lt;/div&gt;
&lt;p&gt;既然空間皆空，佛為何還要指示「東行」？論主用「&lt;b&gt;音聲示語者，恐其異去，不得到曇無竭菩薩所，是故語之&lt;/b&gt;」一句巧妙回答——指引本身也是&lt;b&gt;如幻&lt;/b&gt;的，不是真有一個絕對東方，而是依薩陀波崙當下的因緣施設一個方便。指引是真實的（世俗諦），但指引並非實有的（勝義諦）。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;spectrum&quot;&gt;
&lt;div class=&quot;sp-node&quot;&gt;&lt;b&gt;勝義諦&lt;/b&gt;&lt;br/&gt;方所皆空&lt;/div&gt;
&lt;div class=&quot;sp-mid&quot;&gt;&lt;h5&gt;方所無定&lt;/h5&gt;&lt;small&gt;二諦圓融&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;sp-node&quot;&gt;&lt;b&gt;世俗諦&lt;/b&gt;&lt;br/&gt;東行五百&lt;/div&gt;
&lt;/div&gt;
&lt;p&gt;「無絕對的東方」並不否定「&lt;b&gt;佛指東方&lt;/b&gt;」這件事。眾香城（果）是由薩陀波崙當下福德、業力、發心三者交織出的緣起施設——換一個發心、換一個福德階段，「東方」可能就在「西方」、就在「眼前」、就在「念中」。但對此一受者、此一時節，東行五百由旬就是真實的方便道。&lt;/p&gt;
&lt;h2&gt;第六節　同處不同界 · 凡聖不二與唯心所現&lt;/h2&gt;
&lt;div class=&quot;hi-box&quot;&gt;
&lt;span class=&quot;lbl&quot;&gt;凡聖不二的最深義&lt;/span&gt;
&lt;p&gt;薩陀波崙與曇無竭&lt;b&gt;同處一個地球&lt;/b&gt;（同一閻浮提）卻無法相見。一個處在「&lt;b&gt;凡夫的貧義曠野&lt;/b&gt;」，一個處在「&lt;b&gt;聖者的七寶淨土&lt;/b&gt;」——這徹底斷除了「客觀世界」的實體執著。&lt;br/&gt;&lt;br/&gt;世界並非外在獨立存在，世界是&lt;b&gt;業力顯化的劇場&lt;/b&gt;。同一物理基底，在不同業力切片上呈現截然不同的境界。「眾香城」對曇無竭是常住處，對薩陀波崙是須跨越五百由旬才能感應的彼岸——兩者都是真實的，但都不是實有的。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;two-col&quot;&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;凡夫的貧義曠野&lt;/div&gt;
&lt;div class=&quot;col-sub&quot;&gt;薩陀波崙視角&lt;/div&gt;
&lt;p&gt;同一閻浮提呈現為空林、無佛法、無七寶。需要哭、需要七日七夜專注、需要五百由旬東行。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;聖者的七寶淨土&lt;/div&gt;
&lt;div class=&quot;col-sub&quot;&gt;曇無竭視角&lt;/div&gt;
&lt;p&gt;同一閻浮提呈現為眾香城、豐樂安隱、日三時說般若。本來如是，無須跨越。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;bridge bridge-outro&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;承先啟後&lt;/div&gt;
&lt;p&gt;第五章把「處所」一面解到「同處不同界」為止——空間是業感的、方所是無定的、凡聖是不二而現。下一章移到「&lt;b&gt;人法&lt;/b&gt;」一面：曇無竭其人為何叫「法盛」？無王之國為何能以菩薩為王？導師形象的設定本身，就是論主對「&lt;b&gt;實有的我能度&lt;/b&gt;」之執的最後一道拆解。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;



&lt;section class=&quot;chapter&quot; id=&quot;chapter-6&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 第二品 · 第六章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;第三辯解析 · 曇無竭因緣與導師形象&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;法盛 · 依正不二 · 心調柔&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;div class=&quot;bridge bridge-intro&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;本章要旨&lt;/div&gt;
&lt;p&gt;第三辯是三辯的最後一道——既已破「佛身實有」，已破「方所實有」，剩下「&lt;b&gt;導師實有&lt;/b&gt;」這個最隱微的執著。論主以「曇無竭」即「法盛」破之、以「無王之國以菩薩為王」破之、以「眾無乏短、心調柔」破之。本章五節依此次第展開。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第一節　法盛導師 · 欝伽陀達磨之名義&lt;/h2&gt;
&lt;p&gt;論主譯名：「『&lt;b&gt;欝伽陀&lt;/b&gt;』，秦言『盛』；『&lt;b&gt;達磨&lt;/b&gt;』，秦言『法』。此菩薩在眾香城中，為眾生隨意說法，令眾生廣種善根，故號『&lt;b&gt;法盛&lt;/b&gt;』。」&lt;/p&gt;
&lt;div class=&quot;callout&quot;&gt;
&lt;div class=&quot;callout-label&quot;&gt;名義即心法&lt;/div&gt;
&lt;p&gt;「法盛」二字承載了三層意義：①&lt;b&gt;所說盛&lt;/b&gt;——隨意說法，無所擇眾；②&lt;b&gt;令種善根盛&lt;/b&gt;——說法的果是眾生善根的廣種；③&lt;b&gt;住處盛&lt;/b&gt;——眾香城本身就是法所盛的處所。三盛互為因果——導師的「我」消融在「法」之中，曇無竭不是一個更高的我，而是法的化現節點。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第二節　依報隨正報轉 · 環境隨願力生成&lt;/h2&gt;
&lt;p&gt;論主寫眾香城七寶莊嚴、法座華麗、池水流暢——讀來像在描寫一個天界。但論文指出，這不是「天人享受」，而是「&lt;b&gt;依報隨正報轉&lt;/b&gt;」的中觀現象：&lt;/p&gt;
&lt;div class=&quot;hi-box&quot;&gt;
&lt;span class=&quot;lbl&quot;&gt;依正不二&lt;/span&gt;
&lt;p&gt;高層次的導師&lt;b&gt;必然&lt;/b&gt;創造高層次的環境。眾香城並非自然產生的地質現象，而是大菩薩為度化眾生而「&lt;b&gt;感得&lt;/b&gt;」的國土。環境（依報）完全服務於說法與度化（正報）的目的。&lt;br/&gt;&lt;br/&gt;論主原文：「&lt;b&gt;大菩薩為度眾生故，生如是國中&lt;/b&gt;」——「為度眾生」是因，「生如是國」是果。曇無竭不是先到了眾香城再變成法盛，是「法盛」這個願力顯化出眾香城這個依報。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　求法之難與度化之易&lt;/h2&gt;
&lt;p&gt;原文一句寫盡張力：「&lt;b&gt;其國難到，薩陀波崙不惜身命，又得諸佛菩薩接助能到&lt;/b&gt;」。論文將此拆為兩端：對求法者極難，對度化者極易。&lt;/p&gt;
&lt;div class=&quot;two-col&quot;&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;求法之難&lt;/div&gt;
&lt;div class=&quot;col-sub&quot;&gt;薩陀波崙視角&lt;/div&gt;
&lt;p&gt;不惜身命、極端準入、五百由旬之苦。難的不是路，是業力與發心的累積——能到達眾香城的人，已經完成了一整輪自我空化的歷程。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;度化之易&lt;/div&gt;
&lt;div class=&quot;col-sub&quot;&gt;曇無竭視角&lt;/div&gt;
&lt;p&gt;「&lt;b&gt;眾無所乏短，其心調柔，易可得度故&lt;/b&gt;」。聖者一進入這個受眾群體，說法即被接受，無需再花力氣破除剛強之心。難易兩端正是業感地理學的另一面寫照。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;h2&gt;第四節　心調柔 · 清空自我作為受法的容器&lt;/h2&gt;
&lt;p&gt;「&lt;b&gt;心調柔&lt;/b&gt;」是本卷整篇文字中最容易被滑過、卻最關鍵的概念之一。論文指出，這不是「溫順」，而是「&lt;b&gt;清空自我作為受法的容器&lt;/b&gt;」。&lt;/p&gt;
&lt;div class=&quot;spectrum&quot;&gt;
&lt;div class=&quot;sp-node&quot;&gt;&lt;b&gt;剛強難化&lt;/b&gt;&lt;br/&gt;世俗心 · 防衛&lt;/div&gt;
&lt;div class=&quot;sp-mid&quot;&gt;&lt;h5&gt;調　柔&lt;/h5&gt;&lt;small&gt;受法的容器&lt;/small&gt;&lt;/div&gt;
&lt;div class=&quot;sp-node&quot;&gt;&lt;b&gt;無我開放&lt;/b&gt;&lt;br/&gt;自然秩序&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;callout&quot;&gt;
&lt;div class=&quot;callout-label&quot;&gt;調柔的物理機制&lt;/div&gt;
&lt;p&gt;剛強的心來自於生存的匱乏與防衛——當人活在資源競爭與身份焦慮中，必然築起防衛機制。眾香城提供了&lt;b&gt;絕對的物質富饒&lt;/b&gt;，消除了生存競爭。當防衛機制卸下，心靈變得「&lt;b&gt;調柔&lt;/b&gt;」，法語的種子才能發芽。&lt;br/&gt;&lt;br/&gt;論主這一段隱含一個極深的觀察：物質匱乏不只是物理事件，它直接塑造了心的硬度。要讓眾生能夠受法，先要為他們提供無匱乏的環境。這也是大菩薩為度眾生「感得」豐樂國土的更深用意——豐樂是說法的&lt;b&gt;必要前置條件&lt;/b&gt;。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第五節　無王之王 · 匱乏統治 vs 豐饒治理&lt;/h2&gt;
&lt;p&gt;「&lt;b&gt;其國無王，此中人民皆無吾我，如欝單越人，唯以曇無竭菩薩為王&lt;/b&gt;」——這一句是整個第三辯最具政治哲學意涵的一段。論文以「&lt;b&gt;匱乏之統治 vs 豐饒之治理&lt;/b&gt;」拆之：&lt;/p&gt;
&lt;table class=&quot;compare-table&quot;&gt;
&lt;thead&gt;&lt;tr&gt;&lt;th style=&quot;width:24%&quot;&gt;面向&lt;/th&gt;&lt;th&gt;世俗政權&lt;/th&gt;&lt;th&gt;眾香城（無王之國）&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;&lt;td&gt;基礎&lt;/td&gt;&lt;td&gt;資源匱乏與競爭&lt;/td&gt;&lt;td&gt;物質與精神的絕對豐饒&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;手段&lt;/td&gt;&lt;td&gt;階級控制 · 法律 · 武力&lt;/td&gt;&lt;td&gt;無吾我 · 自然秩序&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;目標&lt;/td&gt;&lt;td&gt;維持統治權力與利益分配&lt;/td&gt;&lt;td&gt;以法為中心 · 令眾生廣種善根&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;領導者&lt;/td&gt;&lt;td&gt;掌握武力的世俗王&lt;/td&gt;&lt;td&gt;「無王之王」的法盛菩薩&lt;/td&gt;&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;div class=&quot;hi-box&quot;&gt;
&lt;span class=&quot;lbl&quot;&gt;中觀展現&lt;/span&gt;
&lt;p&gt;「&lt;b&gt;破世俗王、立法王&lt;/b&gt;」——這是論主在第三辯尾端鋪下的一段中觀展現。它不是政治倡議，而是把「&lt;b&gt;領導者的我相&lt;/b&gt;」這個最後的執著也消融掉：曇無竭是王，但他是「無王之王」；他被尊為王，但他不依靠武力與階級；他治理眾生，但他治理的方式是說法與令種善根。我相在此被消解到只剩「&lt;b&gt;法&lt;/b&gt;」——這也回扣了第一節「法盛」的命名。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;bridge bridge-outro&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;承先啟後&lt;/div&gt;
&lt;p&gt;三辯到此全部解完——空中佛現（人）、眾香城（處）、曇無竭（法）三個面向都被龍樹拆到「無自性」為止。但這只是「破」的工夫，「立」的一面還沒展開。下一章把整個敘事拉回原點，從「&lt;b&gt;緣起如幻城&lt;/b&gt;」與「&lt;b&gt;諸法性觀三昧的全面解鎖&lt;/b&gt;」兩處鏡像，看出龍樹真正想對治的不是別的，正是當時空義學者最容易陷入的「&lt;b&gt;惡取空&lt;/b&gt;」——並以「中道實相」收束全卷。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;



&lt;section class=&quot;chapter&quot; id=&quot;chapter-7&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 第二品 · 第七章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;中觀統攝 · 緣起如幻 · 對治惡取空&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;以幻修幻 · 三昧解鎖 · 中道實相&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;div class=&quot;bridge bridge-intro&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;本章要旨&lt;/div&gt;
&lt;p&gt;三辯逐一破完，本章是龍樹的「立」——立中道、立性空、立惡取空之對治。本章五節對應論文最後五個模塊：緣起如幻城（以幻修幻的修行模型）、敘事高潮（諸法性觀三昧的解鎖）、諸法性空（跨經文修行圖）、對治惡取空（龍樹的敘事意圖）、中道實相（尋路者的中觀）。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第一節　緣起如幻城 · 以幻修幻的無上方便&lt;/h2&gt;
&lt;p&gt;論文以一句總攝整品結構：「&lt;b&gt;菩薩為何踏踐之，五欲具足共相娛樂？這並非世俗放縱，而是最高段的『方便波羅蜜』&lt;/b&gt;」。也就是說，眾香城的整段敘事既不是寫實的天界遊記，也不是寓言的虛擬模型——它是「&lt;b&gt;以幻修幻&lt;/b&gt;」的中觀方法論本身的具象化。&lt;/p&gt;
&lt;div class=&quot;hi-box&quot;&gt;
&lt;span class=&quot;lbl&quot;&gt;以幻修幻的三層結構&lt;/span&gt;
&lt;p&gt;① &lt;b&gt;身是幻&lt;/b&gt;——薩陀波崙以一個本無實體的身，去走一條本無實體的路；&lt;br/&gt;② &lt;b&gt;境是幻&lt;/b&gt;——眾香城本身是緣起的施設，七寶莊嚴皆業感所現；&lt;br/&gt;③ &lt;b&gt;修行也是幻&lt;/b&gt;——七日七夜、五百由旬、念佛三昧，都是緣起中的「方便」，而非實有的功夫。&lt;br/&gt;&lt;br/&gt;三層幻並非否定，而是「&lt;b&gt;真到底&lt;/b&gt;」——正因為三者皆幻，整個修行才不會落入新的執著。在如幻的世間呈現五欲具足，正是般若的最高方便。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第二節　敘事高潮 · 諸法性觀三昧的全面解鎖&lt;/h2&gt;
&lt;p&gt;卷九十七第一品經文末段，薩陀波崙「&lt;b&gt;於是處住念曇無竭菩薩，一切法中得無礙知見已，即得無量三昧門現在前&lt;/b&gt;」——隨後一連列出五十餘個三昧之名：諸法性觀三昧、諸法性不可得三昧、破諸法無明三昧 …… 直到「見諸佛三昧」。&lt;/p&gt;
&lt;div class=&quot;callout&quot;&gt;
&lt;div class=&quot;callout-label&quot;&gt;關鍵時刻&lt;/div&gt;
&lt;p&gt;論文以「&lt;b&gt;敘事高潮&lt;/b&gt;」標記此段：經歷極度苦行、見佛、捨命東行後，薩陀波崙於曇無竭處得無礙知見，瞬間入無量三昧。&lt;b&gt;旅程的物理終點，正是內部證悟的奇異點。&lt;/b&gt;外部尋路（東行五百由旬）與內部入定（五十三昧現前）在此匯為一點。&lt;/p&gt;
&lt;/div&gt;
&lt;p&gt;這個結構回扣了第一章「&lt;b&gt;旅程的本質&lt;/b&gt;」——東行求法並非物理移動，而是緣起性空的極致展演。當外部與內部在「念曇無竭」這個動作上匯合，三昧自然解鎖，因為它們本來就不是兩件事。&lt;/p&gt;
&lt;h2&gt;第三節　諸法性空 · 跨經文的修行圖&lt;/h2&gt;
&lt;div class=&quot;three-col&quot;&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;x · 世俗諦軸&lt;/h5&gt;
&lt;p&gt;七日七夜、東行五百、不惜身命——必須在世俗諦上傾盡全力。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;y · 勝義諦軸&lt;/h5&gt;
&lt;p&gt;諸法性空、緣無主、方所無定——必須在勝義諦上證悟空性。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;h5&gt;修行圖&lt;/h5&gt;
&lt;p&gt;x 軸與 y 軸在「念曇無竭」處交匯——這是修行的奇點。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;hi-box&quot;&gt;
&lt;span class=&quot;lbl&quot;&gt;跨經文的視角&lt;/span&gt;
&lt;p&gt;薩陀波崙的「諸法性觀三昧」並非孤立發生，而是與整部般若波羅蜜經中反覆強調的「&lt;b&gt;諸法畢竟空&lt;/b&gt;」遙相呼應。本品末段一連列出五十餘三昧名，表面是堆疊，實質是用「&lt;b&gt;多即一&lt;/b&gt;」的方式宣示——一旦「諸法性不可得」這一點通透了，所有面向上的三昧（破無明、不壞自在、能照明、離闇 ……）便同時現前。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第四節　對治惡取空 · 龍樹菩薩的敘事意圖&lt;/h2&gt;
&lt;div class=&quot;callout&quot;&gt;
&lt;div class=&quot;callout-label&quot;&gt;敘事的真正用意&lt;/div&gt;
&lt;p&gt;這個故事是龍樹對抗「&lt;b&gt;惡取空&lt;/b&gt;」（Nihilism）的最強防禦。當時部派或新近學人讀「諸法性空」極易滑入兩個極端：①把空當成實有的虛無（落於斷見），②把空當成無修行價值的真理（無須勤苦）。論主在卷九十七用整個薩陀波崙的故事正面回應：&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;two-col&quot;&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;破實有的執著&lt;/div&gt;
&lt;p&gt;佛是緣起、城是業感、導師是法的化現——破完了所有實有的執著。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;col&quot;&gt;
&lt;div class=&quot;col-title&quot;&gt;立方便的修行&lt;/div&gt;
&lt;p&gt;但故事中的薩陀波崙仍須七日七夜、五百由旬、不惜身命——空不否定方便，方便才是空的活用。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;p&gt;論主以這場跨九十七卷的長篇敘事證明：&lt;b&gt;諸法性空不是放棄修行的理由，反而是修行的最大動力。&lt;/b&gt;正因為一切如幻，所以可以「以幻修幻」；正因為方所無定，所以「東行五百」才有意義；正因為佛非實有，所以「念佛七日」才能感得佛現。這正是龍樹中觀對「惡取空」最徹底的反證——他不是用論證反駁，而是用一個完整的修行故事示現給後世讀者。&lt;/p&gt;
&lt;h2&gt;第五節　中道實相 · 尋路者的中觀&lt;/h2&gt;
&lt;div class=&quot;verse&quot;&gt;
      在幻象中燃燒自我，&lt;br/&gt;
      於無所求中徹見真實。&lt;br/&gt;
      這即是尋路者的中觀。
    &lt;/div&gt;
&lt;div class=&quot;hi-box&quot;&gt;
&lt;span class=&quot;lbl&quot;&gt;全卷收束&lt;/span&gt;
&lt;p&gt;第二品從一個讀者直覺的疑問起——「空中佛是誰？」「眾香城在哪？」「曇無竭何德？」——龍樹用三辯把所有實體、所有座標、所有導師「我相」全部消融，最後留下的不是空蕩蕩的虛無，而是一個&lt;b&gt;充滿張力的修行圖&lt;/b&gt;：薩陀波崙以一個如幻的我，在如幻的世界中，依如幻的緣，行如幻的法，最終在如幻的師處證如幻的空。&lt;br/&gt;&lt;br/&gt;這便是「&lt;b&gt;尋路者的中觀&lt;/b&gt;」。它不是抽象的哲學，而是一個有溫度、有眼淚、有極度專注、有見佛、有解三昧的&lt;b&gt;活的中道&lt;/b&gt;——以幻修幻而至實相。&lt;/p&gt;
&lt;/div&gt;
&lt;p&gt;至此卷九十七第二品釋義圓滿。讀者自此可帶著這份「&lt;b&gt;中道實相&lt;/b&gt;」的視角，回讀第二章的三辯原典——同一句問答，將呈現完全不同的厚度。&lt;/p&gt;
&lt;div class=&quot;bridge bridge-outro&quot;&gt;
&lt;div class=&quot;bridge-label&quot;&gt;回向&lt;/div&gt;
&lt;p&gt;願以此釋義因緣，令一切讀者於般若波羅蜜深義「&lt;b&gt;聞即信樂、長夜信樂深法&lt;/b&gt;」；於修行道上得遇真實善知識，於業力波折中能「&lt;b&gt;莫懈怠、莫生退沒心&lt;/b&gt;」。三辯之外，還有無量問待破；願諸讀者皆成自家路上的尋路者。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-weight:700;font-size:17px;
  box-shadow:0 2px 6px rgba(184,134,11,.35);}
.toc-name{font-size:19.5px;line-height:1.7;letter-spacing:1px;font-weight:600;
  color:var(--accent);}

/* ====== Chapter ====== */
.chapter{margin:0 0 24px;padding:0;}
.ch-head{background:var(--headGrad);color:#fff;padding:58px 24px 50px;
  text-align:center;position:relative;}
.ch-head::after{content:&quot;&quot;;position:absolute;bottom:14px;left:50%;
  transform:translateX(-50%);width:120px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.ch-num{font-size:18px;color:var(--gold);letter-spacing:5px;margin-bottom:12px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;}
.ch-name{font-size:34px;font-weight:700;color:#fff;letter-spacing:4px;margin-bottom:10px;
  text-shadow:0 2px 12px rgba(0,0,0,.35);}
.ch-sub{font-size:17px;color:#c4b89e;letter-spacing:2px;font-style:italic;}
.ch-body{max-width:980px;margin:0 auto;padding:42px 28px 18px;background:var(--bg);}

/* ====== Headings ====== */
.ch-body h2{font-size:30px;color:var(--accent);font-weight:700;letter-spacing:2px;
  margin:32px 0 14px;padding:10px 0 10px 20px;
  border-left:4px solid var(--gold);
  background:linear-gradient(90deg,rgba(184,134,11,.08),transparent 80%);}
.ch-body h3{font-size:23.5px;color:var(--text);font-weight:600;letter-spacing:1.5px;
  margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border-light);}
.ch-body h4{font-size:20px;color:var(--text2);font-weight:600;margin:20px 0 8px;}
.ch-body h5{font-size:18.5px;color:var(--gold);font-weight:600;margin:12px 0 6px;
  letter-spacing:1px;}
.ch-body p{margin:0 0 12px;line-height:1.95;font-size:20px;}
.ch-body strong,.ch-body b{color:var(--accent-red);font-weight:700;}

/* ====== Classical Text ====== */
.classical-text{background:#FFFDF5;border:1px solid #E8E0D0;border-radius:10px;
  padding:18px 24px;margin:16px 0;line-height:1.95;font-size:20px;
  position:relative;}
.classical-text p{margin:0 0 10px;font-size:20px;line-height:1.95;}
.classical-text p:last-child{margin-bottom:0;}
.text-label{display:inline-block;background:var(--accent);color:#fff;
  padding:3px 14px;border-radius:12px;font-size:13.5px;letter-spacing:2px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;margin-bottom:10px;font-weight:500;}
.text-label.lun{background:var(--gold);}

blockquote{background:var(--verseBg);border-left:4px solid var(--verseBd);
  padding:14px 22px;margin:16px 0;line-height:2.0;font-size:21px;
  white-space:normal;color:var(--text);border-radius:0 6px 6px 0;}
blockquote p{margin:0 0 8px;font-size:21px;line-height:2.0;}
blockquote p:last-child{margin-bottom:0;}

/* ====== Q&amp;A ====== */
.qa{margin:18px 0;border:1px solid var(--border);border-radius:var(--r);
  background:var(--card);overflow:hidden;
  box-shadow:0 1px 3px rgba(91,58,41,.06);}
.qa .q{padding:14px 20px;border-left:4px solid #4a6fa5;
  background:rgba(74,111,165,.06);color:#2c4068;font-size:20px;line-height:1.95;}
.qa .q strong{color:#2c4068;}
.qa .a{padding:14px 20px;border-left:4px solid var(--accent);
  color:var(--text);font-size:20px;line-height:1.95;
  border-top:1px dashed var(--border-light);}
.qa .a strong{color:var(--accent-red);}

/* ====== Cards ====== */
.card,.insight,.commentary,.note{background:var(--card);
  border:1px solid var(--border);border-radius:var(--r);
  padding:16px 22px;margin:14px 0;
  box-shadow:0 1px 3px rgba(0,0,0,.06);}
.card-title{color:var(--accent);font-size:21.5px;font-weight:600;
  margin:0 0 8px;letter-spacing:1px;}

/* ====== Four-grid ====== */
.four-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
.four-grid .cell{background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px 20px;font-size:19px;line-height:1.85;}
.four-grid .cell h4,.four-grid .cell h5{margin:0 0 8px;color:var(--accent);
  font-size:18.5px;letter-spacing:1px;border-bottom:1px solid var(--border-light);
  padding-bottom:6px;}
.four-grid .cell.alt{background:#fdf6e8;border-color:var(--accentL);}
.four-grid .cell.alt h4,.four-grid .cell.alt h5{color:var(--accent-red);}

/* ====== Matrix table ====== */
.matrix-table{width:100%;border-collapse:collapse;margin:18px 0;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;font-size:18px;}
.matrix-table th{background:var(--headGrad);color:var(--gold);
  padding:12px 14px;font-weight:600;letter-spacing:1.5px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:16px;
  border:1px solid #2a2218;text-align:left;}
.matrix-table td{padding:14px 16px;border:1px solid var(--border);
  vertical-align:top;line-height:1.8;}
.matrix-table td.dim{background:#f5edd9;font-weight:600;color:var(--accent);
  width:18%;font-family:&quot;Noto Sans TC&quot;,sans-serif;letter-spacing:1px;}
.matrix-table tr:nth-child(even) td:not(.dim){background:#fffdf3;}

/* ====== Two-col ====== */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
.col-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 20px;}
.col-card h4{margin:0 0 8px;color:var(--accent);font-size:19px;
  border-bottom:1px solid var(--border-light);padding-bottom:6px;}
.col-card.alt{background:#fdf6e8;border-color:var(--accentL);}
.col-card.alt h4{color:var(--accent-red);}

/* ====== Flow vertical ====== */
.flow{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:10px;margin:22px 0;padding:18px;background:var(--card);
  border:1px solid var(--border-light);border-radius:var(--r);}
.flow.flow-v{flex-direction:column;}
.flow-box,.flow-step{background:linear-gradient(135deg,#fffdf5 0%,#f5ecd8 100%);
  border:1px solid var(--border);border-left:4px solid var(--gold);
  border-radius:var(--r);padding:14px 22px;
  font-size:18.5px;line-height:1.7;text-align:center;
  min-width:240px;max-width:540px;box-shadow:0 1px 3px rgba(91,58,41,.08);}
.flow-box .step-tag,.flow-step .step-tag{display:block;font-size:13px;
  color:var(--gold);letter-spacing:2px;margin-bottom:6px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-weight:600;}
.flow-box strong,.flow-step strong{display:block;font-size:20px;
  color:var(--accent);margin-bottom:4px;}
.flow-box small,.flow-step small{font-size:15.5px;color:var(--text-muted);}
.flow-arrow{color:var(--gold);font-size:28px;font-weight:700;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;}

/* ====== Spectrum ====== */
.spectrum{display:flex;align-items:stretch;justify-content:space-between;
  gap:6px;margin:24px 0;padding:14px;background:var(--card);
  border:1px solid var(--border-light);border-radius:var(--r);}
.spectrum .sp-node{flex:1;padding:14px 14px;text-align:center;
  border-radius:var(--r);font-size:15.5px;line-height:1.6;
  display:flex;flex-direction:column;justify-content:center;}
.spectrum .sp-left{background:linear-gradient(135deg,#dde8f4,#c3d6ec);color:#2c4068;}
.spectrum .sp-mid{background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff!important;}
.spectrum .sp-mid h5,.spectrum .sp-mid *{color:#fff!important;}
.spectrum .sp-mid small{color:rgba(255,255,255,.92)!important;}
.spectrum .sp-right{background:linear-gradient(135deg,#f3dccd,#e8c5a8);color:#5b3a29;}
.spectrum .sp-node h5{margin:0 0 6px;font-size:17px;letter-spacing:1px;}
.spectrum .sp-node small{font-size:13.5px;display:block;}

/* ====== Triangle ====== */
.triangle-diagram{margin:22px 0;padding:22px 20px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--r);}
.tri-top{display:flex;justify-content:center;margin-bottom:16px;}
.tri-bot{display:flex;justify-content:space-around;gap:14px;}
.tri-node{background:linear-gradient(135deg,#fffdf5 0%,#f5ecd8 100%);
  border:1px solid var(--border);border-radius:var(--r);
  padding:14px 18px;text-align:center;min-width:200px;max-width:280px;
  font-size:17px;line-height:1.7;box-shadow:0 1px 3px rgba(91,58,41,.08);}
.tri-node strong{display:block;color:var(--accent);font-size:17.5px;margin-bottom:4px;}
.tri-node small{display:block;font-size:14px;color:var(--text-muted);margin-top:4px;}
.tri-conclude{margin-top:16px;padding:12px 18px;background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;text-align:center;border-radius:var(--r);
  font-size:18px;letter-spacing:1.5px;font-weight:600;}

/* ====== Checklist ====== */
.checklist{list-style:none;padding:0;margin:14px 0;}
.checklist li{position:relative;padding:6px 0 6px 26px;font-size:18.5px;
  line-height:1.75;}
.checklist li::before{content:&quot;○&quot;;position:absolute;left:0;top:6px;
  color:var(--gold);font-weight:700;font-size:16px;}

/* ====== Samadhi grid ====== */
.samadhi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:8px;margin:18px 0;padding:18px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--r);}
.samadhi-grid .s-item{padding:8px 12px;background:#fffdf5;
  border-left:3px solid var(--goldL);border-radius:4px;
  font-size:16.5px;line-height:1.55;color:var(--text);}
.samadhi-grid .s-item .s-num{color:var(--gold);font-weight:600;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13.5px;
  margin-right:6px;letter-spacing:1px;}

/* ====== Phase badge ====== */
.phase-badge{display:inline-block;background:var(--gold);color:#fff;
  padding:4px 16px;border-radius:14px;font-size:14px;letter-spacing:2px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;margin-right:8px;}

/* ====== Read progress ====== */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:12px;opacity:.75;letter-spacing:3px;}

/* ====== Back-to-top ====== */
#backTop{position:fixed;bottom:74px;right:24px;width:44px;height:44px;
  border-radius:50%;background:var(--accent);color:#fff;
  border:none;font-size:22px;cursor:pointer;display:none;
  box-shadow:0 3px 10px rgba(0,0,0,.25);z-index:110;
  transition:background .25s,transform .25s;}
#backTop:hover{background:var(--gold);transform:translateY(-2px);}

/* ====== Footer ====== */
.site-footer{background:var(--headGrad);color:#a89a7d;
  text-align:center;padding:38px 24px 80px;margin-top:50px;}
.site-footer p{font-size:15px;letter-spacing:2px;margin:6px 0;line-height:1.8;}
.site-footer .ft-title{color:var(--gold);font-size:18px;letter-spacing:4px;margin-bottom:10px;}

/* ====== Notable ====== */
.note-box{background:#fdf6e8;border:1px dashed var(--accentL);
  border-radius:var(--r);padding:14px 22px;margin:14px 0;
  font-size:18px;line-height:1.85;color:var(--text2);}
.note-box .note-tag{display:inline-block;background:var(--accentL);color:#fff;
  padding:2px 10px;border-radius:10px;font-size:12.5px;letter-spacing:2px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;margin-right:8px;}

/* ====== Highlight quote ====== */
.hl-quote{background:linear-gradient(135deg,#f5ecd8,#fdf6e8);
  border:1px solid var(--accentL);border-left:5px solid var(--gold);
  border-radius:var(--r);padding:18px 26px;margin:20px 0;
  font-size:20.5px;line-height:1.95;color:var(--accent);
  font-weight:600;letter-spacing:1px;font-style:italic;}

/* ====== Responsive ====== */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;}
  .main{margin-left:0;}
  .hero-title{font-size:42px;letter-spacing:5px;}
  .ch-name{font-size:28px;letter-spacing:2px;}
  .ch-head{padding:42px 18px 36px;}
  .ch-body{padding:32px 18px 18px;}
  .four-grid,.two-col{grid-template-columns:1fr;}
  .matrix-table th,.matrix-table td{font-size:15px;padding:10px;}
  .tri-bot{flex-direction:column;}
  .toc-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){
  body{font-size:17px;}
  .ch-body p{font-size:17px;}
  .hero-title{font-size:34px;}
}

&lt;section class=&quot;preface&quot;&gt;
&lt;h2 class=&quot;preface-title&quot;&gt;編者前言&lt;/h2&gt;
&lt;p&gt;本品銜接卷九十六薩陀波崙東行求法之後，從「空中佛教」一直接續到「即得無量三昧門現在前」。文本的場景轉換急遽——從荒野中的啼哭憂愁，瞬轉至七寶城中的歌舞娛樂；龍樹於此給出大乘菩薩道最深刻的一次本體論啄問。&lt;/p&gt;
&lt;p&gt;全文可分三層：&lt;strong&gt;場景層&lt;/strong&gt;呈現眾香城與曇無竭莊嚴的物質景觀；&lt;strong&gt;辯證層&lt;/strong&gt;進入生身/法身的雙重本體論辯與毒箭譬喻的病理切片；&lt;strong&gt;修證層&lt;/strong&gt;則在諸三昧名中提煉出「立·破·用」三階段的認識論升級。三層之間環環相扣，缺一不可。&lt;/p&gt;
&lt;p&gt;龍樹論主以「即俗而真、真俗不二」的中觀邏輯，統合了曇無竭所代表的「有」（七寶城、四園八池、五欲莊嚴）與薩陀波崙所代表的「空」（七日七夜啼哭、斷諸所有心）。兩軸既不偏執、也不混淆——這正是般若波羅蜜作為「無相之鏡」的核心心法。&lt;/p&gt;
&lt;p&gt;全文凡 8 章 24 節，附論文視覺化解析的本體論診斷矩陣與病理矩陣。讀者宜先掌握第三章的「兩諦並舉」與第七章的「立·破·用」三階段，前者是辯證層的鎖鑰，後者是修證層的階梯。&lt;/p&gt;

&lt;a class=&quot;toc-card&quot; href=&quot;#chapter-4&quot;&gt;&lt;span class=&quot;toc-num&quot;&gt;4&lt;/span&gt;&lt;span class=&quot;toc-name&quot;&gt;第四章 · 真俗無礙的中觀統合&lt;/span&gt;&lt;/a&gt;
&lt;a class=&quot;toc-card&quot; href=&quot;#chapter-5&quot;&gt;&lt;span class=&quot;toc-num&quot;&gt;5&lt;/span&gt;&lt;span class=&quot;toc-name&quot;&gt;第五章 · 薩陀波崙的大欲與毒箭譬喻&lt;/span&gt;&lt;/a&gt;
&lt;a class=&quot;toc-card&quot; href=&quot;#chapter-6&quot;&gt;&lt;span class=&quot;toc-num&quot;&gt;6&lt;/span&gt;&lt;span class=&quot;toc-name&quot;&gt;第六章 · 深度病理 · 斷諸所有心&lt;/span&gt;&lt;/a&gt;
&lt;a class=&quot;toc-card&quot; href=&quot;#chapter-7&quot;&gt;&lt;span class=&quot;toc-num&quot;&gt;7&lt;/span&gt;&lt;span class=&quot;toc-name&quot;&gt;第七章 · 三昧之門&lt;/span&gt;&lt;/a&gt;
&lt;a class=&quot;toc-card&quot; href=&quot;#chapter-8&quot;&gt;&lt;span class=&quot;toc-num&quot;&gt;8&lt;/span&gt;&lt;span class=&quot;toc-name&quot;&gt;第八章 · 般若鏡中的雙軸統合&lt;/span&gt;&lt;/a&gt;
&lt;/div&gt;
&lt;/section&gt;
&lt;section class=&quot;chapter&quot; id=&quot;chapter-1&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第一章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;文本場景重構&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;尋法者的空間與心識拓撲&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;p&gt;本章為文本入口。先由經文重現「尋法者的極限焦慮」與「眾香城的極致莊嚴」兩個對照場景；隨後以視覺化分析揭示貧瘠求法者與富麗說法者之間的張力——這正是後續龍樹諸品論辯的基地。&lt;/p&gt;
&lt;h2&gt;第一節　求法者的極限焦慮&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經文&lt;/span&gt;
&lt;p&gt;爾時，薩陀波崙菩薩受是空中教已，從是東行。不久，復作是念：「我云何不問空中聲：『我當何處去？去當遠近？當從誰聞般若波羅蜜？』」是時即住，啼哭憂愁，作是念：「我住是中，過一日一夜，若二、三、四、五、六、七日七夜，不念疲極，乃至不念飢渴、寒熱，不聞聽受般若波羅蜜因緣，終不起也！」&lt;/p&gt;
&lt;p&gt;須菩提！譬如人有一子卒死，憂愁苦毒，唯懷懊惱，不生餘念。如是，須菩提！薩陀波崙菩薩爾時無有異心，但念：「我何時當得聞般若波羅蜜？」&lt;/p&gt;
&lt;/div&gt;
&lt;h3&gt;一、住一處過七日七夜的求法極限&lt;/h3&gt;
&lt;p&gt;薩陀波崙東行未遠，自疚未追問空中聲音「何處？多遠？從誰受教？」於是即時止步，啼哭憂愁，立下「七日七夜不疲、不飢、不渴、不寒、不熱，不聞般若終不起」之大誓。這不是常人立的目標，而是把自己整個生命質押進「聞法」這唯一一件事。&lt;/p&gt;
&lt;h3&gt;二、譬喻 — 喪子之痛的心識聚焦&lt;/h3&gt;
&lt;p&gt;佛舉喻：如人有一獨子卒然死亡，舉家憂愁苦毒，唯懷懊惱，更無餘念。薩陀波崙此刻的心識正是這種狀態——所有意根、念根全都壓向「我何時當得聞般若波羅蜜」一句。&lt;/p&gt;
&lt;div class=&quot;hl-quote&quot;&gt;「無有異心，但念：『我何時當得聞般若波羅蜜？』」 —— 求法者的心識被收束到一個焦點，這正是後續一切三昧得以現前的基底。&lt;/div&gt;
&lt;h2&gt;第二節　眾香城的極致莊嚴&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經文&lt;/span&gt;
&lt;p&gt;須菩提！薩陀波崙菩薩如是愁念時，空中有佛，語薩陀波崙菩薩言：「善哉！善哉！善男子！……善男子！汝以是勤精進愛樂法故，從是東行，去此五百由旬，有城名眾香。其城七重，七寶莊嚴；臺觀、欄楯，皆以七寶校飾；七寶之塹，七寶行樹，周匝七重。其城縱廣十二由旬，豐樂安靜，人民熾盛……&lt;/p&gt;
&lt;p&gt;是眾香城中有大高臺，曇無竭菩薩摩訶薩宮舍在上……其宮舍中，有四種娛樂園：一名常喜，二名離憂，三名華飾，四名香飾。一一園中各有八池：一名賢，二名賢上，三名歡喜，四名喜上，五名安隱，六名多安隱，七名遠離，八名阿鞞跋致。」&lt;/p&gt;
&lt;/div&gt;
&lt;h3&gt;一、七重城 · 七寶 · 五百由旬&lt;/h3&gt;
&lt;p&gt;佛從空中授記：去此東行五百由旬，有城名「眾香」。其城七重、七寶莊嚴，臺觀欄楯、城塹行樹皆以七寶校飾；縱廣十二由旬，豐樂安靜，人民熾盛——這是物理空間的極致。&lt;/p&gt;
&lt;h3&gt;二、四園八池的精神景觀&lt;/h3&gt;
&lt;p&gt;城內有曇無竭菩薩高臺宮舍，宮中四園：&lt;/p&gt;
&lt;ul class=&quot;checklist&quot;&gt;
&lt;li&gt;&lt;strong&gt;常喜園&lt;/strong&gt; — 喜根永續&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;離憂園&lt;/strong&gt; — 憂根永斷&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;華飾園&lt;/strong&gt; — 莊嚴不雜&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;香飾園&lt;/strong&gt; — 普熏十方&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;四園每園各設八池，八池之名構成精神階梯：&lt;/p&gt;
&lt;div class=&quot;samadhi-grid&quot;&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;①&lt;/span&gt;賢&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;②&lt;/span&gt;賢上&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;③&lt;/span&gt;歡喜&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;④&lt;/span&gt;喜上&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;⑤&lt;/span&gt;安隱&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;⑥&lt;/span&gt;多安隱&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;⑦&lt;/span&gt;遠離&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;⑧&lt;/span&gt;阿鞞跋致&lt;/div&gt;
&lt;/div&gt;
&lt;p&gt;八池之名從「賢」到「阿鞞跋致（不退轉）」，明顯不是純地理水池，而是修證階位的物化呈現。&lt;/p&gt;
&lt;h2&gt;第三節　表象的極端對立&lt;/h2&gt;
&lt;p&gt;到此，文本同時擺上兩端極致：&lt;/p&gt;
&lt;div class=&quot;spectrum&quot;&gt;
&lt;div class=&quot;sp-node sp-left&quot;&gt;
&lt;h5&gt;求法者之苦&lt;/h5&gt;
&lt;small&gt;薩陀波崙&lt;br/&gt;七日七夜啼哭&lt;br/&gt;不食不飲&lt;br/&gt;不眠不臥&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;sp-node sp-mid&quot;&gt;
&lt;h5&gt;關鍵張力&lt;/h5&gt;
&lt;small&gt;求般若者&lt;br/&gt;↔&lt;br/&gt;說般若者&lt;br/&gt;同一法、兩極相&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;sp-node sp-right&quot;&gt;
&lt;h5&gt;說法者之樂&lt;/h5&gt;
&lt;small&gt;曇無竭&lt;br/&gt;七寶城、四園八池&lt;br/&gt;六萬婇女&lt;br/&gt;五欲娛樂&lt;/small&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;hl-quote&quot;&gt;這個極端反差正是龍樹下面要拆解的關卡——同樣以般若為依止，怎麼會一邊「失命無餘念」、一邊「五欲具足共相娛樂」？&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;
&lt;section class=&quot;chapter&quot; id=&quot;chapter-2&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第二章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;龍樹的核心啄問&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;生身與法身的本體論矛盾&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;p&gt;本章把場景反差推到本體論的層面。經中佛敘述曇無竭菩薩「日三時說般若」，論主即提出全文最關鍵的設問——這是大乘菩薩道的邊界測試。&lt;/p&gt;
&lt;h2&gt;第一節　經中佛告 · 曇無竭日三時說般若&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經文&lt;/span&gt;
&lt;p&gt;「曇無竭菩薩與六萬八千婇女，五欲具足，共相娛樂……日三時說般若波羅蜜……當是時中，眾生以是因緣故，皆不墮惡道，不退轉於阿耨多羅三藐三菩提。」&lt;/p&gt;
&lt;/div&gt;
&lt;p&gt;佛明示眾生緣此說法之力得不退；但同段又寫六萬八千婇女、五欲具足共娛——說法的場景與內容形成強烈的不對稱。論主於此切入。&lt;/p&gt;
&lt;h2&gt;第二節　論主設問 · 生身？法身？&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label lun&quot;&gt;論釋&lt;/span&gt;
&lt;p&gt;問曰：曇無竭菩薩為是生身？為是法身？為度眾生故，以神通力化作此身？若化身者，何用六萬婇女、園觀、浴池種種莊嚴而自娛樂？若是生身，云何能令薩陀波崙供養具皆在空中化成大臺，入諸三昧乃至七歲？&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;qa&quot;&gt;
&lt;div class=&quot;q&quot;&gt;&lt;strong&gt;問曰：&lt;/strong&gt;曇無竭菩薩究竟是甚麼身？
&lt;ul style=&quot;margin:8px 0 0 20px;line-height:1.8;&quot;&gt;
&lt;li&gt;若是 &lt;strong&gt;生身&lt;/strong&gt;（凡胎肉身）—— 又怎能令空中化成大臺、令薩陀波崙入定七年？&lt;/li&gt;
&lt;li&gt;若是 &lt;strong&gt;法身&lt;/strong&gt;（神通變化）—— 何須六萬婇女、園觀、浴池、五欲娛樂？&lt;/li&gt;
&lt;li&gt;若是 &lt;strong&gt;化身&lt;/strong&gt;—— 化身的目的本應度眾，為何要演一場「享樂」的戲？&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;a&quot;&gt;&lt;strong&gt;論主之意：&lt;/strong&gt;三種身分都解釋得通一邊、解釋不通另一邊。這個矛盾不是文本誤植，而是大乘菩薩存在樣式的真正難題。&lt;/div&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　矛盾的哲學本質&lt;/h2&gt;
&lt;p&gt;論主這個「啄問」的份量在於：它直接逼問「大乘菩薩道」如何同時容納兩個看似對立的命題：&lt;/p&gt;
&lt;div class=&quot;four-grid&quot;&gt;
&lt;div class=&quot;cell&quot;&gt;
&lt;h5&gt;命題 A · 神聖性&lt;/h5&gt;
&lt;p&gt;菩薩須有「化空成臺、令人入七年定」的不可思議神力——才稱得上是般若導師。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;cell alt&quot;&gt;
&lt;h5&gt;命題 B · 在世性&lt;/h5&gt;
&lt;p&gt;菩薩仍須「居家娛樂、五欲具足」——才不脫離眾生世間，才能真實度化。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;hl-quote&quot;&gt;兩命題若是「身分二選一」就無解；唯有把「身」之概念本身拆掉，矛盾才能消解。這正是龍樹接下來要做的事。&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;
&lt;section class=&quot;chapter&quot; id=&quot;chapter-3&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第三章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;雙重本體論詮釋&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;留惑潤生與果熟應機&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;p&gt;本章是論主給出的兩種詮釋路徑。注意——龍樹並未「擇一」，而是同時並陳，形成中觀獨有的雙視角矩陣。&lt;/p&gt;
&lt;h2&gt;第一節　視角一 · 生身菩薩 — 利根禪定 · 泥中避熱&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label lun&quot;&gt;論釋 · 答曰一&lt;/span&gt;
&lt;p&gt;有人言：是生身菩薩，得諸法實相及禪定神通力故，欲度是城中眾生。如餘菩薩利根故，能入禪定，亦能入欲界法；為攝眾生故，受五欲而不失禪定。如人避熱故，在泥中臥，還洗則如故。凡夫鈍根故，不能如是。是故以神通力化作華臺，七歲入定；又以方便力故，能受五欲，如先義說。菩薩不但行一道，為眾生故，行種種道引導之。如龍起雲，能降大雨、雷電、礔礰；菩薩亦如是，雖是生身，未離煩惱而能修行善法，為眾生故不盡結使。&lt;/p&gt;
&lt;/div&gt;
&lt;h3&gt;一、譬喻 · 泥中避熱&lt;/h3&gt;
&lt;div class=&quot;card&quot;&gt;
&lt;p&gt;&lt;strong&gt;「如人避熱故，在泥中臥，還洗則如故。」&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;夏天熱極，避到泥水中休息以避炙；起身洗淨，仍是清淨之身。菩薩受五欲之法，如同這位避熱者——不是被泥所染，而是借泥消熱，事後可全身而退。&lt;/p&gt;
&lt;/div&gt;
&lt;h3&gt;二、譬喻 · 龍起雲雨&lt;/h3&gt;
&lt;div class=&quot;card&quot;&gt;
&lt;p&gt;&lt;strong&gt;「如龍起雲，能降大雨、雷電、礔礰。」&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;龍興雲非為己用，是要利他降雨、潤養萬物；菩薩雖在五欲之中，所行非自利，是為攝眾、為示同類。&lt;/p&gt;
&lt;/div&gt;
&lt;h3&gt;三、留惑潤生的義理&lt;/h3&gt;
&lt;p&gt;此一視角的核心：菩薩雖為「生身」，卻是利根菩薩，得諸法實相及禪定神通；為攝眾生故，主動「不盡結使」、留少分煩惱，以同類身色入欲界。此即「留惑潤生」之古義。&lt;/p&gt;
&lt;h2&gt;第二節　視角二 · 法身大士 — 如龍起雲 · 果熟鳥食&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label lun&quot;&gt;論釋 · 答曰二&lt;/span&gt;
&lt;p&gt;有人言：是菩薩是法性生身，為度眾香城人故，變化而度。若是生身，云何能令十方佛稱讚，而遣薩陀波崙令從受法，得六萬三昧？是故知是大菩薩變化身。譬如大海中龍死相出時，如果熟應墮，金翅鳥則來食之；眾生亦如是，行業因緣熟故，大菩薩來度之。&lt;/p&gt;
&lt;/div&gt;
&lt;h3&gt;一、譬喻 · 果熟金翅鳥食&lt;/h3&gt;
&lt;div class=&quot;card&quot;&gt;
&lt;p&gt;&lt;strong&gt;「譬如大海中龍死相出時，如果熟應墮，金翅鳥則來食之。」&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;龍命將盡、死相現時，業報之果已熟，金翅鳥自然飛降而食——這是因緣自然會合，非鳥強取。眾香城眾生機緣成熟之際，大菩薩自然「變化而現」，曇無竭即是此「應機示現」之身。&lt;/p&gt;
&lt;/div&gt;
&lt;h3&gt;二、法性生身的義理&lt;/h3&gt;
&lt;p&gt;此視角直接定位：曇無竭非「肉胎之身」，而是「法性生身」之變化。理由：能令十方諸佛稱讚、能遣使薩陀波崙從之受法、能加持薩陀波崙得六萬三昧，這已遠出生身菩薩力量之上。&lt;/p&gt;
&lt;h2&gt;第三節　本體論診斷矩陣&lt;/h2&gt;
&lt;p&gt;把兩種視角擺在一個矩陣上，可以看出論主並非「擇一」，而是給出兩種不同層面的真相——兩者各對應中觀的兩諦。&lt;/p&gt;
&lt;table class=&quot;matrix-table&quot;&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th style=&quot;width:18%&quot;&gt;維度&lt;/th&gt;
&lt;th&gt;實體 A · 生身菩薩&lt;/th&gt;
&lt;th&gt;實體 B · 法身大士&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td class=&quot;dim&quot;&gt;本體假定&lt;/td&gt;
&lt;td&gt;肉體凡胎（利根菩薩）—— 真有此身、真受五欲、真起禪定&lt;/td&gt;
&lt;td&gt;絕對空性（法性生身）—— 非真有此身，乃應機所現之變化&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td class=&quot;dim&quot;&gt;核心譬喻&lt;/td&gt;
&lt;td&gt;泥中避熱、龍起雲雨&lt;/td&gt;
&lt;td&gt;果熟鳥食、金翅鳥降&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td class=&quot;dim&quot;&gt;文本表象解釋&lt;/td&gt;
&lt;td&gt;留惑潤生 · 受欲而定不失&lt;/td&gt;
&lt;td&gt;依機示現 · 非實有生滅&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td class=&quot;dim&quot;&gt;修證心法&lt;/td&gt;
&lt;td&gt;和光同塵而不染（事行）&lt;/td&gt;
&lt;td&gt;緣起如幻 · 不壞假名（理觀）&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td class=&quot;dim&quot;&gt;中觀宗義對接&lt;/td&gt;
&lt;td&gt;世俗諦（即俗而真）&lt;/td&gt;
&lt;td&gt;第一義諦（真亦包俗）&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;div class=&quot;hl-quote&quot;&gt;兩個視角不是對錯之爭，而是「兩諦並舉」的雙視角。它們各從一個角度說曇無竭——一個說事相層的菩薩道實踐，一個說究極層的法身應現。&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;
&lt;section class=&quot;chapter&quot; id=&quot;chapter-4&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第四章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;真俗無礙的中觀統合&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;緣起如幻 · 即俗而真&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;p&gt;第三章的兩諦矩陣若僅停在「並陳」就不夠——龍樹之所以是中觀，正是要讓兩諦在「無礙」中統合。本章是這個統合的核心一筆。&lt;/p&gt;
&lt;h2&gt;第一節　緣起如幻 · 即俗而真&lt;/h2&gt;
&lt;p&gt;從世俗諦的視角看，曇無竭就是一位「居家受欲而修般若」的菩薩——這是事相，是生身之相，是凡夫眼可見的。但這個「事相」不是「實有」之事相，而是&lt;strong&gt;緣起所成&lt;/strong&gt;之事相。&lt;/p&gt;
&lt;div class=&quot;card&quot;&gt;
&lt;p&gt;&lt;strong&gt;「緣起即如幻，假名即實相」&lt;/strong&gt;——曇無竭的居家娛樂，是假名上的事；事中本然空無自性，故事即理、俗即真。&lt;/p&gt;
&lt;p&gt;不必另立一個「法身」在生身之外做別的——生身本身的「假名」性，已經是法身的「真」。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第二節　不壞假名而說實相&lt;/h2&gt;
&lt;p&gt;反過來從第一義諦的視角看，曇無竭是「法性生身」、應機示現——但這不是「拒絕」生身的事相，而是看穿事相的緣起本質。&lt;/p&gt;
&lt;div class=&quot;card&quot;&gt;
&lt;p&gt;《中論》：「若不依俗諦，不得第一義；不得第一義，則不得涅槃。」&lt;/p&gt;
&lt;p&gt;第一義諦不能離開假名而獨立存在——所以必須&lt;strong&gt;不壞假名而說實相&lt;/strong&gt;。曇無竭的婇女、園觀、浴池、五欲，全都是假名上的呈現，但這些呈現本身就在實相之中，不需要被否定。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第三節　破執 — 不應糾結曇無竭是「人」是「神」&lt;/h2&gt;
&lt;p&gt;論主給出的真正方便是：&lt;strong&gt;不要再執著於「他是生身還是法身」這個二元對立的問題&lt;/strong&gt;。&lt;/p&gt;
&lt;div class=&quot;four-grid&quot;&gt;
&lt;div class=&quot;cell&quot;&gt;
&lt;h5&gt;執生身 · 偏俗&lt;/h5&gt;
&lt;p&gt;若死執「曇無竭是生身菩薩」—— 落於肉相之執，不解神變不可思議；落入「以凡夫智測度大士」之過。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;cell alt&quot;&gt;
&lt;h5&gt;執法身 · 偏真&lt;/h5&gt;
&lt;p&gt;若死執「曇無竭是法身大士」—— 落於玄虛，不知大士仍以世俗事相應機；落入「離世覓真」之過。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;triangle-diagram&quot;&gt;
&lt;div class=&quot;tri-top&quot;&gt;
&lt;div class=&quot;tri-node&quot; style=&quot;background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;&quot;&gt;
&lt;strong style=&quot;color:#fff;&quot;&gt;中觀統合&lt;/strong&gt;
&lt;small style=&quot;color:rgba(255,255,255,.92);&quot;&gt;即俗而真 · 真亦包俗&lt;/small&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-bot&quot;&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;strong&gt;俗諦&lt;/strong&gt;
生身菩薩 · 受欲不失定
&lt;small&gt;（緣起如幻）&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;strong&gt;真諦&lt;/strong&gt;
法身大士 · 應機示現
&lt;small&gt;（不壞假名）&lt;/small&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-conclude&quot;&gt;兩諦無礙 — 不是擇一，而是雙照&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;hl-quote&quot;&gt;中觀的方便不是「告訴你正確答案」，而是「拆掉這個提問本身的偏執」。曇無竭是甚麼？兩種說法都對；兩種說法都不必執——這才是般若波羅蜜的真義。&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;
&lt;section class=&quot;chapter&quot; id=&quot;chapter-5&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第五章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;薩陀波崙的大欲與毒箭譬喻&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;邪見為箭鋒 · 結使為毒液&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;p&gt;場景與本體論辯告一段落後，文本回到薩陀波崙——他的心識狀態。佛在這裡用「毒箭譬喻」描寫他見曇無竭之前的緊迫感，而論主則以中觀切開這個譬喻的多層含義。&lt;/p&gt;
&lt;h2&gt;第一節　經中譬喻 · 如人為毒箭所中&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經文&lt;/span&gt;
&lt;p&gt;爾時，薩陀波崙菩薩摩訶薩歡喜心悅……須菩提！譬如有人為毒箭所中，更無餘念，唯念：「何時當得良醫，拔出毒箭，除我此苦？」如是，須菩提！薩陀波崙菩薩摩訶薩更無餘念，但作是願：「我何時當得見曇無竭菩薩，令我得聞般若波羅蜜？我聞是般若波羅蜜，斷諸有心。」&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label lun&quot;&gt;論釋&lt;/span&gt;
&lt;p&gt;爾時，薩陀波崙聞空中佛教，大歡喜，大欲心生故，「我何時當得見曇無竭菩薩——說般若波羅蜜者，能令我心中愛、見等諸煩惱箭出？」欲明是事故，此中佛說毒箭譬喻：如人毒箭在身，更無餘念：一者、苦痛急；二者、毒不疾出，則遍滿身中而失命。薩陀波崙亦如是，諸邪、疑等箭入心，貪欲等毒塗箭。聞曇無竭菩薩能拔出此箭。是人以邪見箭毒傷心，人畏貪欲等毒遍入身中，奪智慧命，與凡人同死；是故急欲見曇無竭菩薩，無復餘念。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第二節　箭頭解構 — 邪見是箭鋒，結使是毒液&lt;/h2&gt;
&lt;p&gt;論主把「毒箭」拆開分析：&lt;/p&gt;
&lt;div class=&quot;four-grid&quot;&gt;
&lt;div class=&quot;cell&quot;&gt;
&lt;h5&gt;箭鋒（堅利者）&lt;/h5&gt;
&lt;p&gt;&lt;strong&gt;邪、疑等諸見&lt;/strong&gt;——錯誤的概念、執取、推理的偏執。它們本身就具穿透力，能直入心地。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;cell alt&quot;&gt;
&lt;h5&gt;毒液（侵蝕者）&lt;/h5&gt;
&lt;p&gt;&lt;strong&gt;貪欲等諸結使&lt;/strong&gt;（煩惱）——塗於箭頭。它們的本性是「滲透」，箭鋒一入即化開，遍流全身。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;hl-quote&quot;&gt;邪見為箭鋒、結使為毒液——兩者合而成「毒箭」。單有邪見不足為患，單有結使也不足為患；兩者合用，才是奪人命的武器。&lt;/div&gt;
&lt;h2&gt;第三節　雙重恐懼學 — 凡夫怕失身命，菩薩怕失慧命&lt;/h2&gt;
&lt;p&gt;毒箭譬喻是世人共有的譬喻；但論主在此切出菩薩與凡夫的不同：&lt;/p&gt;
&lt;div class=&quot;two-col&quot;&gt;
&lt;div class=&quot;col-card&quot;&gt;
&lt;h4&gt;凡夫之畏&lt;/h4&gt;
&lt;p&gt;毒入身，&lt;strong&gt;失身命&lt;/strong&gt;——世人見毒箭而急求醫，是因為怕死。這個怕是身體層面的。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;col-card alt&quot;&gt;
&lt;h4&gt;菩薩之畏&lt;/h4&gt;
&lt;p&gt;毒入心，&lt;strong&gt;奪智慧命&lt;/strong&gt;——薩陀波崙急求曇無竭，是因為怕「般若慧命」被邪見結使吞噬，「與凡人同死」。這個怕是法身慧命層面的。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card&quot;&gt;
&lt;p&gt;論文：「&lt;strong&gt;是人以邪見箭毒傷心，人畏貪欲等毒遍入身中，奪智慧命，與凡人同死。&lt;/strong&gt;」&lt;/p&gt;
&lt;p&gt;注意這個「與凡人同死」——菩薩最大的恐懼不是「死」，而是「死得跟凡夫一樣」、慧命同入泥犁、不能成就阿耨多羅三藐三菩提。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第四節　唯一的良醫 — 為何必須是曇無竭&lt;/h2&gt;
&lt;p&gt;毒箭已中，箭鋒堅、毒已遍——非任何「藥」可解，必須有「拔箭手術」。這位手術師不能隨便找——必須是&lt;strong&gt;已得般若波羅蜜的善知識&lt;/strong&gt;，能精準指出箭鋒位置（邪見）、能判定毒性（結使），又能無染地伸手拔取（不被反噬）。&lt;/p&gt;
&lt;div class=&quot;flow flow-v&quot;&gt;
&lt;div class=&quot;flow-box&quot;&gt;
&lt;span class=&quot;step-tag&quot;&gt;病情判定&lt;/span&gt;
&lt;strong&gt;毒箭已中 · 心識中毒&lt;/strong&gt;
&lt;small&gt;邪見為鋒、結使為毒；不疾治，慧命將與凡人同死&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-box&quot;&gt;
&lt;span class=&quot;step-tag&quot;&gt;求醫條件&lt;/span&gt;
&lt;strong&gt;須得「能拔此箭」之大醫&lt;/strong&gt;
&lt;small&gt;非通才不能：須見過邪見的具體形貌、知結使如何遍流、能無染地拔出&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-box&quot;&gt;
&lt;span class=&quot;step-tag&quot;&gt;應病之人&lt;/span&gt;
&lt;strong&gt;曇無竭菩薩 — 已得般若波羅蜜之人&lt;/strong&gt;
&lt;small&gt;薩陀波崙生大欲心，急欲見之，無復餘念&lt;/small&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;hl-quote&quot;&gt;「大欲心生」——這是菩薩的「欲」，不是凡夫貪欲；是「我欲見此醫師、欲拔此毒箭、欲全慧命」之欲。菩薩的「大欲」與凡夫的「五欲」分野於此。&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;
&lt;section class=&quot;chapter&quot; id=&quot;chapter-6&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第六章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;深度病理 · 斷諸所有心&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;取相著 · 善法亦病&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;p&gt;毒箭只是入口；論主接著要做更深的病理切片。原文最後一句「斷諸所有心」是個極關鍵的提示——不是「斷掉所有心」，而是「斷『所有心』」（取相著之心）。本章拆開這個術語的全部層次。&lt;/p&gt;
&lt;h2&gt;第一節　取相著 — 病的本質&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label lun&quot;&gt;論釋&lt;/span&gt;
&lt;p&gt;此中說「斷諸所有心」。「所有心」者，&lt;strong&gt;取相著&lt;/strong&gt;，乃至善法中亦有是病。&lt;/p&gt;
&lt;/div&gt;
&lt;p&gt;論主直接定義：「所有心」就是&lt;strong&gt;取相著&lt;/strong&gt;——心執著於有所相、有所得、有所立、有所成。這個取著的對象可以是惡法、可以是善法、甚至可以是空、可以是涅槃。只要還有「我得到了它」、「我擁有它」的執著，就是病。&lt;/p&gt;
&lt;h3&gt;一、世俗層的取相著&lt;/h3&gt;
&lt;p&gt;對五欲、名利、地位、親情、生死的執取——凡夫病。&lt;/p&gt;
&lt;h3&gt;二、宗教層的取相著&lt;/h3&gt;
&lt;p&gt;對佛法、戒律、空性、解脫境的執取——菩薩病、二乘病。&lt;/p&gt;
&lt;h2&gt;第二節　終極陷阱 · 善法中亦有是病&lt;/h2&gt;
&lt;div class=&quot;hl-quote&quot;&gt;「乃至善法中亦有是病」——這句話是中觀心法的核子彈。它意味著：執取「般若」也是病；執取「空」也是病；執取「無所得」也是病。&lt;/div&gt;
&lt;p&gt;這是大乘修行最隱蔽的陷阱。凡夫對五欲生取著容易看見，但行者對「我已得空」、「我證涅槃」、「我成菩薩」的取著卻極難自察——因為它穿著「善法」的外衣。&lt;/p&gt;
&lt;h2&gt;第三節　病理矩陣 — 五欲執 vs 法執&lt;/h2&gt;
&lt;table class=&quot;matrix-table&quot;&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th style=&quot;width:18%&quot;&gt;病理維度&lt;/th&gt;
&lt;th&gt;世俗執 · 五欲執&lt;/th&gt;
&lt;th&gt;宗教執 · 法執&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td class=&quot;dim&quot;&gt;執著標的&lt;/td&gt;
&lt;td&gt;五欲、名利、生死、身心相&lt;/td&gt;
&lt;td&gt;佛法、空相、解脫境、菩薩位&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td class=&quot;dim&quot;&gt;病因&lt;/td&gt;
&lt;td&gt;無明 + 貪愛&lt;/td&gt;
&lt;td&gt;法執（取相為實）&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td class=&quot;dim&quot;&gt;對治&lt;/td&gt;
&lt;td&gt;觀「無常、苦、空、無我」&lt;/td&gt;
&lt;td&gt;「諸法性不可得」（空亦復空）&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td class=&quot;dim&quot;&gt;危險程度&lt;/td&gt;
&lt;td&gt;奪身命，受輪迴&lt;/td&gt;
&lt;td&gt;斷慧命，成不治之症&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td class=&quot;dim&quot;&gt;凡聖位置&lt;/td&gt;
&lt;td&gt;凡夫主病&lt;/td&gt;
&lt;td&gt;菩薩、二乘亦不免&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td class=&quot;dim&quot;&gt;中觀斷法&lt;/td&gt;
&lt;td&gt;外門 — 觀空、觀無常&lt;/td&gt;
&lt;td&gt;內門 — 空亦復空、無得亦無得&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h3&gt;一、為何法執比五欲執更危險&lt;/h3&gt;
&lt;p&gt;五欲執容易自見（因為有苦受作為提醒）、容易厭離（因為粗重）；但法執穿著善法的外衣，受用的是「我得空」、「我證菩提」之類的「法樂」——這個樂沒有粗苦來提醒，反而會持續強化執取。一旦菩薩在這個地方栽了，就「斷慧命」，而且自己渾然不知。&lt;/p&gt;
&lt;h2&gt;第四節　中觀視角的拔箭 — 無所得為拔&lt;/h2&gt;
&lt;p&gt;世俗的拔箭，是把「箭」拿出來；中觀的拔箭，是看見「能拔的我、所拔的箭、拔箭的事」三者皆不可得——這時候不再有「拔」這個動作可以執著。&lt;/p&gt;
&lt;div class=&quot;card&quot;&gt;
&lt;p&gt;&lt;strong&gt;「斷諸所有心」&lt;/strong&gt;—— 拆開的層次：&lt;/p&gt;
&lt;ul style=&quot;margin:8px 0 0 20px;line-height:1.95;&quot;&gt;
&lt;li&gt;第一層：斷取著「五欲」之心 —— 凡夫位的拔箭&lt;/li&gt;
&lt;li&gt;第二層：斷取著「法相」之心 —— 二乘位的拔箭&lt;/li&gt;
&lt;li&gt;第三層：斷取著「空相」之心 —— 菩薩位的拔箭&lt;/li&gt;
&lt;li&gt;第四層：連「我已斷」的取著也斷 —— 般若波羅蜜的徹底拔箭&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;hl-quote&quot;&gt;薩陀波崙急著聞般若、要「斷諸所有心」——不是要斷一切心識活動（那是斷滅見），而是要斷掉所有「取相而住」的執取。聞般若之後的他，將進入下一章的「無礙知見」與五十餘三昧之門。&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;
&lt;section class=&quot;chapter&quot; id=&quot;chapter-7&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第七章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;三昧之門&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;立 · 破 · 用的認識論升級&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;p&gt;毒箭已知、病理已破，論主把焦點轉向「拔箭之後的境界」——即薩陀波崙住念曇無竭、即得無礙知見、即得無量三昧門現在前。本章是全文修證層的高峰。&lt;/p&gt;
&lt;h2&gt;第一節　從見佛到無礙知見&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經文&lt;/span&gt;
&lt;p&gt;「是時，薩陀波崙菩薩於是處住念曇無竭菩薩，一切法中得無礙知見已，即得無量三昧門現在前。」&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label lun&quot;&gt;論釋&lt;/span&gt;
&lt;p&gt;薩陀波崙目覩佛身，先所未見，從佛聞教，得法喜故，離五欲喜，即得一切法中無礙知見。&lt;strong&gt;無礙知見者，如薩陀波崙力所得無礙，非佛無礙。&lt;/strong&gt;&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;note-box&quot;&gt;
&lt;span class=&quot;note-tag&quot;&gt;學術註記&lt;/span&gt;
此處論主特意點破：薩陀波崙所得的「無礙知見」&lt;strong&gt;不是&lt;/strong&gt;佛的究竟無礙——是菩薩力所及的無礙。這個區分極重要。佛的無礙是「一切種智」之究竟；菩薩的無礙是「於一切法中得無礙」的修證階段成就，仍在道上。
&lt;/div&gt;
&lt;h2&gt;第二節　經中所列五十餘三昧名&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經文 · 諸三昧名&lt;/span&gt;
&lt;p&gt;所謂：諸法性觀三昧、諸法性不可得三昧、破諸法無明三昧、諸法不異三昧、諸法不壞自在三昧、諸法能照明三昧、諸法離闇三昧、諸法無異相續三昧、諸法不可得三昧、散華三昧、諸法無我三昧、如幻威勢三昧、得如鏡像三昧、得一切眾生語言三昧、一切眾生歡喜三昧、入分別音聲三昧、得種種語言字句莊嚴三昧、無畏三昧、性常默然三昧、得無礙解脫三昧、離塵垢三昧、名字語句莊嚴三昧、見諸法三昧、諸法無礙頂三昧、如虛空三昧、如金剛三昧、不畏著色三昧、得勝三昧、轉眼三昧、畢法性三昧、能與安隱三昧、師子吼三昧、勝一切眾生三昧、華莊嚴三昧、斷疑三昧、隨一切堅固三昧、出諸法得神通力無畏三昧、能達諸法三昧、諸法財印三昧、諸法無分別見三昧、離諸見三昧、離一切闇三昧、離一切相三昧、解脫一切著三昧、除一切懈怠三昧、得深法明三昧、不可奪三昧、破魔三昧、不著三界三昧、起光明三昧、見諸佛三昧。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;samadhi-grid&quot;&gt;

&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;2&lt;/span&gt;諸法性不可得&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;3&lt;/span&gt;破諸法無明&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;4&lt;/span&gt;諸法不異&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;5&lt;/span&gt;諸法不壞自在&lt;/div&gt;

&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;24&lt;/span&gt;諸法無礙頂&lt;/div&gt;

&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;35&lt;/span&gt;斷疑&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;36&lt;/span&gt;隨一切堅固&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;37&lt;/span&gt;出諸法得神通力無畏&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;38&lt;/span&gt;能達諸法&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;39&lt;/span&gt;諸法財印&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;40&lt;/span&gt;諸法無分別見&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;41&lt;/span&gt;離諸見&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;42&lt;/span&gt;離一切闇&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;43&lt;/span&gt;離一切相&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;44&lt;/span&gt;解脫一切著&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;45&lt;/span&gt;除一切懈怠&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;46&lt;/span&gt;得深法明&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;47&lt;/span&gt;不可奪&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;48&lt;/span&gt;破魔&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;49&lt;/span&gt;不著三界&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;50&lt;/span&gt;起光明&lt;/div&gt;
&lt;div class=&quot;s-item&quot;&gt;&lt;span class=&quot;s-num&quot;&gt;51&lt;/span&gt;見諸佛&lt;/div&gt;
&lt;/div&gt;
&lt;p&gt;論主從中提出三個最關鍵的三昧為樞紐——對應「立、破、用」三階段。&lt;/p&gt;
&lt;h2&gt;第三節　立 — 諸法性觀三昧&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label lun&quot;&gt;論釋&lt;/span&gt;
&lt;p&gt;&lt;strong&gt;諸法性觀三昧&lt;/strong&gt;：能觀一切諸法實性。實性者，如先種種因緣說。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;card&quot;&gt;
&lt;h5&gt;立 · 觀諸法實性&lt;/h5&gt;
&lt;p&gt;第一個三昧建立的是「能觀」這個位置——能正觀一切法的實性。實性即般若所說的緣起空性，即諸法因緣所生而無自性的本然樣態。&lt;/p&gt;
&lt;p&gt;沒有這個「立」，就沒有後續可破之物——你要先看到「諸法實性」，才談得上後面的拆解。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第四節　破 — 諸法性不可得三昧&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label lun&quot;&gt;論釋&lt;/span&gt;
&lt;p&gt;&lt;strong&gt;諸法性不可得三昧&lt;/strong&gt;：初得三昧，所謂空、無生、無滅；今得是三昧，則不著是性，不得其決定相。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;card&quot;&gt;
&lt;h5&gt;破 · 空亦復空（Śūnyatā-śūnyatā）&lt;/h5&gt;
&lt;p&gt;第一個「立」雖是真的，但若停在那裡，就會生「我見諸法實性」的執著。第二個三昧立刻把這個執著也破掉——所觀的「諸法性」本身也不可得、不可定相、不可執取。&lt;/p&gt;
&lt;p&gt;這就是中觀最有名的「&lt;strong&gt;空亦復空&lt;/strong&gt;」（śūnyatā-śūnyatā）——觀空之後，連那個「空」也要空掉，否則「空」就變成另一個取著的相。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第五節　用 — 破諸法無明三昧&lt;/h2&gt;
&lt;div class=&quot;classical-text&quot;&gt;
&lt;span class=&quot;text-label lun&quot;&gt;論釋&lt;/span&gt;
&lt;p&gt;&lt;strong&gt;破諸法無明三昧&lt;/strong&gt;：諸法於凡夫人心中，以無明因緣故，邪曲不正，所謂常、樂、我、淨；得是三昧故，常等顛倒相應無明破，但觀一切法無常、空、無我。&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;card&quot;&gt;
&lt;h5&gt;用 · 破四顛倒&lt;/h5&gt;
&lt;p&gt;立空、破空之後，這個三昧具備了「破無明」的力用。凡夫於諸法上計常、計樂、計我、計淨——這四顛倒從根本上是無明所成。得此三昧後，常等顛倒所相應的無明被破，正觀建立：&lt;strong&gt;無常、苦、空、無我&lt;/strong&gt;。&lt;/p&gt;
&lt;p&gt;這不是回到小乘的「四念處」階段——而是已經過了「立空」「破空」之後，重新回觀世間的眼力。世俗顛倒被照穿，但不否定世俗本身——這即是大乘的「破而不離」。&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第六節　三階段流程圖&lt;/h2&gt;
&lt;div class=&quot;flow flow-v&quot;&gt;
&lt;div class=&quot;flow-box&quot;&gt;
&lt;span class=&quot;step-tag&quot;&gt;階段一 · 立&lt;/span&gt;
&lt;strong&gt;諸法性觀三昧&lt;/strong&gt;
&lt;small&gt;觀一切諸法實性 — 把「實相」這個觀察位置建立起來&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-box&quot;&gt;
&lt;span class=&quot;step-tag&quot;&gt;階段二 · 破&lt;/span&gt;
&lt;strong&gt;諸法性不可得三昧&lt;/strong&gt;
&lt;small&gt;連「諸法實性」也不可執定相 — 空亦復空（Śūnyatā-śūnyatā）&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;flow-arrow&quot;&gt;↓&lt;/div&gt;
&lt;div class=&quot;flow-box&quot;&gt;
&lt;span class=&quot;step-tag&quot;&gt;階段三 · 用&lt;/span&gt;
&lt;strong&gt;破諸法無明三昧&lt;/strong&gt;
&lt;small&gt;破常樂我淨四顛倒，正觀無常、苦、空、無我 — 重返世俗而不取著&lt;/small&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;hl-quote&quot;&gt;立、破、用——是般若認識論的三階段升級。從「能觀」到「能空所觀」再到「能用以破無明」，每一階段都是更深一層的覺察，並回向利生。&lt;/div&gt;
&lt;div class=&quot;classical-text&quot; style=&quot;margin-top:24px;&quot;&gt;
&lt;span class=&quot;text-label&quot;&gt;經文 · 結語&lt;/span&gt;
&lt;p&gt;薩陀波崙菩薩住是諸三昧中，即見十方無量阿僧祇諸佛為諸菩薩摩訶薩說般若波羅蜜。&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;
&lt;section class=&quot;chapter&quot; id=&quot;chapter-8&quot;&gt;
&lt;div class=&quot;ch-head&quot;&gt;
&lt;div class=&quot;ch-num&quot;&gt;卷九十七 · 釋薩陀波崙品 · 第八章&lt;/div&gt;
&lt;div class=&quot;ch-name&quot;&gt;般若鏡中的雙軸統合&lt;/div&gt;
&lt;div class=&quot;ch-sub&quot;&gt;曇無竭的有 ↔ 薩陀波崙的空&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;ch-body&quot;&gt;
&lt;p&gt;全品的最後一章，是三層敘事的收束——場景層的曇無竭與薩陀波崙、辯證層的兩諦本體論、修證層的立破用三階——全部回到「般若波羅蜜的無相之鏡」這一個焦點上。&lt;/p&gt;
&lt;h2&gt;第一節　雙軸對映&lt;/h2&gt;
&lt;p&gt;本品從頭到尾在處理兩個極端的對應：&lt;/p&gt;
&lt;div class=&quot;spectrum&quot;&gt;
&lt;div class=&quot;sp-node sp-left&quot;&gt;
&lt;h5&gt;曇無竭軸 · 「有」&lt;/h5&gt;
&lt;small&gt;七寶城、四園八池&lt;br/&gt;六萬婇女、五欲娛樂&lt;br/&gt;日三時說般若&lt;br/&gt;受欲而定不失&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;sp-node sp-mid&quot;&gt;
&lt;h5&gt;般若鏡&lt;/h5&gt;
&lt;small&gt;不一不異&lt;br/&gt;不取不捨&lt;br/&gt;能照雙軸&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;sp-node sp-right&quot;&gt;
&lt;h5&gt;薩陀波崙軸 · 「空」&lt;/h5&gt;
&lt;small&gt;住一處七日七夜&lt;br/&gt;啼哭憂愁、無餘念&lt;br/&gt;毒箭中心、急求拔&lt;br/&gt;斷諸所有心&lt;/small&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;card&quot;&gt;
&lt;p&gt;這兩軸不是「一邊對、一邊錯」——而是般若鏡的兩面映照：曇無竭示現「有」中之般若（在世間萬法中見實相），薩陀波崙示現「空」中之般若（在求法極限中見實相）。&lt;strong&gt;兩軸缺一，般若不全。&lt;/strong&gt;&lt;/p&gt;
&lt;/div&gt;
&lt;h2&gt;第二節　動態循環 — 觀照(立) → 不住(破箭) → 破暗(利生)&lt;/h2&gt;
&lt;p&gt;第七章拆出的立、破、用三階段，在本品中並非孤立存在，而是一個可以循環迴轉的動態結構：&lt;/p&gt;
&lt;div class=&quot;triangle-diagram&quot;&gt;
&lt;div class=&quot;tri-top&quot;&gt;
&lt;div class=&quot;tri-node&quot; style=&quot;background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;min-width:240px;&quot;&gt;
&lt;strong style=&quot;color:#fff;&quot;&gt;般若波羅蜜&lt;/strong&gt;
&lt;small style=&quot;color:rgba(255,255,255,.92);&quot;&gt;無相之鏡 · 三軸循環&lt;/small&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-bot&quot;&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;strong&gt;觀照（立）&lt;/strong&gt;
諸法性觀三昧
&lt;small&gt;建立能觀之位 — 看見諸法實性&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;strong&gt;不住（破箭）&lt;/strong&gt;
諸法性不可得三昧
&lt;small&gt;連能觀亦不可得 — 拔毒箭、斷所有心&lt;/small&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-node&quot;&gt;
&lt;strong&gt;破暗（利生）&lt;/strong&gt;
破諸法無明三昧
&lt;small&gt;破四顛倒、重返世俗 — 為眾生說法&lt;/small&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;tri-conclude&quot;&gt;立 → 破 → 用 → 立 — 般若無有窮時&lt;/div&gt;
&lt;/div&gt;
&lt;h3&gt;一、觀照即是建立&lt;/h3&gt;
&lt;p&gt;沒有觀照，般若無下手處——必須先「看見諸法實性」。曇無竭日三時說般若、薩陀波崙住念曇無竭，都是從觀照入手。&lt;/p&gt;
&lt;h3&gt;二、不住即是拔箭&lt;/h3&gt;
&lt;p&gt;看見之後不能停留在見上——「斷諸所有心」即是這個動作。連「我見實性」之心也要斷，箭才算真正拔出。&lt;/p&gt;
&lt;h3&gt;三、破暗即是利生&lt;/h3&gt;
&lt;p&gt;立、破之後，並非進入虛無，而是回向世間——破常樂我淨四顛倒，為眾生說無常苦空無我。曇無竭就是這一階的示現。&lt;/p&gt;
&lt;h2&gt;第三節　結語 · 在般若波羅蜜的無相之鏡中&lt;/h2&gt;
&lt;div class=&quot;hl-quote&quot;&gt;薩陀波崙的求法之苦、曇無竭的說法之樂、論主的本體啄問、毒箭的病理切片、五十餘三昧門的湧現——全都映在般若波羅蜜這一面無相之鏡上。&lt;br/&gt;&lt;br/&gt;鏡無自性，故能照一切；行者若取鏡相，鏡即不照。&lt;strong&gt;不取鏡相而能用鏡 — 這是大乘菩薩道的真正心法。&lt;/strong&gt;&lt;/div&gt;
&lt;div class=&quot;card&quot; style=&quot;margin-top:24px;background:linear-gradient(135deg,#fffdf5,#f5ecd8);border-left:5px solid var(--gold);&quot;&gt;
&lt;p&gt;&lt;strong&gt;本品三層收束：&lt;/strong&gt;&lt;/p&gt;
&lt;ul style=&quot;margin:10px 0 0 20px;line-height:2;&quot;&gt;
&lt;li&gt;&lt;strong&gt;場景層&lt;/strong&gt; — 眾香城七寶莊嚴 ↔ 七日七夜啼哭，兩極反差只是般若的雙面映照。&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;辯證層&lt;/strong&gt; — 生身/法身、俗諦/真諦、留惑潤生/果熟應機，皆是「不一不異」的中觀統合。&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;修證層&lt;/strong&gt; — 諸三昧名門中提煉立、破、用三階，循環迴轉，無始無終。&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;p style=&quot;text-align:center;margin-top:32px;font-size:18px;color:var(--text-muted);letter-spacing:3px;&quot;&gt;— 大智度論卷九十七 · 釋薩陀波崙品第八十八之餘 · 第三段 終 —&lt;/p&gt;
&lt;/div&gt;

/* ========== 段落 ========== */
